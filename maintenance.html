<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>準備中 | 企業のお医者さん</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: #4f46e5;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #0f172a;
    }
    p {
      color: #475569;
      line-height: 1.8;
      font-size: 1rem;
    }
    .divider {
      width: 48px;
      height: 3px;
      background-color: #4f46e5;
      margin: 1.5rem auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">企業のお医者さん</div>
    <h1>ただいま準備中です</h1>
    <div class="divider"></div>
    <p>
      現在、サイトをリニューアル中です。<br>
      もうしばらくお待ちください。
    </p>
  </div>
</body>
</html>
