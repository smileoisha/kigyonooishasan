<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="580" fill="white" rx="12"/>

  <!-- タイトル -->
  <text x="400" y="62" text-anchor="middle" font-size="38" font-weight="700" fill="#1E3A5F">黒字でも倒産する理由</text>

  <!-- ゴールド装飾ライン -->
  <line x1="160" y1="82" x2="340" y2="82" stroke="#D4AF37" stroke-width="1.5"/>
  <polygon points="350,82 358,78 358,86" fill="#D4AF37"/>
  <polygon points="450,82 442,78 442,86" fill="#D4AF37"/>
  <line x1="460" y1="82" x2="640" y2="82" stroke="#D4AF37" stroke-width="1.5"/>
  <circle cx="400" cy="82" r="4" fill="#D4AF37"/>

  <!-- サブタイトル -->
  <text x="400" y="118" text-anchor="middle" font-size="22" font-weight="700" fill="#1E3A5F">原因</text>

  <!-- ===== カード1：資金繰りの悪化（左上・ミントグリーン） ===== -->
  <rect x="40" y="140" width="340" height="190" rx="10" fill="#e8f5ee" stroke="#b8d8c4" stroke-width="1.5"/>
  <!-- 角飾り -->
  <text x="52" y="162" font-size="14" fill="#D4AF37">✦</text>
  <text x="366" y="162" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <text x="52" y="324" font-size="14" fill="#D4AF37">✦</text>
  <text x="366" y="324" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <!-- ファネルアイコン -->
  <g transform="translate(210,175)">
    <polygon points="-22,-16 22,-16 10,2 10,16 -10,16 -10,2" fill="none" stroke="#2D8A4E" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="0" cy="26" r="5" fill="#D4AF37"/>
    <circle cx="-12" cy="26" r="5" fill="#D4AF37"/>
    <circle cx="12" cy="26" r="5" fill="#D4AF37"/>
  </g>
  <!-- テキスト -->
  <text x="210" y="230" text-anchor="middle" font-size="20" font-weight="700" fill="#1a3a2a">資金繰りの悪化</text>
  <circle cx="80" cy="258" r="3" fill="#2D8A4E"/>
  <text x="92" y="263" font-size="15" fill="#2a3a2e">売掛金の回収が遅れる</text>
  <circle cx="80" cy="288" r="3" fill="#2D8A4E"/>
  <text x="92" y="293" font-size="15" fill="#2a3a2e">仕入れの支払い期限が早い</text>

  <!-- ===== カード2：急な出費や投資（右上・ライトブルー） ===== -->
  <rect x="420" y="140" width="340" height="190" rx="10" fill="#e8f0fa" stroke="#b8c8e8" stroke-width="1.5"/>
  <!-- 角飾り -->
  <text x="432" y="162" font-size="14" fill="#D4AF37">✦</text>
  <text x="746" y="162" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <text x="432" y="324" font-size="14" fill="#D4AF37">✦</text>
  <text x="746" y="324" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <!-- グラフアイコン -->
  <g transform="translate(590,182)">
    <rect x="-20" y="8" width="10" height="16" rx="2" fill="#1E3A5F" opacity="0.5"/>
    <rect x="-6" y="0" width="10" height="24" rx="2" fill="#1E3A5F" opacity="0.7"/>
    <rect x="8" y="-8" width="10" height="32" rx="2" fill="#1E3A5F"/>
    <path d="M20,-12 L26,-18 M22,-14 L26,-18 L22,-22" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="590" y="230" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2a3a">急な出費や投資</text>
  <circle cx="460" cy="258" r="3" fill="#1E3A5F"/>
  <text x="472" y="263" font-size="15" fill="#1a2a3a">設備投資への支出が大きい</text>
  <circle cx="460" cy="288" r="3" fill="#1E3A5F"/>
  <text x="472" y="293" font-size="15" fill="#1a2a3a">予期せぬトラブルでの補償</text>

  <!-- ===== カード3：在庫の過剰保有（左下・ライトイエロー） ===== -->
  <rect x="40" y="350" width="340" height="190" rx="10" fill="#faf6e8" stroke="#e0d4a0" stroke-width="1.5"/>
  <!-- 角飾り -->
  <text x="52" y="372" font-size="14" fill="#D4AF37">✦</text>
  <text x="366" y="372" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <text x="52" y="534" font-size="14" fill="#D4AF37">✦</text>
  <text x="366" y="534" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <!-- 箱アイコン -->
  <g transform="translate(210,392)">
    <rect x="-14" y="-4" width="28" height="20" rx="2" fill="none" stroke="#C9A227" stroke-width="2"/>
    <path d="M-14,-4 L0,-12 L14,-4" fill="none" stroke="#C9A227" stroke-width="2" stroke-linejoin="round"/>
    <rect x="-24" y="14" width="22" height="16" rx="2" fill="none" stroke="#C9A227" stroke-width="1.8"/>
    <path d="M-24,14 L-13,8 L-2,14" fill="none" stroke="#C9A227" stroke-width="1.8" stroke-linejoin="round"/>
  </g>
  <text x="210" y="440" text-anchor="middle" font-size="20" font-weight="700" fill="#3a2a00">在庫の過剰保有</text>
  <circle cx="80" cy="468" r="3" fill="#C9A227"/>
  <text x="92" y="473" font-size="15" fill="#3a2a10">売れない商品が溜まる</text>
  <circle cx="80" cy="498" r="3" fill="#C9A227"/>
  <text x="92" y="503" font-size="15" fill="#3a2a10">保管コストや廃棄損失</text>

  <!-- ===== カード4：借入返済の負担（右下・ライトラベンダー） ===== -->
  <rect x="420" y="350" width="340" height="190" rx="10" fill="#f0eaf8" stroke="#d0c0e8" stroke-width="1.5"/>
  <!-- 角飾り -->
  <text x="432" y="372" font-size="14" fill="#D4AF37">✦</text>
  <text x="746" y="372" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <text x="432" y="534" font-size="14" fill="#D4AF37">✦</text>
  <text x="746" y="534" font-size="14" fill="#D4AF37" text-anchor="end">✦</text>
  <!-- 鍵アイコン -->
  <g transform="translate(590,392)">
    <circle cx="-6" cy="-6" r="10" fill="none" stroke="#6a3a8a" stroke-width="2"/>
    <circle cx="-6" cy="-6" r="5" fill="none" stroke="#6a3a8a" stroke-width="2"/>
    <line x1="2" y1="2" x2="16" y2="16" stroke="#6a3a8a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="12" y2="18" stroke="#6a3a8a" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="16" y2="22" stroke="#6a3a8a" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="590" y="440" text-anchor="middle" font-size="20" font-weight="700" fill="#2a1a3a">借入返済の負担</text>
  <circle cx="460" cy="468" r="3" fill="#6a3a8a"/>
  <text x="472" y="473" font-size="15" fill="#2a1a3a">返済総額が大きい</text>
  <circle cx="460" cy="498" r="3" fill="#6a3a8a"/>
  <text x="472" y="503" font-size="15" fill="#2a1a3a">利息の支払いが圧迫する</text>
</svg>
