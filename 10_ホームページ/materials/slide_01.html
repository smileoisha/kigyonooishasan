<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人事業主と法人の違い | 企業のお医者さん</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --text-dark: #2a2a2a;
      --text-mid: #4a4a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;

      padding: 20px 0;
    }

    .slide-unit { width: 100%; max-width: 680px; padding: 0 16px; }

    .slide {
      background: linear-gradient(135deg, #d4d8e2 0%, #edf0f6 38%, #ffffff 58%, #dde0e8 100%);
      border-radius: 14px;
      padding: 26px 36px;
      position: relative;
      box-shadow: 0 6px 28px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      display: flex; flex-direction: column; justify-content: center;
    }
    .slide::before {
      content: ''; position: absolute;
      top: 11px; left: 11px; width: 18px; height: 18px;
      border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); opacity: 0.6;
    }
    .slide::after {
      content: ''; position: absolute;
      bottom: 11px; right: 11px; width: 18px; height: 18px;
      border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); opacity: 0.6;
    }

    .slide-title { font-size: 22px; font-weight: 700; text-align: center; color: var(--text-dark); }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .col-box {
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .col-box .col-label { font-size: 12px; letter-spacing: 2px; color: var(--gold); margin-bottom: 6px; text-align: center; }
    .col-box ul { list-style: none; padding: 0; }
    .col-box ul li { font-size: 16px; color: var(--text-mid); line-height: 1.7; padding-left: 16px; position: relative; }
    .col-box ul li::before { content: '・'; position: absolute; left: 0; }

    .point-bar {
      background: white;
      border: 1.5px solid var(--gold);
      border-radius: 8px;
      padding: 10px 20px;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .point-bar .point-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--gold); flex-shrink: 0; }
    .point-bar .point-text { font-size: 13px; font-weight: 500; color: var(--text-dark); }
  </style>
</head>
<body>
  <div class="slide-unit">
    <div class="slide">
      <div class="slide-title">個人事業主と法人の違い</div>

      <div class="two-col">
        <div class="col-box">
          <div class="col-label">個人事業主</div>
          <ul>
            <li>開業届だけで始められる</li>
            <li>税率は所得税（5〜45%）</li>
            <li>社会的信用が低い</li>
            <li>費用が安い</li>
          </ul>
        </div>
        <div class="col-box">
          <div class="col-label">法人</div>
          <ul>
            <li>設立に費用がかかる（20〜30万円）</li>
            <li>社会的信用が高い</li>
            <li>会計・税務が複雑</li>
            <li>開業届だけで始められる</li>
          </ul>
        </div>
      </div>

      <div class="point-bar">
        <span class="point-label">ポイント</span>
        <span class="point-text">売上1000万以下なら個人事業主がおすすめ</span>
      </div>
    </div>
  </div>
</body>
</html>
