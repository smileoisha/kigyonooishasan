<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黒字倒産とは | 企業のお医者さん</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --text-dark: #0f172a;
      --text-mid: #4a4a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0;
      overflow: hidden;
    }
    .slide-unit { width: 100%; max-width: 680px; padding: 0 16px; }
    .slide {
      background: linear-gradient(135deg, #d4d8e2 0%, #edf0f6 38%, #ffffff 58%, #dde0e8 100%);
      border-radius: 14px;
      padding: 12px 36px 24px;
      position: relative;
      box-shadow: 0 6px 28px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid rgba(201,168,76,0.2);
    }
    .slide::before {
      content: ''; position: absolute;
      top: 11px; left: 11px; width: 18px; height: 18px;
      border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); opacity: 0.6;
    }
    .slide::after {
      content: ''; position: absolute;
      bottom: 11px; right: 11px; width: 18px; height: 18px;
      border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); opacity: 0.6;
    }
    .slide-title {
      font-size: 22px; font-weight: 700; text-align: center;
      color: var(--text-dark); margin: 0;
    }
    .slide-subtitle {
      font-size: 14px; text-align: center;
      color: var(--text-mid); margin-top: 2px; margin-bottom: 0; line-height: 1.6;
    }
    /* VS レイアウト */
    .vs-layout {
      display: flex;
      align-items: stretch;
      gap: 12px;
      margin-top: 10px;
    }
    .vs-layout .card { flex: 1; }
    .vs-badge {
      font-size: 22px; font-weight: 900;
      color: var(--text-dark); flex-shrink: 0;
      letter-spacing: 1px;
      display: flex; align-items: center;
    }
    .card {
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-dark);
    }
    .card i { color: #2c3e50; }
    .card svg {
      width: 48px; height: 48px;
      display: block; margin-bottom: 10px;
      stroke: currentColor; fill: none !important; stroke-width: 1.25;
    }
    .card-label {
      font-size: 13px; font-weight: 500;
      margin-bottom: 8px; color: var(--text-mid);
    }
    .card-title {
      font-size: 15px; font-weight: 700; line-height: 1.45;
      white-space: nowrap;
    }
    .c-grey  { background: #e8ecf0; }
    .c-amber { background: #fce8dc; }
    .point-bar {
      background: white; border: 1.5px solid var(--gold);
      border-radius: 8px; padding: 10px 20px;
      margin-top: 14px; display: flex; align-items: center; gap: 10px;
    }
    .point-bar .point-label {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      color: var(--gold); flex-shrink: 0;
    }
    .point-bar .point-text { font-size: 13px; font-weight: 500; color: var(--text-dark); }
    @media (max-width: 480px) {
      .vs-layout { flex-direction: column; }
      .vs-layout .card { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="slide-unit">
    <div class="slide">
      <div style="margin-bottom:2px">
        <span style="display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 12px;border-radius:20px;background:#dbeafe;color:#1d4ed8;">初級</span>
      </div>
      <div class="slide-title">黒字倒産とは</div>
      <div class="slide-subtitle">利益があってもお金がない？</div>

      <div class="vs-layout">
        <div class="card c-grey">
          <i data-lucide="smile"></i>
          <div class="card-label">多くの人の誤解</div>
          <div class="card-title">利益がある＝お金がある</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="card c-amber">
          <i data-lucide="triangle-alert"></i>
          <div class="card-label">実際の現実</div>
          <div class="card-title">利益 ≠ 現金</div>
        </div>
      </div>

      <div class="point-bar">
        <span class="point-label">ポイント</span>
        <span class="point-text">黒字でも手元に現金がなければ、支払いができず倒産します</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
