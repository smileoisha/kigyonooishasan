<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナレッジ | 企業のお医者さん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="icons.js"></script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ─── レイアウト ─── */
  .kn-layout { flex: 1; min-height: 0; display: flex; overflow: hidden; }

  /* ─── 左パネル ─── */
  .kn-list-col {
    width: 300px; min-width: 220px; max-width: 400px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--bg-card); flex-shrink: 0;
  }
  .kn-list-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    background: var(--bg-card); flex-shrink: 0;
  }
  .kn-list-scroll { flex: 1; overflow-y: auto; }

  /* ツリーアイテム */
  .kn-item {
    display: flex; align-items: flex-start; gap: 4px;
    padding: 9px 12px 9px 10px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .12s; user-select: none;
  }
  .kn-item:hover { background: #f1f5f9; }
  .kn-item.active { background: #e0e7ff; border-left: 3px solid var(--primary); padding-left: 7px; }
  .kn-tree-toggle {
    flex-shrink: 0; width: 16px; height: 16px; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--text-muted); border-radius: 3px; transition: background .1s;
  }
  .kn-tree-toggle:hover { background: rgba(0,0,0,0.08); }
  .kn-tree-toggle-placeholder { flex-shrink: 0; width: 16px; }
  .kn-item-content { flex: 1; min-width: 0; }
  .kn-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
  .kn-item-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .kn-badge { font-size: 9px; padding: 1px 5px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .kn-badge-manual  { background: #dcfce7; color: #15803d; }
  .kn-badge-note    { background: #dbeafe; color: #1d4ed8; }
  .kn-badge-meeting { background: #fef3c7; color: #92400e; }
  .kn-item-date { font-size: 10px; color: var(--text-muted); }
  .kn-item-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
  .kn-tag { font-size: 9px; padding: 1px 5px; border-radius: 10px; background: #f1f5f9; color: var(--text-sub); border: 1px solid var(--border); }
  .kn-section-header {
    padding: 6px 12px; font-size: 10px; font-weight: 700;
    color: var(--text-muted); background: #f8fafc;
    border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em;
  }
  .kn-empty-list { text-align: center; padding: 30px 14px; color: var(--text-muted); font-size: 13px; }

  /* ─── 右パネル ─── */
  .kn-detail-col { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
  .kn-detail-header {
    padding: 12px 16px 10px; border-bottom: 1.3px solid var(--border);
    background: var(--bg-card); flex-shrink: 0;
  }
  .kn-breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .kn-breadcrumb-link { color: var(--navy); cursor: pointer; font-weight: 500; }
  .kn-breadcrumb-link:hover { text-decoration: underline; }

  /* 子ナレッジセクション（本文エリア上部・折りたたみ対応） */
  .kn-children-section {
    margin-bottom: 14px; padding: 8px 12px;
    background: var(--bg-card); border: 2px solid var(--border); border-radius: 8px;
  }
  .kn-children-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .kn-children-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; flex: 1; }
  .kn-children-chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .kn-child-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: #f5f8fb; border: 1px solid #cbd5e1; border-radius: 20px;
    padding: 3px 12px; font-size: 14px; font-weight: 500; color: #475569; cursor: pointer;
    transition: background .12s;
  }
  .kn-child-chip:hover { background: #e2e8f0; }
  .kn-child-chip-add {
    background: #f8fafc; border: 1px dashed var(--border); color: var(--text-muted);
    font-size: 11px; font-weight: 400; padding: 2px 10px;
  }
  .kn-child-chip-add:hover { background: #f1f5f9; border-color: var(--text-muted); }
  .kn-child-expand-btn {
    font-size: 11px; color: var(--primary); background: none; border: none;
    cursor: pointer; padding: 1px 6px; text-decoration: underline;
    white-space: nowrap; flex-shrink: 0;
  }
  .kn-child-expand-btn:hover { opacity: 0.75; }

  /* ─── 画像サイドパネル（右スライド） ─── */
  .kn-image-panel {
    width: 0; min-width: 0; overflow: hidden;
    border-left: 1px solid transparent;
    background: var(--bg-card);
    display: flex; flex-direction: column;
    transition: width 0.25s ease, min-width 0.25s ease, border-color 0.25s;
    flex-shrink: 0;
  }
  .kn-image-panel.open {
    width: 480px; min-width: 480px;
    border-left-color: var(--border);
  }
  .kn-image-panel-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; gap: 8px;
  }
  .kn-image-panel-title {
    font-size: 12px; font-weight: 600; color: var(--text-sub);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
  }
  .kn-image-panel-body {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; align-items: flex-start; justify-content: center;
  }
  .kn-image-panel-body img {
    max-width: 100%; height: auto; border-radius: 6px; display: block;
  }
  /* 履歴パネルアイテム */
  .kn-hist-item {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    cursor: default;
  }
  .kn-hist-item:hover { background: #f8fafc; }
  .kn-hist-meta {
    display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 4px;
  }
  .kn-hist-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .kn-hist-title { font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kn-hist-preview { font-size: 11px; color: var(--text-sub); line-height: 1.5; }
  /* 差分表示 */
  .kn-diff-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--bg-card); position: sticky; top: 0; z-index: 1; }
  .kn-diff-back { cursor: pointer; color: var(--primary); font-size: 12px; font-weight: 600; white-space: nowrap; }
  .kn-diff-back:hover { text-decoration: underline; }
  .kn-diff-label { font-size: 11px; color: var(--text-muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kn-diff-section { padding: 8px 14px 4px; font-size: 11px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); background: #f8fafc; }
  .kn-diff-body { padding: 8px 0; font-size: 12px; line-height: 1.7; }
  .kn-diff-line { padding: 1px 14px; white-space: pre-wrap; word-break: break-all; }
  .kn-diff-line.add { background: #dcfce7; color: #166534; }
  .kn-diff-line.add::before { content: '＋ '; font-weight: 700; }
  .kn-diff-line.del { background: #fee2e2; color: #991b1b; text-decoration: line-through; }
  .kn-diff-line.del::before { content: '－ '; font-weight: 700; }
  .kn-diff-line.same { color: var(--text-sub); }
  .kn-diff-nochange { padding: 16px 14px; font-size: 12px; color: var(--text-muted); text-align: center; }
  /* モバイル：全幅オーバーレイ */
  @media (max-width: 768px) {
    .kn-image-panel.open {
      position: fixed; inset: 0;
      width: 100% !important; min-width: 100% !important;
      z-index: 500;
    }
  }

  /* ④ タイトル行（ボタン横並び） */
  .kn-title-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .kn-detail-title {
    font-size: 18px; font-weight: 700; color: var(--navy); line-height: 1.3;
    flex: 0 1 auto; min-width: 0; outline: none;
    border-radius: 4px; padding: 1px 4px; margin: -1px -4px;
  }
  .kn-detail-title[contenteditable="true"] { cursor: text; }
  .kn-detail-title[contenteditable="true"]:focus {
    border: 2px solid var(--primary); background: #fafffe; padding: 2px 6px; margin: 0;
  }
  .kn-title-btns { display: flex; gap: 5px; flex-shrink: 0; margin-top: 2px; }
  .kn-detail-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .kn-detail-body { flex: 1; overflow-y: auto; padding: 0 20px 20px; background: var(--bg); }

  /* ─── 面談構造化表示 ─── */
  .kn-meeting-structured { font-size: 13px; }
  .kn-meeting-structured > div { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .kn-meeting-structured > div:last-child { border-bottom: none; }

  /* ─── コンテンツ表示 ─── */
  .md-preview { font-size: 14px; line-height: 1.8; color: var(--text); padding-top: 2px; }
  .md-preview > :first-child { margin-top: 0; }
  .md-preview h1 { font-size: 20px; font-weight: 700; color: var(--navy); margin: 20px 0 8px; }
  .md-preview h2 { font-size: 17px; font-weight: 700; color: var(--navy); margin: 16px 0 6px; }
  .md-preview h3 { font-size: 15px; font-weight: 600; color: var(--navy); margin: 12px 0 4px; }
  .md-preview p  { margin: 0 0 10px; }
  .md-preview ul, .md-preview ol { margin: 0 0 10px; padding-left: 20px; }
  .md-preview li { margin-bottom: 2px; }
  .md-preview strong { font-weight: 700; }
  .md-preview em { font-style: italic; }
  .md-preview code { background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }
  .md-preview pre { background: #f1f5f9; padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 0 0 10px; }
  .md-preview blockquote { border-left: 3px solid var(--border); margin: 0 0 10px; padding: 4px 12px; color: var(--text-sub); }
  .md-preview hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .md-preview table { border-collapse: collapse; width: 100%; margin: 0 0 12px; font-size: 13px; }
  .md-preview th, .md-preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .md-preview th { background: #f1f5f9; font-weight: 700; }
  .md-preview tr:nth-child(even) td { background: #f8fafc; }
  .md-preview mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; color: inherit; }
  /* ② 画像：クリックで新タブ、カーソル変化 */
  .md-preview img { max-width: 100%; height: auto; border-radius: 6px; margin: 6px 0; cursor: zoom-in; }

  /* ─── ナレッジリンクチップ ─── */
  a.kn-wiki {
    display: inline-flex; align-items: center; gap: 3px;
    background: #e0e7ff; color: #3730a3;
    border-radius: 4px; padding: 1px 7px; font-size: 0.9em;
    text-decoration: none; border: 1px solid #c7d2fe; cursor: pointer; transition: background .12s;
  }
  a.kn-wiki::before { content: '📎'; font-size: 0.8em; }
  a.kn-wiki:hover { background: #c7d2fe; }
  .kn-broken { color: var(--danger); font-size: 0.9em; text-decoration: line-through; opacity: 0.7; }

  /* バックリンク・子ナレッジ下部 */
  .kn-sub-section { margin-top: 24px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .kn-sub-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .kn-sub-item { display: flex; align-items: center; gap: 7px; padding: 5px 7px; border-radius: 6px; transition: background .12s; font-size: 13px; color: var(--navy); }
  .kn-sub-item:hover { background: #f1f5f9; }
  .kn-source-link { font-size: 12px; color: var(--primary); text-decoration: none; }
  .kn-source-link:hover { text-decoration: underline; }

  /* ─── 書式ツールバー ─── */
  .kn-fmt-toolbar {
    display: flex; align-items: center; gap: 2px; padding: 4px 8px;
    background: #f8fafc; border: 1px solid var(--border); border-bottom: none;
    border-radius: 8px 8px 0 0; flex-wrap: wrap;
  }
  .kn-fmt-btn {
    padding: 2px 7px; border: 1px solid transparent; border-radius: 4px;
    cursor: pointer; background: none; font-size: 13px; font-family: inherit;
    color: var(--text); transition: background .12s;
    display: flex; align-items: center; justify-content: center;
    min-width: 28px; height: 26px; line-height: 1;
  }
  .kn-fmt-btn:hover { background: #e2e8f0; border-color: var(--border); }
  .kn-fmt-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }
  .kn-fmt-color-wrap { position: relative; display: inline-flex; }
  .kn-color-palette {
    position: absolute; top: calc(100% + 3px); left: 0; z-index: 200;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 7px; display: none; gap: 5px; flex-wrap: wrap; min-width: 140px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.14);
  }
  .kn-color-palette.open { display: flex; }
  .kn-color-swatch {
    width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    border: 2px solid rgba(0,0,0,0.1); transition: transform .1s, box-shadow .1s;
    font-size: 9px; font-weight: 700;
  }
  .kn-color-swatch:hover { transform: scale(1.2); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

  /* テーブルピッカー */
  .kn-table-picker {
    position: absolute; top: calc(100% + 3px); left: 0; z-index: 200;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.14);
  }
  .kn-table-picker.open { display: block; }
  .kn-table-grid { display: grid; grid-template-columns: repeat(6, 20px); gap: 2px; }
  .kn-table-cell { width: 20px; height: 20px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; background: #f8fafc; transition: background .08s, border-color .08s; }
  .kn-table-cell.hover { background: #bfdbfe; border-color: #3b82f6; }
  .kn-table-picker-label { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 5px; }

  /* ─── WYSIWYGエディタ ─── */
  .kn-editor {
    min-height: 220px; width: 100%; box-sizing: border-box;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.8;
    padding: 10px 16px; border: 1px solid var(--border);
    border-radius: 0 0 8px 8px; border-top: none;
    background: #fff; color: var(--text);
    overflow-y: auto; outline: none;
  }
  .kn-editor:focus { border-color: var(--primary); }
  .kn-editor table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .kn-editor td, .kn-editor th { border: 1px solid var(--border); padding: 6px 10px; min-width: 40px; vertical-align: top; }
  .kn-editor th { background: #f1f5f9; font-weight: 700; }
  .kn-editor p { margin: 0 0 6px; }
  .kn-editor mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; color: inherit; }
  .kn-editor ul, .kn-editor ol { padding-left: 1.5em; margin-left: 0; margin-bottom: 6px; }
  .kn-editor img { max-width: 100%; height: auto; border-radius: 4px; }

  /* ④ インライン編集時のエディタ（枠なしツールバー） */
  .kn-inline-toolbar {
    display: flex; align-items: center; gap: 2px; padding: 4px 8px;
    background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px;
    flex-wrap: wrap; margin-bottom: 4px;
  }
  .kn-floating-toolbar {
    display: none; position: fixed; z-index: 9999;
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 3px 14px rgba(0,0,0,0.18);
    padding: 4px 6px; flex-wrap: nowrap; pointer-events: auto;
  }
  .kn-fmt-select {
    font-size: 11px; padding: 2px 4px; border: 1px solid var(--border);
    border-radius: 4px; background: #fff; color: var(--text);
    cursor: pointer; height: 22px; max-width: 72px;
  }
  .kn-inline-editor {
    min-height: 160px; width: 100%; box-sizing: border-box;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.8;
    padding: 10px 16px; border: 2px solid var(--primary);
    border-radius: 8px; background: #fafffe; color: var(--text);
    overflow-y: auto; outline: none;
  }
  .kn-inline-editor ul, .kn-inline-editor ol { padding-left: 1.5em; margin-left: 0; margin-bottom: 6px; }
  .kn-inline-editor table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .kn-inline-editor td, .kn-inline-editor th { border: 1px solid var(--border); padding: 6px 10px; min-width: 40px; vertical-align: top; }
  .kn-inline-editor mark { background: #fef08a; }
  .kn-inline-editor img { max-width: 100%; height: auto; border-radius: 4px; }

  /* ─── 編集フォーム（新規作成用） ─── */
  .kn-edit-form { display: flex; flex-direction: column; gap: 12px; padding: 20px; flex: 1; overflow-y: auto; }
  .kn-form-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; display: block; }

  /* ─── 空状態 ─── */
  .kn-welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
  .kn-welcome-icon { font-size: 48px; margin-bottom: 12px; }
  .kn-welcome-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .kn-welcome-desc { font-size: 13px; }

  /* ─── モーダル ─── */
  .kn-modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(3px);
    z-index: 500; display: flex; align-items: center; justify-content: center;
  }
  .kn-modal-box {
    background: var(--bg-card); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 760px; max-width: 95vw; height: 500px; max-height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .kn-modal-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .kn-modal-header input { flex: 1; font-size: 14px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); outline: none; }
  .kn-modal-header input:focus { border-color: var(--primary); }
  .kn-modal-body { flex: 1; display: flex; overflow: hidden; }
  .kn-modal-list { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; }
  .kn-modal-item { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .1s; }
  .kn-modal-item:hover { background: #f1f5f9; }
  .kn-modal-item.active { background: #e0e7ff; }
  .kn-modal-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .kn-modal-item-meta { display: flex; gap: 6px; margin-top: 2px; align-items: center; }
  .kn-modal-preview { flex: 1; overflow-y: auto; padding: 16px 18px; }
  .kn-modal-preview-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .kn-modal-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .kn-modal-footer-hint { font-size: 11px; color: var(--text-muted); }

  /* ─── AI検索モーダル ─── */
  .kn-ai-box {
    background: var(--bg-card); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 700px; max-width: 95vw; height: 560px; max-height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .kn-ai-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .kn-ai-title { font-size: 14px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 7px; }
  .kn-ai-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .kn-ai-msg { max-width: 90%; border-radius: 10px; padding: 10px 14px; font-size: 13px; line-height: 1.75; }
  .kn-ai-msg-user { background: var(--navy); color: #fff; align-self: flex-end; }
  .kn-ai-msg-assistant { background: #f1f5f9; color: var(--text); align-self: flex-start; max-width: 100%; }
  .kn-ai-sources { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .kn-ai-source-chip { display: inline-flex; align-items: center; background: #e0e7ff; color: #3730a3; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin: 2px; cursor: pointer; border: 1px solid #c7d2fe; }
  .kn-ai-source-chip:hover { background: #c7d2fe; }
  .kn-ai-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .kn-ai-input { flex: 1; font-size: 14px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit; }
  .kn-ai-input:focus { border-color: var(--primary); }

  /* ─── Quick View モーダル ─── */
  .kn-quick-box {
    background: var(--bg-card); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 700px; max-width: 95vw; max-height: 85vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .kn-quick-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .kn-quick-title { font-size: 15px; font-weight: 700; color: var(--navy); flex: 1; min-width: 0; }
  .kn-quick-body { flex: 1; overflow-y: auto; padding: 20px; }

  /* ⑤ AIアイコン（スパークルSVG） */
  .ai-sparkle-icon { display: inline-flex; align-items: center; }

  /* ─── タグフィルタバー ─── */
  .kn-tag-filter-bar {
    padding: 5px 10px; border-top: 2px solid var(--border); border-bottom: 2px solid var(--border);
    background: #f8fafc; display: flex; gap: 5px; align-items: center; flex-wrap: nowrap;
    min-height: 32px; overflow: hidden; white-space: nowrap;
  }
  .kn-tag-filter-bar > * { flex-shrink: 0; }
  .kn-tag-chip-filter {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; cursor: pointer; user-select: none;
    background: #f1f5f9; border: 1px solid var(--border); color: var(--text-sub);
    transition: background .1s, color .1s;
  }
  .kn-tag-chip-filter:hover { background: #e2e8f0; }
  .kn-tag-chip-filter.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .kn-tag-mode-btn {
    font-size: 9px; padding: 2px 7px; border-radius: 4px; cursor: pointer; user-select: none;
    background: #e2e8f0; border: 1px solid var(--border); font-weight: 700; color: var(--text-sub);
  }
  .kn-tag-mode-btn.and-mode { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }

  /* ─── グルーピングヘッダー ─── */
  .kn-group-header {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer;
    background: #f1f5f9; border-bottom: 1px solid var(--border); color: var(--text-sub);
    user-select: none; transition: background .1s;
  }
  .kn-group-header:hover { background: #e2e8f0; }
  .kn-group-count { margin-left: auto; font-size: 10px; color: var(--text-muted); font-weight: 400; }

  /* ─── ツリーアイテム（manual用コンパクト表示・タスクメモと同じ見た目）─── */
  .kn-tree-item {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; font-size: 12px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--text); background: #fff;
    user-select: none; transition: background .1s;
  }
  .kn-tree-item:hover { background: #f1f5f9; }
  .kn-tree-item.active { background: #e0e7ff; border-left: 3px solid var(--primary); }
  .kn-tree-item-title {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
  }
  .kn-tree-item-count { font-size: 10px; color: var(--text-muted); flex-shrink: 0; font-weight: 400; }

  /* ─── 並び替えドラッグ（mouse event ベース） ─── */
  .kn-tree-item[data-id] { cursor: grab; }
  .kn-tree-item.kn-dragging { opacity: 0.4; pointer-events: none; }
  .kn-tree-item.drop-before { border-top: 2px solid var(--primary) !important; }
  .kn-tree-item.drop-after  { border-bottom: 2px solid var(--primary) !important; }
  .kn-tree-item.drop-into   { background: var(--gold-pale) !important; outline: 2px solid var(--gold); outline-offset: -2px; border-radius: 4px; }

  /* ─── 複数選択（Fix C） ─── */
  .kn-select-cb {
    flex-shrink: 0; width: 14px; height: 14px; margin-right: 4px;
    cursor: pointer; accent-color: var(--primary);
    display: none; /* 初期非表示。選択モード or hover で表示 */
  }
  .kn-tree-item:hover .kn-select-cb,
  .kn-tree-item.kn-selected .kn-select-cb { display: inline-block; }
  .kn-tree-item.kn-selected { background: rgba(232,102,42,.07); }
  .kn-sel-bar {
    flex-shrink: 0;
    display: none; /* JS で制御 */
    align-items: center; gap: 8px;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    font-size: 11px; color: var(--text-sub);
  }
  .kn-sel-bar.visible { display: flex; }
  .kn-sel-bar-count { font-weight: 700; color: var(--primary); margin-right: 2px; }
  .kn-sel-bar-clear { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 11px; text-decoration: underline; padding: 0; }
  .kn-sel-bar-move  { margin-left: auto; }

  /* ─── Notion風ページブロック ─── */
  .kn-page-block {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; margin: 3px 0;
    border-radius: 6px; background: var(--bg-card);
    border: 1px solid var(--border);
    user-select: none; cursor: default;
    transition: background .12s;
  }
  .kn-page-block:hover { background: #f1f5f9; }
  .kn-page-block.dragging { opacity: 0.35; }
  .kn-page-block-handle {
    color: var(--text-muted); font-size: 11px; cursor: grab;
    opacity: 0; flex-shrink: 0; transition: opacity .12s;
    line-height: 1; letter-spacing: 1px; padding: 0 2px;
  }
  .kn-page-block:hover .kn-page-block-handle { opacity: 1; }
  .kn-page-block-icon { font-size: 14px; flex-shrink: 0; }
  .kn-page-block-title {
    font-size: 14px; font-weight: 500; color: var(--navy);
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .kn-drop-line {
    height: 2px; background: var(--primary); border-radius: 1px;
    margin: 1px 0; pointer-events: none; display: none;
  }
  .kn-drop-line.visible { display: block; }

  /* ─── 常時編集ボディ ─── */
  .kn-editor-wrap { position: relative; }
  .kn-blk-add {
    position: absolute; left: 2px; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: 300; line-height: 1;
    color: var(--text-muted); user-select: none;
    opacity: 0; pointer-events: none; z-index: 5;
    transition: opacity .12s, background .1s, color .1s;
  }
  .kn-blk-add.visible { opacity: 1; pointer-events: auto; }
  .kn-blk-add:hover { background: var(--bg); color: var(--navy); }
  .kn-blk-add-menu {
    position: fixed; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.14);
    z-index: 9999; min-width: 150px; padding: 4px 0; font-size: 13px;
  }
  .kn-blk-add-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; cursor: pointer; color: var(--text); white-space: nowrap;
    transition: background .1s;
  }
  .kn-blk-add-item:hover { background: var(--bg); }
  .kn-always-editor {
    min-height: 120px; width: 100%; box-sizing: border-box;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.8;
    color: var(--text); outline: none; padding-top: 2px; padding-left: 26px;
  }
  .kn-always-editor > :first-child { margin-top: 0; }
  .kn-always-editor h1 { font-size: 20px; font-weight: 700; color: var(--navy); margin: 20px 0 8px; }
  .kn-always-editor h2 { font-size: 17px; font-weight: 700; color: var(--navy); margin: 16px 0 6px; }
  .kn-always-editor h3 { font-size: 15px; font-weight: 600; color: var(--navy); margin: 12px 0 4px; }
  .kn-always-editor p { margin: 0 0 10px; }
  .kn-always-editor ul, .kn-always-editor ol { padding-left: 1.5em; margin-left: 0; margin-bottom: 6px; }
  .kn-always-editor li { margin-bottom: 2px; }
  .kn-always-editor strong { font-weight: 700; }
  .kn-always-editor em { font-style: italic; }
  .kn-always-editor code { background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }
  .kn-always-editor pre { background: #f1f5f9; padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 0 0 10px; }
  .kn-always-editor blockquote { border-left: 3px solid var(--border); margin: 0 0 10px; padding: 4px 12px; color: var(--text-sub); }
  .kn-always-editor table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .kn-always-editor td, .kn-always-editor th { border: 1px solid var(--border); padding: 6px 10px; min-width: 40px; vertical-align: top; }
  .kn-always-editor th { background: #f1f5f9; font-weight: 700; }
  .kn-always-editor tr:nth-child(even) td { background: #f8fafc; }
  .kn-always-editor mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; color: inherit; }
  .kn-always-editor img { max-width: 100%; height: auto; border-radius: 6px; margin: 6px 0; cursor: zoom-in; }

  /* ─── 保存ステータスバッジ ─── */
  .kn-save-badge {
    font-size: 11px; color: var(--text-muted);
    transition: opacity .5s; margin-left: 6px;
  }

  /* ─── ＋サブページボタン ─── */
  .kn-add-subpage-btn {
    display: flex; align-items: center; gap: 6px;
    margin-top: 16px; padding: 6px 12px;
    font-size: 12px; color: var(--text-muted); cursor: pointer;
    border-radius: 6px; border: 1px dashed var(--border);
    background: none; font-family: inherit;
    transition: background .12s, color .12s, border-color .12s;
  }
  .kn-add-subpage-btn:hover { background: #f1f5f9; color: var(--navy); border-color: var(--text-muted); }
  .kn-pb-menu { position:fixed; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.14); z-index:9999; min-width:130px; padding:4px 0; font-size:13px; }
  .kn-pb-menu-item { display:flex; align-items:center; gap:8px; padding:8px 14px; cursor:pointer; color:var(--text); transition:background .1s; white-space:nowrap; }
  .kn-pb-menu-item:hover { background:var(--bg); }
  .kn-pb-menu-item.danger { color:var(--danger); }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo"><img src="logo.png" alt="企業のお医者さん"></span>
    <nav class="nav-tabs">
      <a href="index.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><g fill="none" stroke="#1E3A5F" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g></svg> マイタスク</a>
      <a href="project.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><path fill="none" stroke="#1E3A5F" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> プロジェクト</a>
      <a href="gantt.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><path fill="none" stroke="#D4AF37" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 5h12M4 12h10m-2 7h8"/></svg> ガント</a>
      <a href="customers.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><g fill="none" stroke="#E8662A" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M16 3.128a4 4 0 0 1 0 7.744M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></g></svg> 顧客</a>
      <span class="nav-tab active"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><path fill="none" stroke="#7C3AED" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 7v14m-9-3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4a4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3a3 3 0 0 0-3-3z"/></svg> ナレッジ</span>
    </nav>
  </div>
  <div class="header-right">
    <div class="header-datetime" id="headerDatetime">
      <span class="header-datetime-date" id="headerDate"></span>
      <span class="header-datetime-time" id="headerTime"></span>
    </div>
    <button id="backupBtn" class="backup-btn" onclick="manualBackup()" title="バックアップ未実施（クリックして実行）">💾</button>
    <div class="user-badge" onclick="switchUser()" title="ユーザーを切り替え">
      <div class="user-avatar" id="headerAvatar">?</div>
      <span class="user-name" id="headerName">未選択</span>
    </div>
  </div>
</header>


<!-- Main layout -->
<div class="kn-layout">
  <div class="kn-list-col">
    <div class="kn-list-header">
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);">一覧（手動順）</span>
      <button id="knFocusBtn" onclick="toggleFocusMode()" title="集中モード（検索バーを隠す）"
        style="background:none;border:none;cursor:pointer;padding:3px;color:var(--text-muted);display:flex;align-items:center;border-radius:4px;transition:color .15s,background .15s;"
        onmouseover="this.style.background='#f1f5f9';this.style.color='var(--primary)'"
        onmouseout="this.style.background='none';this.style.color='var(--text-muted)'">
        <svg id="knFocusIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>
    <div class="kn-list-scroll" id="knList"><div class="kn-empty-list">読み込み中...</div></div>
    <!-- Fix C: 複数選択バー -->
    <div class="kn-sel-bar" id="knSelBar">
      <span><span class="kn-sel-bar-count" id="knSelCount">0</span>件選択中</span>
      <button class="kn-sel-bar-clear" onclick="clearAllSelection()">全解除</button>
      <button class="btn btn-primary btn-sm kn-sel-bar-move" onclick="openBulkMoveModal()">移動…</button>
    </div>
  </div>
  <div class="kn-detail-col">
    <!-- Toolbar -->
    <div class="toolbar">
      <div style="display:flex;gap:6px;align-items:center;flex:1;">
        <input class="form-input" id="knSearchInput"
          placeholder="🔍 タイトル・本文・タグで検索"
          oninput="onKnSearch(this.value)"
          style="font-size:12px;padding:6px 10px;flex:1;height:32px;border-width:2px;">
        <button id="knSearchClear" class="btn btn-outline btn-sm"
          onclick="clearKnSearch()"
          style="display:none;font-size:11px;padding:4px 8px;height:32px;">✕</button>
      </div>
      <select id="knTypeFilterEl" class="form-select"
        style="font-size:12px;padding:5px 8px;width:auto;height:32px;border-width:2px;"
        onchange="onKnTypeFilter(this.value)">
        <option value="">すべて</option>
        <option value="manual">企業のお医者さん</option>
        <option value="task_note">タスクメモ</option>
        <option value="customer_meeting">面談記録</option>
      </select>
      <select id="knCustFilterEl" class="form-select"
        style="font-size:12px;padding:5px 8px;width:auto;height:32px;display:none;border-width:2px;"
        onchange="onKnCustFilter(this.value)">
        <option value="">顧客：すべて</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="openAiSearch()"
        style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;display:flex;align-items:center;gap:5px;">
        <svg class="ai-sparkle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L13.8 8.2L20 10L13.8 11.8L12 18L10.2 11.8L4 10L10.2 8.2L12 2Z" fill="white"/>
          <path d="M19 16L19.9 18.1L22 19L19.9 19.9L19 22L18.1 19.9L16 19L18.1 18.1L19 16Z" fill="rgba(255,255,255,0.8)"/>
        </svg>
        AIに聞く
      </button>
      <button class="btn btn-primary btn-sm" onclick="openNewForm(null)">＋ ナレッジ追加</button>
    </div>
    <!-- タグフィルタバー（タグが1件以上のときのみ表示） -->
    <div id="knTagFilterBar" class="kn-tag-filter-bar" style="display:none;">
      <span style="font-size:10px;color:var(--text-muted);flex-shrink:0;">🏷 タグ:</span>
      <div id="knTagChips" style="display:flex;flex-wrap:nowrap;gap:4px;"></div>
      <button id="knTagModeBtn" class="kn-tag-mode-btn" onclick="toggleTagMode()" title="AND/OR 切替">OR</button>
      <button class="btn btn-outline btn-sm" onclick="clearTagFilter()"
        style="font-size:10px;padding:2px 7px;display:none;" id="knTagClearBtn">✕ クリア</button>
    </div>
    <div id="knDetail" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="kn-welcome">
        <div class="kn-welcome-icon">📚</div>
        <div class="kn-welcome-title">ナレッジを選択</div>
        <div class="kn-welcome-desc">左のリストからエントリを選んでください</div>
      </div>
    </div>
  </div>
  <!-- 画像サイドパネル（右スライド） -->
  <div class="kn-image-panel" id="knImagePanel">
    <div class="kn-image-panel-header">
      <span class="kn-image-panel-title" id="knImagePanelTitle">画像</span>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <a id="knImagePanelNewTab" href="#" target="_blank" rel="noopener"
          class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;">↗ 新タブ</a>
        <button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;"
          onclick="closeImagePanel()">✕</button>
      </div>
    </div>
    <div class="kn-image-panel-body">
      <img id="knImagePanelImg" src="" alt="画像">
    </div>
  </div>

  <!-- 履歴パネル（右スライド） -->
  <div class="kn-image-panel" id="knHistoryPanel">
    <div class="kn-image-panel-header">
      <span class="kn-image-panel-title">🕐 編集履歴</span>
      <button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;"
        onclick="closeHistoryPanel()">✕</button>
    </div>
    <div class="kn-image-panel-body" id="knHistoryPanelBody" style="padding:0;overflow-y:auto;display:block;"></div>
  </div>
</div>

<!-- リンク挿入モーダル -->
<div id="knLinkModal" class="kn-modal-overlay" style="display:none;" onclick="onModalOverlayClick(event)">
  <div class="kn-modal-box" onclick="event.stopPropagation()">
    <div class="kn-modal-header">
      <span id="knLinkModalTitle" style="font-size:14px;font-weight:700;color:var(--navy);white-space:nowrap;">🔗 ナレッジをリンク</span>
      <input type="text" id="knLinkSearch" placeholder="タイトルで検索..." oninput="filterLinkModal(this.value)" autocomplete="off">
      <button class="btn btn-outline btn-sm" onclick="closeLinkModal()">✕</button>
    </div>
    <div class="kn-modal-body">
      <div class="kn-modal-list" id="knLinkList"></div>
      <div class="kn-modal-preview" id="knLinkPreview">
        <div style="color:var(--text-muted);font-size:13px;padding-top:20px;">エントリを選択するとプレビューが表示されます</div>
      </div>
    </div>
    <div class="kn-modal-footer">
      <span class="kn-modal-footer-hint" id="knLinkModalHint"></span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" onclick="closeLinkModal()">キャンセル</button>
        <button class="btn btn-primary btn-sm" id="knLinkInsertBtn" onclick="insertSelectedLink()" disabled>挿入</button>
      </div>
    </div>
  </div>
</div>

<!-- AI検索モーダル -->
<div id="knAiModal" class="kn-modal-overlay" style="display:none;" onclick="if(event.target===this)closeAiSearch()">
  <div class="kn-ai-box" onclick="event.stopPropagation()">
    <div class="kn-ai-header">
      <div class="kn-ai-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">

<script>
// ─── 状態 ───────────────────────────────────────────────────

// タグフィルタ・顧客フィルタ・グルーピング用

let knCustMap      = {};     // customer_id → customer.name

let knLinkFiltered = [];

knEarlyFetch.then(resp => {

// グローバルクリックハンドラ
document.addEventListener('click', e => {

// ① 画像ドラッグ&ドロップ → R2アップロード → img挿入
document.addEventListener('dragover', ev => {
  const editor = ev.target.closest('.kn-editor, .kn-inline-editor');
  if (!editor) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'copy';
});
document.addEventListener('drop', async ev => {
  const editor = ev.target.closest('.kn-editor, .kn-inline-editor');
  if (!editor) return;
  const files = ev.dataTransfer?.files;
  if (!files || files.length === 0) return;
  const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (imageFiles.length === 0) return;
  ev.preventDefault();
  editor.focus();
  for (const file of imageFiles) {
    const ext = file.type.split('/')[1] || 'png';
    const uploadFile = new File([file], `drop_${Date.now()}.${ext}`, { type: file.type });
    const formData = new FormData();
    formData.append('file', uploadFile);
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const resp = await res.json();
      if (resp.ok && resp.key) {
        const imgEl = document.createElement('img');
        imgEl.src = `/api/file/${resp.key}`;
        imgEl.style.maxWidth = '100%'; imgEl.alt = '画像';
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0) {
          const range = sel.getRangeAt(0);
          range.deleteContents(); range.insertNode(imgEl);
          range.setStartAfter(imgEl); range.collapse(true);
          sel.removeAllRanges(); sel.addRange(range);
        } else { editor.appendChild(imgEl); }
      }
    } catch (err) { alert('画像アップロード失敗: ' + err.message); }
  }
});

// ② 画像ペースト → R2アップロード → img挿入
document.addEventListener('paste', async ev => {
  const editor = ev.target.closest('.kn-editor, .kn-inline-editor');
  if (!editor) return;
  const items = ev.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      ev.preventDefault();
      const file = item.getAsFile();
      if (!file) continue;
      const ext = file.type.split('/')[1] || 'png';
      const uploadFile = new File([file], `paste_${Date.now()}.${ext}`, { type: file.type });
      const formData = new FormData();
      formData.append('file', uploadFile);
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const resp = await res.json();
        if (resp.ok && resp.key) {
          editor.focus();
          const imgEl = document.createElement('img');
          imgEl.src = `/api/file/${resp.key}`;
          imgEl.style.maxWidth = '100%'; imgEl.alt = '画像';
          const sel = window.getSelection();
          if (sel && sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            range.deleteContents(); range.insertNode(imgEl);
            range.setStartAfter(imgEl); range.collapse(true);
            sel.removeAllRanges(); sel.addRange(range);
          } else { editor.appendChild(imgEl); }
        }
      } catch (err) { alert('画像アップロード失敗: ' + err.message); }
      return;
    }
  }
});

async function loadKnowledge() {
  try {
    // Fix A: 常に全件取得してknAllEntriesを更新（移動モーダル用）
    const allRes = await fetch('/api/knowledge?limit=200');
    const allResp = await allRes.json();
    knAllEntries = allResp.entries || [];

    // タグ一覧をフィルタ適用前に更新（チップ表示用）
    knAllTags = [...new Set(knAllEntries.flatMap(e => Array.isArray(e.tags) ? e.tags : []))].sort();

    // 検索・フィルタ適用
    const hasFilter = knSearchQ || knTypeFilter || knCustFilter || knTagFilter.length > 0;
    let entries;
    if (hasFilter) {
      const params = new URLSearchParams({ limit: '200' });
      if (knSearchQ) params.set('q', knSearchQ);
      if (knTypeFilter) params.set('source_type', knTypeFilter);
      if (knCustFilter) params.set('customer_id', knCustFilter);
      const res = await fetch(`/api/knowledge?${params}`);
      const resp = await res.json();
      entries = resp.entries || [];
      // タグフィルタをクライアント側で適用
      if (knTagFilter.length > 0) {
        entries = entries.filter(e => {
          const tags = Array.isArray(e.tags) ? e.tags : [];
          return knTagFilterMode === 'and'
            ? knTagFilter.every(t => tags.includes(t))
            : knTagFilter.some(t => tags.includes(t));
        });
      }
    } else {
      entries = knAllEntries;
    }

    knEntries = entries;
    buildTagBar();
    renderSidebar();
    if (knCurrentId) {
      const e = knEntries.find(x => x.id === knCurrentId);
      if (e && !knInlineEditId) renderDetail(e);
    }
  } catch (e) {
    document.getElementById('knList').innerHTML =
      `<div class="kn-empty-list" style="color:var(--danger);">読み込み失敗: ${e.message}</div>`;
  }
}

async function migrateOldEntries() {
  const needsMigration = knEntries.filter(e =>
    e.source_type === 'manual' && e.body &&
    (/\*\*[^*]+\*\*/.test(e.body) || /\[\[id:[^\]]+\]\]/.test(e.body) ||
     /^\|.+\|$/m.test(e.body) || /^#{1,3} /.test(e.body) || /^[-*] /.test(e.body))
  );
  if (!needsMigration.length) { localStorage.setItem('kn_migrated_v2', '1'); return; }
  for (const entry of needsMigration) {
    try {
      await fetch(`/api/knowledge?id=${encodeURIComponent(entry.id)}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: entry.title, body: convertMdToHtml(entry.body || ''), tags: entry.tags, parent_id: entry.parent_id || null })
      });
    } catch {}
  }
  localStorage.setItem('kn_migrated_v2', '1');
  await loadKnowledge();
}

function convertMdToHtml(text) {
  if (!text) return '';
  text = text.replace(/\[\[id:([^\]|]+)\|([^\]]*)\]\]/g, (_, id, display) =>
    `<a class="kn-wiki" data-id="${id}" href="#">${esc(display)}</a>`);
  text = parseGFMTables(text);
  let html = text
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^---+$/gm, '<hr>').replace(/^[-*] (.+)$/gm, '<li>$1</li>').replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]+?<\/li>)(\n|$)/g, m => '<ul>' + m.trim() + '</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  html = html.split(/\n\n+/).map(block => {
    block = block.trim(); if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr|table|a )/.test(block)) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');
  return html;
}

// ─── 検索・フィルタ ─────────────────────────────────────────

let knFocusMode = false;

// ─── サイドバー（50音自動ソート）────────────────────────────
function renderSidebar() {
  const el = document.getElementById('knList');
  if (!knEntries.length) { el.innerHTML = '<div class="kn-empty-list">ナレッジがありません</div>'; updateSelectionBar(); return; }
  if (knSearchQ) { el.innerHTML = knEntries.map(e => renderFlatItem(e)).join(''); updateSelectionBar(); return; }
  const manual   = knEntries.filter(e => e.source_type === 'manual');
  const notes    = knEntries.filter(e => e.source_type === 'task_note');
  const meetings = knEntries.filter(e => e.source_type === 'customer_meeting');
  let html = '';
  if (!knTypeFilter || knTypeFilter === 'manual') {
    if (!knTypeFilter && (notes.length || meetings.length)) html += `<div class="kn-section-header">${icon('folder',12,'currentColor')} 企業のお医者さん</div>`;
    html += manual.length ? renderTree(manual) : (knTypeFilter === 'manual' ? '<div class="kn-empty-list">ナレッジがありません</div>' : '');
  }
  if (!knTypeFilter || knTypeFilter === 'task_note') {
    if (!knTypeFilter && notes.length) html += `<div class="kn-section-header">${icon('file-text',12,'currentColor')} タスクメモ</div>`;
    html += renderGrouped(notes, e => e.title, key => key);
  }
  if (!knTypeFilter || knTypeFilter === 'customer_meeting') {
    if (!knTypeFilter && meetings.length) html += `<div class="kn-section-header">${icon('users',12,'currentColor')} 面談記録</div>`;
    html += renderGrouped(meetings, e => e.customer_id || '', key => knCustMap[key] || key || '（顧客なし）');
  }
  el.innerHTML = html || '<div class="kn-empty-list">ナレッジがありません</div>';
  updateSelectionBar();
}

// ─── グルーピング表示（タスクメモ・面談記録用） ──────────────
function renderGrouped(entries, getKey, getLabel) {
  if (!entries.length) return '';

  // キーでグルーピング
  const groups = new Map();
  for (const e of entries) {
    const key = getKey(e) || '（グループなし）';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(e);
  }

  // グループが1つだけならフラット表示
  if (groups.size === 1) {
    return [...groups.values()][0].map(e => renderFlatItem(e)).join('');
  }

  let html = '';
  for (const [key, items] of groups) {
    const label = getLabel(key);
    const gid = 'grp_' + btoa(unescape(encodeURIComponent(key))).slice(0, 12);
    const isOpen = knGroupExpandedIds.has(gid);
    html += `<div class="kn-tree-item" onclick="toggleGroupExpand('${gid}')">
      <span class="kn-tree-toggle" style="font-size:9px;">${isOpen ? '▼' : '▶'}</span>
      <span class="kn-tree-item-title">${esc(label)}</span>
      <span class="kn-tree-item-count">${items.length}件</span>
    </div>`;
    if (isOpen) html += items.map(e => renderFlatItem(e, 14)).join('');
  }
  return html;
}

function toggleGroupExpand(gid) {
  if (knGroupExpandedIds.has(gid)) knGroupExpandedIds.delete(gid); else knGroupExpandedIds.add(gid);
  renderSidebar();
}

// ─── タグフィルタ ────────────────────────────────────────────
function buildTagBar() {
  const bar = document.getElementById('knTagFilterBar');
  const chips = document.getElementById('knTagChips');
  if (!bar || !chips) return;
  if (knAllTags.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const TAG_LIMIT = 10;
  const shownTags = knAllTags.slice(0, TAG_LIMIT);
  knTagFilter.forEach(t => { if (!shownTags.includes(t) && knAllTags.includes(t)) shownTags.push(t); });
  chips.innerHTML = shownTags.map(t =>
    `<span class="kn-tag-chip-filter${knTagFilter.includes(t) ? ' active' : ''}"
      onclick="onTagChipClick('${t.replace(/'/g, "\\'")}')">${esc(t)}</span>`
  ).join('');
  const modeBtn = document.getElementById('knTagModeBtn');
  if (modeBtn) {
    modeBtn.textContent = knTagFilterMode.toUpperCase();
    modeBtn.className = 'kn-tag-mode-btn' + (knTagFilterMode === 'and' ? ' and-mode' : '');
  }
  const clearBtn = document.getElementById('knTagClearBtn');
  if (clearBtn) clearBtn.style.display = knTagFilter.length > 0 ? '' : 'none';
}

function onTagChipClick(tag) {
  const idx = knTagFilter.indexOf(tag);
  if (idx >= 0) knTagFilter.splice(idx, 1); else knTagFilter.push(tag);
  loadKnowledge();
}

function toggleTagMode() {
  knTagFilterMode = knTagFilterMode === 'or' ? 'and' : 'or';
  if (knTagFilter.length > 0) loadKnowledge(); else buildTagBar();
}

function clearTagFilter() {
  knTagFilter = [];
  loadKnowledge();
}

// ─── 顧客フィルタ ────────────────────────────────────────────
function buildCustFilter() {
  const sel = document.getElementById('knCustFilterEl');
  if (!sel) return;
  const custs = Object.entries(knCustMap);
  if (!custs.length) { sel.style.display = 'none'; return; }
  sel.style.display = '';
  const cur = sel.value;
  sel.innerHTML = '<option value="">顧客：すべて</option>' +
    custs.sort((a, b) => (a[1] || '').localeCompare(b[1] || '', 'ja'))
      .map(([id, name]) => `<option value="${id}"${id === cur ? ' selected' : ''}>${esc(name)}</option>`).join('');
}

function onKnCustFilter(v) { knCustFilter = v; loadKnowledge(); }

// ─── 関連ナレッジ抽出（本文の wiki link から） ───────────────
function extractRelatedEntries(htmlBody) {
  if (!htmlBody) return [];
  const seen = new Set();
  const result = [];
  // HTML形式：<a class="kn-wiki" data-id="xxx">
  const re1 = /data-id="([^"]+)"/g;
  let m;
  while ((m = re1.exec(htmlBody)) !== null) {
    if (!seen.has(m[1]) && m[1] !== knCurrentId) {
      seen.add(m[1]);
      const e = knEntries.find(x => x.id === m[1]);
      if (e) result.push(e);
    }
  }
  // Markdown形式（未変換残骸対応）
  const re2 = /\[\[id:([^\]|]+)\|/g;
  while ((m = re2.exec(htmlBody)) !== null) {
    if (!seen.has(m[1]) && m[1] !== knCurrentId) {
      seen.add(m[1]);
      const e = knEntries.find(x => x.id === m[1]);
      if (e) result.push(e);
    }
  }
  return result;
}

function renderTree(entries) {
  const map = new Map(entries.map(e => [e.id, { ...e, _children: [] }]));
  const roots = [];
  for (const node of map.values()) {
    if (node.parent_id && map.has(node.parent_id)) map.get(node.parent_id)._children.push(node);
    else roots.push(node);
  }
  // 手動順: sort_order ASC (NULL は末尾) → created_at ASC
  const sortManual = arr => arr.sort((a, b) => {
    const ao = a.sort_order ?? Infinity, bo = b.sort_order ?? Infinity;
    if (ao !== bo) return ao - bo;
    return (a.created_at || '').localeCompare(b.created_at || '');
  });
  sortManual(roots); roots.forEach(r => sortManual(r._children));
  return roots.map(r => renderTreeNode(r, 0)).join('');
}

function renderTreeNode(node, depth) {
  const hasChildren = node._children && node._children.length > 0;
  const isExpanded = knExpandedIds.has(node.id);
  const isActive = node.id === knCurrentId;
  const indent = depth * 14;
  // active 時は左ボーダー 3px 分を padding から引いて位置を揃える
  const padLeft = 12 + indent - (isActive ? 3 : 0);
  const toggle = hasChildren
    ? `<span class="kn-tree-toggle" onclick="toggleExpand('${node.id}',event)" style="font-size:9px;">${isExpanded ? '▼' : '▶'}</span>`
    : `<span class="kn-tree-toggle-placeholder"></span>`;
  const countBadge = hasChildren ? `<span class="kn-tree-item-count">${node._children.length}件</span>` : '';
  const isSelected = knSelectedIds.has(node.id);
  const cbHtml = `<input type="checkbox" class="kn-select-cb" ${isSelected ? 'checked' : ''}
    onclick="toggleKnSelect('${node.id}',event)" title="選択">`;
  let html = `<div class="kn-tree-item${isActive ? ' active' : ''}${isSelected ? ' kn-selected' : ''}" data-id="${node.id}" style="padding-left:${padLeft}px;"
    onclick="selectEntry('${node.id}')">
    ${toggle}
    ${cbHtml}
    <span class="kn-tree-item-title">${esc(node.title || '（タイトルなし）')}</span>
    ${countBadge}
  </div>`;
  if (hasChildren && isExpanded) html += node._children.map(c => renderTreeNode(c, depth + 1)).join('');
  return html;
}

function renderFlatItem(e, indent = 0) {
  const isActive = e.id === knCurrentId;
  const isSelected = knSelectedIds.has(e.id);
  // active 時は左ボーダー 3px 分を padding から引いて位置を揃える（renderTreeNode と同様）
  const padLeft = 12 + indent - (isActive ? 3 : 0);
  const cbHtml = e.source_type === 'manual'
    ? `<input type="checkbox" class="kn-select-cb" ${isSelected ? 'checked' : ''}
         onclick="toggleKnSelect('${e.id}',event)" title="選択">`
    : '';
  return `<div class="kn-tree-item${isActive ? ' active' : ''}${isSelected ? ' kn-selected' : ''}" data-id="${e.source_type === 'manual' ? e.id : ''}" style="padding-left:${padLeft}px;" onclick="selectEntry('${e.id}')">
    <span class="kn-tree-toggle-placeholder"></span>
    ${cbHtml}
    <span class="kn-tree-item-title">${esc(e.title || '（タイトルなし）')}</span>
  </div>`;
}

function toggleExpand(id, event) {
  event.stopPropagation();
  if (knExpandedIds.has(id)) knExpandedIds.delete(id); else knExpandedIds.add(id);
  saveExpandedIds(); renderSidebar();
}

// ─── AI検索 ─────────────────────────────────────────────────
let knAiLoading = false;
function openAiSearch() { document.getElementById('knAiModal').style.display = 'flex'; document.getElementById('knAiInput').focus(); }
function closeAiSearch() { document.getElementById('knAiModal').style.display = 'none'; }

async function sendAiQuestion() {
  if (knAiLoading) return;
  const input = document.getElementById('knAiInput');
  const question = input.value.trim();
  if (!question) return;
  input.value = ''; knAiLoading = true;
  const sendBtn = document.getElementById('knAiSendBtn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.innerHTML = icon('loader',12,'currentColor'); }
  const body = document.getElementById('knAiBody');
  const userDiv = document.createElement('div');
  userDiv.className = 'kn-ai-msg kn-ai-msg-user';
  userDiv.textContent = question;
  body.appendChild(userDiv);
  const aiDiv = document.createElement('div');
  aiDiv.className = 'kn-ai-msg kn-ai-msg-assistant';
  aiDiv.innerHTML = '<span style="color:var(--text-muted);font-style:italic;">考え中...</span>';
  body.appendChild(aiDiv);
  body.scrollTop = body.scrollHeight;
  try {
    const res = await fetch('/api/ai-search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    if (!res.ok) throw new Error('API error: ' + res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', fullText = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const parsed = JSON.parse(raw);
          if (parsed.type === 'sources' && parsed.sources?.length) {
            const srcHtml = `<div class="kn-ai-sources"><div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">📎 参照元</div>
              ${parsed.sources.map(s => {
                const bc = s.source_type === 'manual' ? 'kn-badge-manual' : s.source_type === 'task_note' ? 'kn-badge-note' : 'kn-badge-meeting';
                const bl = s.source_type === 'manual' ? '企業のお医者さん' : s.source_type === 'task_note' ? 'タスク' : '面談';
                return `<span class="kn-ai-source-chip" onclick="closeAiSearch();selectEntry('${s.id}')"><span class="kn-badge ${bc}" style="font-size:8px;">${bl}</span> ${esc(s.title || s.id)}</span>`;
              }).join('')}</div>`;
            aiDiv.innerHTML = (fullText ? renderMarkdown(fullText) : '') + srcHtml;
          } else if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
            fullText += parsed.delta.text;
            aiDiv.innerHTML = renderMarkdown(fullText);
          }
        } catch {}
      }
      body.scrollTop = body.scrollHeight;
    }
    if (!fullText) aiDiv.innerHTML = '<span style="color:var(--text-muted);">応答がありませんでした</span>';
  } catch (e) {
    aiDiv.innerHTML = `<span style="color:var(--danger);">エラー: ${esc(e.message)}</span>`;
  } finally {
    knAiLoading = false;
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '送信'; }
    body.scrollTop = body.scrollHeight;
  }
}

// ─── エントリ選択 ────────────────────────────────────────────
async function selectEntry(id, pushHistory = true) {
  // 編集中なら切替前に保存を完走させる（デバウンス中のautoSave消失を防ぐ）
  if (knInlineEditId && knInlineEditId !== id) {
    clearTimeout(_autoSaveTimer);
    try { await autoSaveNow(knInlineEditId); } catch(e) {}
  }
  if (pushHistory) history.pushState({ entryId: id }, '', '#' + id);
  knCurrentId = id; knInlineEditId = null;
  renderSidebar();
  const e = knEntries.find(x => x.id === id);
  if (e) renderDetail(e);
  closeLinkModal();
}

function getBreadcrumb(id) {
  const chain = []; let cur = knEntries.find(e => e.id === id); const visited = new Set();
  while (cur && !visited.has(cur.id)) { chain.unshift(cur); visited.add(cur.id); cur = cur.parent_id ? knEntries.find(e => e.id === cur.parent_id) : null; }
  return chain;
}
function goKnRoot() {
  knCurrentId = null; renderSidebar();
  document.getElementById('knDetail').innerHTML = `<div class="kn-welcome"><div class="kn-welcome-icon">${icon('book-open',32,'#94a3b8')}</div><div class="kn-welcome-title">ナレッジを選択</div><div class="kn-welcome-desc">左のリストからエントリを選んでください</div></div>`;
}
function renderBreadcrumb(id) {
  const chain = getBreadcrumb(id);
  const sep = `<span style="color:var(--text-muted);margin:0 2px;">/</span>`;
  const root = `<a class="kn-breadcrumb-link" onclick="goKnRoot()">企業のお医者さん</a>`;
  const current = chain[chain.length - 1];
  const parents = chain.slice(0, -1).map(e => `<a class="kn-breadcrumb-link" onclick="selectEntry('${e.id}')">${esc(e.title || '（タイトルなし）')}</a>`);
  const currentSpan = `<span style="color:var(--text-sub);">${esc(current?.title || '（タイトルなし）')}</span>`;
  const parts = [root, ...parents, currentSpan];
  return `<div class="kn-breadcrumb">${parts.join(` ${sep} `)}</div>`;
}

// ─── 面談構造化データ表示（customers.html と同じ構成） ────────
function renderMeetingBody(e) {
  let s = {};
  try { s = JSON.parse(e.structured || '{}'); } catch { s = {}; }

  function section(icon, label, content, isPreWrap) {
    if (!content || (Array.isArray(content) ? !content.length : !content.trim())) return '';
    const body = Array.isArray(content)
      ? `<ul style="margin:0;padding-left:18px;">${content.map(x => `<li style="font-size:12px;line-height:1.7;color:var(--text);">${esc(x)}</li>`).join('')}</ul>`
      : `<div style="font-size:12px;${isPreWrap ? 'white-space:pre-wrap;' : ''}line-height:1.6;color:var(--text);">${esc(content)}</div>`;
    return `<div style="margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:4px;">${icon} ${label}</div>
      ${body}
    </div>`;
  }

  const parts = [
    section(icon('clipboard',11,'currentColor'), '過程・議事', s.process, true),
    section(icon('file-text',11,'currentColor'), 'メモ',       s.content, false),
    section(icon('bot',11,'#764ba2'),            'AI要約',     s.aiSummary, false),
    section(icon('bar-chart',11,'currentColor'), '財務メモ',   s.financialNote, false),
    section(icon('check-circle',11,'#22c55e'),   'アクションプラン', s.actionPlan, false),
    section(icon('alert-triangle',11,'#f59e0b'), '経営課題',   s.issues, false),
    section(icon('target',11,'#3b82f6'),         '次回アクション', s.nextActions, false),
  ].filter(Boolean);

  return parts.length
    ? `<div class="kn-meeting-structured">${parts.join('')}</div>`
    : `<div style="color:var(--text-muted);font-size:12px;">（内容なし）</div>`;
}

  const tagHtml = tags.map(t => `<span class="kn-tag" style="font-size:11px;">${esc(t)}</span>`).join('');
  const breadcrumb = isManual ? renderBreadcrumb(e.id) : '';

  const moveBtnHtml = `<button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 9px;" onclick="openMoveModal('${e.id}')" title="親ナレッジを変更">${icon('folder',11,'currentColor')} 移動</button>`;
  const copyBtnHtml = `<button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 9px;" onclick="copyBodyText('${e.id}')" id="knCopyBtn_${e.id}" title="本文テキストをクリップボードにコピー">${icon('clipboard',11,'currentColor')} コピー</button>`;
  const dateLabelHtml = `<span style="font-size:11px;color:var(--text-muted);margin-left:2px;">更新: ${date}</span>`;
  // manualエントリは常時編集可能なのでEditボタン不要。保存バッジを代わりに配置
  const actionBtnsHtml = isManual
    ? `${historyBtnHtml}${moveBtnHtml}${copyBtnHtml}<button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border-color:#fca5a5;font-size:11px;padding:2px 8px;" onclick="deleteEntry('${e.id}')">${icon('trash',11,'#dc2626')}</button><span id="knAutoSaveStatus" class="kn-save-badge"></span>${dateLabelHtml}`
    : isNote
      ? `${editBtnHtml}${sourceLink(e)}`
      : sourceLink(e);

  // 本文：manualは常時編集可能div・ページブロック込み、それ以外は既存の読み取り専用
  const bodyResult = isManual
    ? buildBodyWithBlocks(e)

  document.getElementById('knDetail').innerHTML = `
    <div class="kn-detail-header">

        <div class="kn-detail-title" id="knInlineTitle">${esc(e.title || '（タイトルなし）')}</div>
        <div class="kn-title-btns" id="knTitleBtns">${actionBtnsHtml}</div>
      </div>
      <div class="kn-detail-meta">${isManual ? tagHtml : `<span class="kn-badge ${badgeClass}" style="font-size:10px;">${badgeLabel}</span>${tagHtml}<span style="font-size:11px;color:var(--text-muted);">更新: ${date}</span>`}</div>
    </div>
    <div class="kn-detail-body">
      ${isManual
        ? `<div class="kn-editor-wrap"><div id="knBlockInsertBtn" class="kn-blk-add" title="ブロックを挿入">＋</div><div class="kn-always-editor" id="knBodyPreview" contenteditable="true" spellcheck="false">${bodyResult.html}</div></div>`
        : `<div class="md-preview" id="knBodyPreview">${bodyResult.html}</div>`}
      <div style="margin-bottom:14px;">

  loadBacklinks(e.id);

// ─── ページブロック構築 ─────────────────────────────────────
function buildPageBlockHtml(id, title) {
  return `<div class="kn-page-block" data-id="${id}" contenteditable="false" draggable="true"><span class="kn-page-block-handle">⋮⋮</span><span class="kn-page-block-icon">📄</span><span class="kn-page-block-title">${esc(title)}</span></div>`;
}

function buildBodyWithBlocks(e) {
  const temp = document.createElement('div');
  temp.innerHTML = e.body || '';

  // 既存ページブロックを更新（削除済みエントリへの参照はブロックごと除去）
  let hadStaleBlocks = false;
  temp.querySelectorAll('.kn-page-block[data-id]').forEach(block => {
    const childId = block.dataset.id;
    const child = knEntries.find(x => x.id === childId);
    if (!child) { block.remove(); hadStaleBlocks = true; return; }
    block.setAttribute('contenteditable', 'false');
    block.setAttribute('draggable', 'true');
    block.innerHTML = `<span class="kn-page-block-handle">⋮⋮</span><span class="kn-page-block-icon">📄</span><span class="kn-page-block-title">${esc(child.title || '（タイトルなし）')}</span>`;
  });

  // 本文に未登録の子（孤立サブページ）を末尾に追加
  const inBodyIds = new Set();
  temp.querySelectorAll('.kn-page-block[data-id]').forEach(b => inBodyIds.add(b.dataset.id));
  const orphans = knEntries.filter(x => x.source_type === 'manual' && x.parent_id === e.id && !inBodyIds.has(x.id));
  orphans.forEach(c => {
    const d = document.createElement('div');
    d.innerHTML = buildPageBlockHtml(c.id, c.title || '（タイトルなし）');
    temp.appendChild(d.firstChild);
  });

  // 孤立ブロック追加時のみ末尾に空段落を付与（以降は保存済みHTMLを尊重・自動挿入しない）
  if (orphans.length > 0) {
    const last = temp.lastElementChild;
    if (!last || last.classList?.contains('kn-page-block')) {
      const p = document.createElement('p');
      p.innerHTML = '<br>';
      temp.appendChild(p);
    }
  }

  return { html: temp.innerHTML || '<p><br></p>', hadOrphans: orphans.length > 0 || hadStaleBlocks };
}

// ─── 常時編集モードのセットアップ ────────────────────────────
function setupAlwaysEditableMode(id, hadOrphans) {
  clearAutoSave();
  teardownFloatingToolbar();

  const e = knEntries.find(x => x.id === id);
  if (!e || e.source_type !== 'manual') return;

  knInlineEditId = id;
  const editorEl = document.getElementById('knBodyPreview');
  const titleEl  = document.getElementById('knInlineTitle');
  if (!editorEl) return;

  if (titleEl) titleEl.setAttribute('contenteditable', 'true');

  const handler = () => {
    clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(() => autoSaveNow(id), 1000);
  };
  editorEl.addEventListener('input', handler);
  if (titleEl) titleEl.addEventListener('input', handler);

  window._autoSaveOnBlur = () => autoSaveNow(id);
  window._autoSaveBlurEl = editorEl;
  editorEl.addEventListener('blur', window._autoSaveOnBlur);

  window._autoSaveBeforeUnload = () => autoSaveNow(id);
  window.addEventListener('beforeunload', window._autoSaveBeforeUnload);
  window._autoSaveOnHide = () => { if (document.visibilityState === 'hidden') autoSaveNow(id); };
  document.addEventListener('visibilitychange', window._autoSaveOnHide);
  window._autoSaveOnPageHide = () => autoSaveNow(id);
  window.addEventListener('pagehide', window._autoSaveOnPageHide);

  // 貼り付け時：貼り付け先のフォントサイズを保持して挿入（上書き時にサイズがリセットされるのを防ぐ）
  editorEl.addEventListener('paste', ev => {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const node = range.startContainer.nodeType === Node.TEXT_NODE
      ? range.startContainer.parentElement
      : range.startContainer;
    const destSize  = window.getComputedStyle(node).fontSize;
    const baseSize  = window.getComputedStyle(editorEl).fontSize;
    // フォントサイズがデフォルトと同じならブラウザ標準の貼り付けに任せる
    if (destSize === baseSize) return;
    ev.preventDefault();
    const text = (ev.clipboardData || window.clipboardData).getData('text/plain');
    if (!text) return;
    const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                     .replace(/\n/g,'<br>');
    document.execCommand('insertHTML', false, `<span style="font-size:${destSize}">${safe}</span>`);
  });

  setupFloatingToolbar();
  setupPageBlockEvents(editorEl, id);
  setupBlockInsertBtn(editorEl, id);

  // 孤立サブページを注入した場合は自動保存して確定する
  if (hadOrphans) {
    clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(() => autoSaveNow(id), 800);
  }

  // ページ表示時: 本文内ページブロックの DOM 順を sort_order に同期（既存の食い違いを修正）
  _syncChildSortOrders(editorEl);
}

// ─── サブページを指定位置に挿入（afterElement=nullで末尾） ────
async function insertSubpageAt(parentId, afterElement) {
  const title = (prompt('サブページ名を入力してください', '') || '').trim();
  if (!title) return;

  // loadKnowledge() 後にDOMが刷新されるため、挿入位置をindex（整数）で保存しておく
  const editorBefore = document.getElementById('knBodyPreview');
  let insertAfterIndex = -1;
  if (afterElement && editorBefore && editorBefore.contains(afterElement)) {
    insertAfterIndex = Array.from(editorBefore.children).indexOf(afterElement);
  }

  const id  = 'manual_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const now = new Date().toISOString();
  try {
    const res = await fetch('/api/knowledge', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entries: [{ id, source_type: 'manual', source_id: null, title, body: '', tags: [], customer_id: null, parent_id: parentId, created_at: now, updated_at: now }] })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    knExpandedIds.add(parentId); saveExpandedIds();
    await loadKnowledge(); // ← ここでDOMが刷新される
    // 刷新後の新しいエディタ要素を取得
    const editorEl = document.getElementById('knBodyPreview');
    if (editorEl) {
      const tmp = document.createElement('div');
      tmp.innerHTML = buildPageBlockHtml(id, title);
      const block = tmp.firstChild;
      // index が有効なら対応する子要素の後ろに挿入、それ以外は末尾
      if (insertAfterIndex >= 0 && insertAfterIndex < editorEl.children.length) {
        editorEl.children[insertAfterIndex].insertAdjacentElement('afterend', block);
      } else {
        editorEl.appendChild(block);
      }
      clearTimeout(_autoSaveTimer);
      _autoSaveTimer = setTimeout(() => autoSaveNow(parentId), 500);
    }
    renderSidebar();
  } catch (err) { alert('サブページ作成失敗: ' + err.message); }
}

// 末尾ボタン用（後方互換）

// ─── インライン＋ボタンのセットアップ ───────────────────────
let _blkAddMenuEl = null;
let _blkAddTarget = null;

function setupBlockInsertBtn(editorEl, entryId) {
  const btn = document.getElementById('knBlockInsertBtn');
  if (!btn) return;
  const wrap = editorEl.parentElement;
  let hideTimer = null;

  // wrap 外に出たときだけ非表示（btn↔editor 間の移動では発火しない）
  const scheduleHide = () => { clearTimeout(hideTimer); hideTimer = setTimeout(() => btn.classList.remove('visible'), 500); };

  const showAt = (targetEl) => {
    // ＋ボタン自身の上にいる場合 → 現在位置を維持してタイマーをキャンセル
    if (targetEl === btn || btn.contains(targetEl)) { clearTimeout(hideTimer); return; }
    if (!targetEl || !editorEl.contains(targetEl)) return;

    // Fix 2: targetEl が editorEl 自身（空白エリア）の場合は最後の子要素にフォールバック
    if (targetEl === editorEl) {
      const last = editorEl.lastElementChild;
      if (!last) { scheduleHide(); return; }
      targetEl = last;
    }

    let block = targetEl;
    while (block && block.parentElement !== editorEl) block = block.parentElement;
    if (!block || block.classList?.contains('kn-page-block')) { scheduleHide(); return; }
    _blkAddTarget = block;
    const wrapRect = wrap.getBoundingClientRect();
    const bRect    = block.getBoundingClientRect();
    btn.style.top  = (bRect.top - wrapRect.top + (bRect.height / 2 - 10)) + 'px';
    clearTimeout(hideTimer);
    btn.classList.add('visible');
  };

  // wrap 全体で監視（btn 上の mousemove も拾う）
  wrap.addEventListener('mousemove', ev => {
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    showAt(el);
  });
  wrap.addEventListener('mouseleave', scheduleHide);
  btn.addEventListener('mouseenter', () => clearTimeout(hideTimer));

  btn.addEventListener('click', ev => {
    ev.stopPropagation();
    closeBlkAddMenu();
    const menu = document.createElement('div');
    menu.className = 'kn-blk-add-menu';
    menu.innerHTML = `<div class="kn-blk-add-item" data-type="subpage">📄 サブページ</div>`;
    const rect = btn.getBoundingClientRect();
    menu.style.left = (rect.right + 4) + 'px';
    menu.style.top  = rect.top + 'px';
    document.body.appendChild(menu);
    _blkAddMenuEl = menu;
    menu.addEventListener('click', async mev => {
      const type = mev.target.closest('[data-type]')?.dataset.type;
      const after = _blkAddTarget;
      closeBlkAddMenu();
      btn.classList.remove('visible');
      if (type === 'subpage') await insertSubpageAt(entryId, after);
    });
    setTimeout(() => document.addEventListener('click', closeBlkAddMenuOutside), 0);
  });
}
function closeBlkAddMenu() {
  if (_blkAddMenuEl) { _blkAddMenuEl.remove(); _blkAddMenuEl = null; }
  document.removeEventListener('click', closeBlkAddMenuOutside);
}
function closeBlkAddMenuOutside(ev) {
  if (_blkAddMenuEl && !_blkAddMenuEl.contains(ev.target)) closeBlkAddMenu();
}

// ─── ページブロック D&D ──────────────────────────────────────
let _pbDragSrcId   = null;
let _pbDropLine    = null;
let _pbJustDragged = false;
let _pbMenuEl      = null;

function _pbShowMenu(block, blockId) {
  _pbCloseMenu();
  const rect = block.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'kn-pb-menu';
  menu.innerHTML = `
    <div class="kn-pb-menu-item" data-action="move">${icon('folder',13,'currentColor')} 移動</div>
    <div class="kn-pb-menu-item" data-action="copy">${icon('clipboard',13,'currentColor')} 本文コピー</div>
    <div class="kn-pb-menu-item danger" data-action="delete">${icon('trash-2',13,'currentColor')} 削除</div>`;
  menu.style.left = rect.left + 'px';
  menu.style.top  = (rect.bottom + 4) + 'px';
  document.body.appendChild(menu);
  _pbMenuEl = menu;
  menu.addEventListener('click', async ev => {
    const action = ev.target.closest('[data-action]')?.dataset.action;
    _pbCloseMenu();
    if (action === 'move')   openMoveModal(blockId);
    else if (action === 'copy')   copyBodyText(blockId);
    else if (action === 'delete') {
      const parentId = knCurrentId;
      await deleteEntry(blockId);
      if (parentId) selectEntry(parentId);
    }
  });
  setTimeout(() => document.addEventListener('click', _pbCloseMenuOutside), 0);
}
function _pbCloseMenu() {
  if (_pbMenuEl) { _pbMenuEl.remove(); _pbMenuEl = null; }
  document.removeEventListener('click', _pbCloseMenuOutside);
}
function _pbCloseMenuOutside(ev) {
  if (_pbMenuEl && !_pbMenuEl.contains(ev.target)) _pbCloseMenu();
}

function setupPageBlockEvents(editorEl, entryId) {
  // クリック遷移：ハンドルはメニュー、それ以外はページ遷移
  editorEl.addEventListener('click', ev => {
    if (_pbJustDragged) { _pbJustDragged = false; return; }
    // ⋮⋮ ハンドルクリック → コンテキストメニュー
    if (ev.target.closest('.kn-page-block-handle')) {
      const block = ev.target.closest('.kn-page-block');
      if (block) { ev.stopPropagation(); _pbShowMenu(block, block.dataset.id); }
      return;
    }
    const block = ev.target.closest('.kn-page-block');
    if (!block) return;
    const targetId = block.dataset.id;
    if (targetId) selectEntry(targetId);
  });

  // ドラッグ開始（ページブロックのみ許可）
  editorEl.addEventListener('dragstart', ev => {
    const block = ev.target.closest('.kn-page-block');
    if (!block) { ev.preventDefault(); return; }
    _pbDragSrcId = block.dataset.id;
    block.classList.add('dragging');
    ev.dataTransfer.effectAllowed = 'move';
    ev.dataTransfer.setData('text/kn-pb', _pbDragSrcId);
  });

  editorEl.addEventListener('dragend', () => {
    _pbJustDragged = true;
    setTimeout(() => { _pbJustDragged = false; }, 300);
    editorEl.querySelectorAll('.kn-page-block.dragging').forEach(b => b.classList.remove('dragging'));
    _pbHideDropLine();
    _pbDragSrcId = null;
  });

  editorEl.addEventListener('dragover', ev => {
    if (!_pbDragSrcId) return;
    ev.preventDefault();
    ev.dataTransfer.dropEffect = 'move';
    _pbShowDropLine(ev, editorEl);
  });

  editorEl.addEventListener('dragleave', ev => {
    if (!editorEl.contains(ev.relatedTarget)) _pbHideDropLine();
  });

  editorEl.addEventListener('drop', ev => {
    if (!_pbDragSrcId) return;
    ev.preventDefault();
    _pbHideDropLine();
    const srcBlock = editorEl.querySelector(`.kn-page-block[data-id="${_pbDragSrcId}"]`);
    if (!srcBlock) return;
    const { el: target, before } = _pbGetDropTarget(ev, editorEl);
    if (!target)        editorEl.appendChild(srcBlock);
    else if (before)    editorEl.insertBefore(srcBlock, target);
    else                target.insertAdjacentElement('afterend', srcBlock);
    srcBlock.classList.remove('dragging');
    _pbDragSrcId = null;
    // Fix 1: DOM順に合わせてsort_orderを更新 → サイドバーに即反映
    _syncChildSortOrders(editorEl);
    clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(() => autoSaveNow(entryId), 800);
  });
}

function _pbGetDropTarget(ev, editorEl) {
  const children = Array.from(editorEl.childNodes).filter(n => n.nodeType === 1 && !n.classList.contains('dragging'));
  for (const child of children) {
    const rect = child.getBoundingClientRect();
    if (ev.clientY < rect.top + rect.height / 2) return { el: child, before: true };
  }
  return { el: children[children.length - 1] || null, before: false };
}

function _pbShowDropLine(ev, editorEl) {
  _pbHideDropLine();
  if (!_pbDropLine) {
    _pbDropLine = document.createElement('div');
    _pbDropLine.className = 'kn-drop-line';
  }
  const { el: target, before } = _pbGetDropTarget(ev, editorEl);
  if (!target) return;
  if (before) target.insertAdjacentElement('beforebegin', _pbDropLine);
  else        target.insertAdjacentElement('afterend',    _pbDropLine);
  _pbDropLine.classList.add('visible');
}

function _pbHideDropLine() {
  if (_pbDropLine) { _pbDropLine.classList.remove('visible'); _pbDropLine.remove(); }
}

// Fix 1: 本文内ページブロックの DOM 順を sort_order に反映 → サイドバーも即更新
async function _syncChildSortOrders(editorEl) {
  const blocks = Array.from(editorEl.querySelectorAll('.kn-page-block[data-id]'));
  if (blocks.length < 2) return; // 1件以下は並び替え不要
  const orders = blocks.map((b, i) => ({ id: b.dataset.id, sort_order: (i + 1) * 1000 }));
  try {
    const res = await fetch('/api/knowledge', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orders })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    // ローカルキャッシュを更新してサイドバーを即再描画（フルリロード不要）
    const allE = knAllEntries.length ? knAllEntries : knEntries;
    orders.forEach(({ id, sort_order }) => {
      const e = allE.find(x => x.id === id);
      if (e) e.sort_order = sort_order;
      const e2 = knEntries.find(x => x.id === id);
      if (e2) e2.sort_order = sort_order;
    });
    renderSidebar();
  } catch (err) {
    console.warn('sort_order 同期失敗:', err.message);
  }
}
