<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナレッジ | 企業のお医者さん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ─── レイアウト ─── */
  .kn-layout {
    flex: 1; min-height: 0;
    display: flex; overflow: hidden;
  }

  /* ─── 左パネル：リスト ─── */
  .kn-list-col {
    width: 320px; min-width: 240px; max-width: 400px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--bg-card);
    flex-shrink: 0;
  }
  .kn-list-scroll { flex: 1; overflow-y: auto; }
  .kn-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
  }
  .kn-item:hover { background: #f1f5f9; }
  .kn-item.active { background: #e0e7ff; border-left: 3px solid var(--primary); }
  .kn-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
  .kn-item-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .kn-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; white-space: nowrap;
  }
  .kn-badge-manual   { background: #dcfce7; color: #15803d; }
  .kn-badge-note     { background: #dbeafe; color: #1d4ed8; }
  .kn-badge-meeting  { background: #fef3c7; color: #92400e; }
  .kn-item-date { font-size: 10px; color: var(--text-muted); margin-left: auto; }
  .kn-item-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .kn-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 10px;
    background: #f1f5f9; color: var(--text-sub); border: 1px solid var(--border);
  }
  .kn-empty-list {
    text-align: center; padding: 40px 16px; color: var(--text-muted); font-size: 13px;
  }

  /* ─── 右パネル：詳細 ─── */
  .kn-detail-col {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .kn-detail-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .kn-detail-header-info { flex: 1; min-width: 0; }
  .kn-detail-title {
    font-size: 18px; font-weight: 700; color: var(--navy);
    margin-bottom: 6px; line-height: 1.3;
  }
  .kn-detail-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .kn-detail-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .kn-detail-body {
    flex: 1; overflow-y: auto;
    padding: 20px;
  }

  /* Markdown プレビュー */
  .md-preview { font-size: 14px; line-height: 1.8; color: var(--text); }
  .md-preview h1 { font-size: 20px; font-weight: 700; color: var(--navy); margin: 20px 0 8px; }
  .md-preview h2 { font-size: 17px; font-weight: 700; color: var(--navy); margin: 16px 0 6px; }
  .md-preview h3 { font-size: 15px; font-weight: 600; color: var(--navy); margin: 12px 0 4px; }
  .md-preview p  { margin: 0 0 10px; }
  .md-preview ul, .md-preview ol { margin: 0 0 10px; padding-left: 20px; }
  .md-preview li { margin-bottom: 2px; }
  .md-preview strong { font-weight: 700; }
  .md-preview em { font-style: italic; }
  .md-preview code {
    background: #f1f5f9; padding: 1px 5px; border-radius: 3px;
    font-family: monospace; font-size: 12px;
  }
  .md-preview pre {
    background: #f1f5f9; padding: 10px 14px; border-radius: 6px;
    overflow-x: auto; margin: 0 0 10px;
  }
  .md-preview pre code { background: none; padding: 0; }
  .md-preview blockquote {
    border-left: 3px solid var(--border); margin: 0 0 10px;
    padding: 4px 12px; color: var(--text-sub);
  }
  .md-preview hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* ナレッジリンク */
  .kn-link {
    color: var(--primary); text-decoration: none;
    border-bottom: 1px solid currentColor;
    cursor: pointer;
  }
  .kn-link:hover { opacity: 0.75; }
  .kn-broken {
    color: var(--danger); font-size: 0.9em;
    text-decoration: line-through; opacity: 0.7;
  }

  /* バックリンクセクション */
  .kn-backlinks {
    margin-top: 28px; padding-top: 16px;
    border-top: 1px dashed var(--border);
  }
  .kn-backlinks-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .kn-backlink-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 6px;
    cursor: pointer; transition: background .12s;
    font-size: 13px; color: var(--navy);
  }
  .kn-backlink-item:hover { background: #f1f5f9; }

  /* ─── 編集フォーム ─── */
  .kn-edit-form {
    display: flex; flex-direction: column; gap: 12px;
    padding: 20px; flex: 1; overflow-y: auto;
  }
  .kn-form-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
  .kn-form-textarea {
    width: 100%; box-sizing: border-box;
    font-family: 'Noto Sans JP', monospace; font-size: 13px;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    resize: vertical; background: var(--bg); color: var(--text);
    line-height: 1.7;
  }
  .kn-form-textarea:focus { outline: none; border-color: var(--primary); }
  .kn-preview-toggle {
    font-size: 11px; color: var(--text-sub); cursor: pointer;
    text-decoration: underline; margin-top: 2px;
  }
  .kn-source-link {
    font-size: 12px; color: var(--primary); text-decoration: none;
  }
  .kn-source-link:hover { text-decoration: underline; }

  /* ─── 空状態 ─── */
  .kn-welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .kn-welcome-icon { font-size: 48px; margin-bottom: 12px; }
  .kn-welcome-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .kn-welcome-desc { font-size: 13px; }

  /* ─── リンク挿入モーダル ─── */
  .kn-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.4); backdrop-filter: blur(3px);
    z-index: 500; display: flex; align-items: center; justify-content: center;
  }
  .kn-modal-box {
    background: var(--bg-card); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 760px; max-width: 95vw; height: 500px; max-height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .kn-modal-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .kn-modal-header input {
    flex: 1; font-size: 14px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 7px; background: var(--bg);
    outline: none;
  }
  .kn-modal-header input:focus { border-color: var(--primary); }
  .kn-modal-body {
    flex: 1; display: flex; overflow: hidden;
  }
  /* 左：リスト */
  .kn-modal-list {
    width: 280px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .kn-modal-item {
    padding: 9px 12px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .kn-modal-item:hover { background: #f1f5f9; }
  .kn-modal-item.active { background: #e0e7ff; }
  .kn-modal-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .kn-modal-item-meta { display: flex; gap: 6px; margin-top: 2px; align-items: center; }
  /* 右：プレビュー */
  .kn-modal-preview {
    flex: 1; overflow-y: auto; padding: 16px 18px;
  }
  .kn-modal-preview-title {
    font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 10px;
  }
  .kn-modal-preview-body {
    font-size: 13px; line-height: 1.7; color: var(--text);
  }
  .kn-modal-footer {
    padding: 10px 16px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo">
      <img src="logo.png" alt="企業のお医者さん">
    </span>
    <span class="header-divider"></span>
    <span class="header-title">タスク管理</span>
  </div>
  <div class="header-right">
    <div class="header-datetime" id="headerDatetime">
      <span class="header-datetime-date" id="headerDate"></span>
      <span class="header-datetime-time" id="headerTime"></span>
    </div>
    <button id="backupBtn" class="backup-btn" onclick="manualBackup()" title="バックアップ未実施（クリックして実行）">💾</button>
    <div class="user-badge" onclick="switchUser()" title="ユーザーを切り替え">
      <div class="user-avatar" id="headerAvatar">?</div>
      <span class="user-name" id="headerName">未選択</span>
    </div>
  </div>
</header>

<!-- Nav -->
<nav class="nav-tabs">
  <a href="index.html" class="nav-tab">👤 マイタスク</a>
  <a href="project.html" class="nav-tab">📁 プロジェクト</a>
  <a href="gantt.html" class="nav-tab">📊 ガント</a>
  <a href="customers.html" class="nav-tab">👥 顧客</a>
  <span class="nav-tab active">📚 ナレッジ</span>
</nav>

<!-- Toolbar -->
<div class="toolbar">
  <div style="display:flex;gap:6px;align-items:center;flex:1;max-width:400px;">
    <input class="form-input" id="knSearchInput"
      placeholder="🔍 タイトル・本文・タグで検索"
      oninput="onKnSearch(this.value)"
      style="font-size:12px;padding:6px 10px;flex:1;height:32px;">
    <button id="knSearchClear" class="btn btn-outline btn-sm"
      onclick="clearKnSearch()"
      style="display:none;font-size:11px;padding:4px 8px;height:32px;">✕</button>
  </div>
  <select id="knTypeFilterEl" class="form-select"
    style="font-size:12px;padding:5px 8px;width:auto;height:32px;"
    onchange="onKnTypeFilter(this.value)">
    <option value="">すべて</option>
    <option value="manual">手動追加</option>
    <option value="task_note">タスクメモ</option>
    <option value="customer_meeting">面談記録</option>
  </select>
  <div class="toolbar-spacer"></div>
  <button class="btn btn-primary btn-sm" onclick="openNewForm()">＋ ナレッジ追加</button>
</div>

<!-- Main layout -->
<div class="kn-layout">
  <!-- Left: list -->
  <div class="kn-list-col">
    <div class="kn-list-scroll" id="knList">
      <div class="kn-empty-list">読み込み中...</div>
    </div>
  </div>

  <!-- Right: detail -->
  <div class="kn-detail-col" id="knDetail">
    <div class="kn-welcome">
      <div class="kn-welcome-icon">📚</div>
      <div class="kn-welcome-title">ナレッジを選択</div>
      <div class="kn-welcome-desc">左のリストからエントリを選んでください</div>
    </div>
  </div>
</div>

<!-- リンク挿入モーダル -->
<div id="knLinkModal" class="kn-modal-overlay" style="display:none;" onclick="onModalOverlayClick(event)">
  <div class="kn-modal-box" onclick="event.stopPropagation()">
    <div class="kn-modal-header">
      <span style="font-size:14px;font-weight:700;color:var(--navy);white-space:nowrap;">🔗 ナレッジをリンク</span>
      <input type="text" id="knLinkSearch" placeholder="タイトルで検索..."
        oninput="filterLinkModal(this.value)" autocomplete="off">
      <button class="btn btn-outline btn-sm" onclick="closeLinkModal()">✕</button>
    </div>
    <div class="kn-modal-body">
      <div class="kn-modal-list" id="knLinkList"></div>
      <div class="kn-modal-preview" id="knLinkPreview">
        <div style="color:var(--text-muted);font-size:13px;padding-top:20px;">エントリを選択するとプレビューが表示されます</div>
      </div>
    </div>
    <div class="kn-modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeLinkModal()">キャンセル</button>
      <button class="btn btn-primary btn-sm" id="knLinkInsertBtn" onclick="insertSelectedLink()" disabled>挿入</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script src="data.js"></script>
<script>
// ─── 状態 ───────────────────────────────────────────────────
let knEntries = [];
let knCurrentId = null;
let knSearchQ = '';
let knTypeFilter = '';
let knSearchTimer = null;
let showPreview = false;
let showNewPreview = false;
let data = null;
let currentUser = null;

// リンクモーダル状態
let knLinkTargetId = null;   // 挿入先textarea の id
let knLinkSelected = null;   // 選択中エントリ
let knLinkFiltered = [];     // フィルタ後リスト

// ─── 初期化 ─────────────────────────────────────────────────
loadData().then(d => {
  data = d;
  initAuth(data, user => {
    currentUser = user;
    updateHeaderDatetime();
    setInterval(updateHeaderDatetime, 1000);
    updateHeaderUser();
    loadKnowledge();
  });
});

async function loadKnowledge() {
  try {
    const params = new URLSearchParams({ limit: '200' });
    if (knSearchQ) params.set('q', knSearchQ);
    if (knTypeFilter) params.set('source_type', knTypeFilter);

    const res = await fetch(`/api/knowledge?${params}`);
    const resp = await res.json();
    knEntries = resp.entries || [];
    renderList();

    // 選択中エントリがあれば詳細を再描画（リンクタイトル解決のため）
    if (knCurrentId) {
      const e = knEntries.find(x => x.id === knCurrentId);
      if (e) renderDetail(e);
    }
  } catch (e) {
    document.getElementById('knList').innerHTML =
      `<div class="kn-empty-list" style="color:var(--danger);">読み込み失敗: ${e.message}</div>`;
  }
}

// ─── 検索・フィルタ ─────────────────────────────────────────
function onKnSearch(v) {
  knSearchQ = v.trim();
  document.getElementById('knSearchClear').style.display = v ? 'flex' : 'none';
  clearTimeout(knSearchTimer);
  knSearchTimer = setTimeout(() => loadKnowledge(), 300);
}
function clearKnSearch() {
  document.getElementById('knSearchInput').value = '';
  document.getElementById('knSearchClear').style.display = 'none';
  knSearchQ = '';
  loadKnowledge();
}
function onKnTypeFilter(v) {
  knTypeFilter = v;
  loadKnowledge();
}

// ─── リスト描画 ──────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('knList');
  if (!knEntries.length) {
    el.innerHTML = '<div class="kn-empty-list">ナレッジがありません</div>';
    return;
  }
  el.innerHTML = knEntries.map(e => {
    const tags = Array.isArray(e.tags) ? e.tags : [];
    const badgeClass = e.source_type === 'manual' ? 'kn-badge-manual'
                     : e.source_type === 'task_note' ? 'kn-badge-note' : 'kn-badge-meeting';
    const badgeLabel = e.source_type === 'manual' ? '手動'
                     : e.source_type === 'task_note' ? 'タスク' : '面談';
    const date = e.updated_at ? e.updated_at.slice(0, 10) : '';
    const isActive = e.id === knCurrentId ? ' active' : '';
    const tagHtml = tags.length
      ? `<div class="kn-item-tags">${tags.map(t => `<span class="kn-tag">${esc(t)}</span>`).join('')}</div>`
      : '';
    return `<div class="kn-item${isActive}" onclick="selectEntry('${e.id}')">
      <div class="kn-item-title">${esc(e.title || '（タイトルなし）')}</div>
      <div class="kn-item-meta">
        <span class="kn-badge ${badgeClass}">${badgeLabel}</span>
        <span class="kn-item-date">${date}</span>
      </div>
      ${tagHtml}
    </div>`;
  }).join('');
}

// ─── エントリ選択 ────────────────────────────────────────────
function selectEntry(id) {
  knCurrentId = id;
  renderList();
  const e = knEntries.find(x => x.id === id);
  if (e) renderDetail(e);
  // モーダルが開いていれば閉じる
  closeLinkModal();
}

function renderDetail(e) {
  const tags = Array.isArray(e.tags) ? e.tags : [];
  const isManual = e.source_type === 'manual';
  const badgeClass = isManual ? 'kn-badge-manual'
                   : e.source_type === 'task_note' ? 'kn-badge-note' : 'kn-badge-meeting';
  const badgeLabel = isManual ? '手動追加'
                   : e.source_type === 'task_note' ? 'タスクメモ' : '面談記録';
  const date = e.updated_at ? e.updated_at.replace('T', ' ').slice(0, 16) : '';
  const tagHtml = tags.map(t => `<span class="kn-tag">${esc(t)}</span>`).join('');

  const actionBtns = isManual
    ? `<button class="btn btn-outline btn-sm" onclick="startEdit('${e.id}')">✏ 編集</button>
       <button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border-color:#fca5a5;" onclick="deleteEntry('${e.id}')">🗑 削除</button>`
    : sourceLink(e);

  document.getElementById('knDetail').innerHTML = `
    <div class="kn-detail-header">
      <div class="kn-detail-header-info">
        <div class="kn-detail-title">${esc(e.title || '（タイトルなし）')}</div>
        <div class="kn-detail-meta">
          <span class="kn-badge ${badgeClass}">${badgeLabel}</span>
          ${tagHtml}
          <span style="font-size:11px;color:var(--text-muted);">更新: ${date}</span>
        </div>
      </div>
      <div class="kn-detail-actions">${actionBtns}</div>
    </div>
    <div class="kn-detail-body">
      <div class="md-preview">${renderMarkdown(e.body || '')}</div>
      <div class="kn-backlinks" id="knBacklinksSection">
        <div class="kn-backlinks-title">被リンク</div>
        <div id="knBacklinksBody" style="color:var(--text-muted);font-size:12px;">読み込み中...</div>
      </div>
    </div>
  `;
  loadBacklinks(e.id);
}

function sourceLink(e) {
  if (e.source_type === 'task_note') {
    return `<a class="kn-source-link" href="project.html">→ タスクで編集</a>`;
  }
  if (e.source_type === 'customer_meeting') {
    return `<a class="kn-source-link" href="customers.html">→ 顧客で編集</a>`;
  }
  return '';
}

// ─── バックリンク ────────────────────────────────────────────
async function loadBacklinks(id) {
  const el = document.getElementById('knBacklinksBody');
  if (!el) return;
  try {
    const res = await fetch(`/api/knowledge?backlinks=${encodeURIComponent(id)}`);
    const resp = await res.json();
    const entries = resp.entries || [];
    if (!entries.length) {
      el.textContent = 'リンクなし';
      return;
    }
    el.innerHTML = entries.map(e => {
      const badgeClass = e.source_type === 'manual' ? 'kn-badge-manual'
                       : e.source_type === 'task_note' ? 'kn-badge-note' : 'kn-badge-meeting';
      const badgeLabel = e.source_type === 'manual' ? '手動'
                       : e.source_type === 'task_note' ? 'タスク' : '面談';
      return `<div class="kn-backlink-item" onclick="selectEntry('${e.id}')">
        <span class="kn-badge ${badgeClass}">${badgeLabel}</span>
        <span>${esc(e.title || '（タイトルなし）')}</span>
      </div>`;
    }).join('');
  } catch {
    if (el) el.textContent = '読み込み失敗';
  }
}

// ─── 編集モード ──────────────────────────────────────────────
function startEdit(id) {
  const e = knEntries.find(x => x.id === id);
  if (!e || e.source_type !== 'manual') return;
  showPreview = false;
  const tags = Array.isArray(e.tags) ? e.tags.join(', ') : '';

  document.getElementById('knDetail').innerHTML = `
    <div class="kn-detail-header">
      <div class="kn-detail-header-info">
        <div class="kn-detail-title" style="font-size:14px;color:var(--text-sub);">✏ 編集中</div>
      </div>
      <div class="kn-detail-actions">
        <button class="btn btn-primary btn-sm" onclick="saveEdit('${id}')">保存</button>
        <button class="btn btn-outline btn-sm" onclick="cancelEdit('${id}')">キャンセル</button>
      </div>
    </div>
    <div class="kn-edit-form">
      <div>
        <div class="kn-form-label">タイトル</div>
        <input class="form-input" id="editTitle" value="${esc(e.title || '')}"
          style="font-size:14px;font-weight:600;">
      </div>
      <div>
        <div class="kn-form-label" style="display:flex;justify-content:space-between;align-items:center;">
          <span>本文（Markdown可）</span>
          <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;height:24px;"
              onclick="openLinkModal('editBody')">🔗 ナレッジをリンク</button>
            <span class="kn-preview-toggle" onclick="togglePreview('editBody','editPreview')">プレビュー表示</span>
          </div>
        </div>
        <textarea class="kn-form-textarea" id="editBody" rows="16">${esc(e.body || '')}</textarea>
        <div id="editPreview" class="md-preview" style="display:none;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;min-height:120px;"></div>
      </div>
      <div>
        <div class="kn-form-label">タグ（カンマ区切り）</div>
        <input class="form-input" id="editTags" value="${esc(tags)}"
          placeholder="例: 財務, 経営計画" style="font-size:13px;">
      </div>
    </div>
  `;
}

function togglePreview(bodyId, previewId) {
  const body = document.getElementById(bodyId);
  const preview = document.getElementById(previewId);
  if (!body || !preview) return;
  const isHidden = preview.style.display === 'none';
  if (isHidden) {
    preview.style.display = 'block';
    preview.innerHTML = renderMarkdown(body.value);
    body.style.display = 'none';
  } else {
    preview.style.display = 'none';
    body.style.display = 'block';
  }
}

async function saveEdit(id) {
  const title = document.getElementById('editTitle')?.value?.trim() || '';
  let body    = document.getElementById('editBody')?.value || '';
  const tagsRaw = document.getElementById('editTags')?.value || '';
  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  if (!title) { alert('タイトルを入力してください'); return; }
  body = normalizeKnLinks(body);

  try {
    const res = await fetch(`/api/knowledge?id=${encodeURIComponent(id)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body, tags })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    await loadKnowledge();
    const updated = knEntries.find(e => e.id === id);
    if (updated) renderDetail(updated);
  } catch (e) {
    alert('保存失敗: ' + e.message);
  }
}

function cancelEdit(id) {
  const e = knEntries.find(x => x.id === id);
  if (e) renderDetail(e);
}

// ─── 新規作成 ────────────────────────────────────────────────
function openNewForm() {
  knCurrentId = null;
  renderList();
  showNewPreview = false;
  document.getElementById('knDetail').innerHTML = `
    <div class="kn-detail-header">
      <div class="kn-detail-header-info">
        <div class="kn-detail-title" style="font-size:14px;color:var(--text-sub);">＋ 新規ナレッジ</div>
      </div>
      <div class="kn-detail-actions">
        <button class="btn btn-primary btn-sm" onclick="saveNew()">保存</button>
        <button class="btn btn-outline btn-sm" onclick="cancelNew()">キャンセル</button>
      </div>
    </div>
    <div class="kn-edit-form">
      <div>
        <div class="kn-form-label">タイトル</div>
        <input class="form-input" id="newTitle" placeholder="ナレッジのタイトル"
          style="font-size:14px;font-weight:600;">
      </div>
      <div>
        <div class="kn-form-label" style="display:flex;justify-content:space-between;align-items:center;">
          <span>本文（Markdown可）</span>
          <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;height:24px;"
              onclick="openLinkModal('newBody')">🔗 ナレッジをリンク</button>
            <span class="kn-preview-toggle" onclick="togglePreview('newBody','newPreview')">プレビュー表示</span>
          </div>
        </div>
        <textarea class="kn-form-textarea" id="newBody" rows="16"
          placeholder="ナレッジの内容をここに書いてください。Markdownが使えます。&#10;&#10;[[タイトル]] と入力するか、🔗 ボタンでナレッジをリンクできます。"></textarea>
        <div id="newPreview" class="md-preview" style="display:none;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;min-height:120px;"></div>
      </div>
      <div>
        <div class="kn-form-label">タグ（カンマ区切り）</div>
        <input class="form-input" id="newTags" placeholder="例: 財務, 経営計画" style="font-size:13px;">
      </div>
    </div>
  `;
  document.getElementById('newTitle')?.focus();
}

async function saveNew() {
  const title = document.getElementById('newTitle')?.value?.trim() || '';
  let body    = document.getElementById('newBody')?.value || '';
  const tagsRaw = document.getElementById('newTags')?.value || '';
  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  if (!title) { alert('タイトルを入力してください'); return; }
  body = normalizeKnLinks(body);

  const id = 'manual_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const now = new Date().toISOString();

  try {
    const res = await fetch('/api/knowledge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entries: [{
        id, source_type: 'manual', source_id: null,
        title, body, tags, customer_id: null,
        created_at: now, updated_at: now
      }]})
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    await loadKnowledge();
    selectEntry(id);
  } catch (e) {
    alert('保存失敗: ' + e.message);
  }
}

function cancelNew() {
  knCurrentId = null;
  document.getElementById('knDetail').innerHTML = `
    <div class="kn-welcome">
      <div class="kn-welcome-icon">📚</div>
      <div class="kn-welcome-title">ナレッジを選択</div>
      <div class="kn-welcome-desc">左のリストからエントリを選んでください</div>
    </div>`;
}

// ─── 削除 ────────────────────────────────────────────────────
async function deleteEntry(id) {
  const e = knEntries.find(x => x.id === id);
  if (!e || e.source_type !== 'manual') return;
  if (!confirm(`「${e.title}」を削除しますか？この操作は取り消せません。`)) return;
  try {
    const res = await fetch(`/api/knowledge?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    knCurrentId = null;
    await loadKnowledge();
    cancelNew();
  } catch (e) {
    alert('削除失敗: ' + e.message);
  }
}

// ─── リンク正規化 ────────────────────────────────────────────
// [[タイトル]] → [[id:xxx|タイトル]]（保存前に実行）
function normalizeKnLinks(text) {
  return text.replace(/\[\[(?!id:)([^\]]+)\]\]/g, (match, title) => {
    const found = knEntries.find(e => e.title === title.trim());
    if (found) return `[[id:${found.id}|${found.title}]]`;
    return match;
  });
}

// ─── リンク挿入モーダル ──────────────────────────────────────
function openLinkModal(textareaId) {
  knLinkTargetId = textareaId;
  knLinkSelected = null;
  knLinkFiltered = [...knEntries];
  document.getElementById('knLinkSearch').value = '';
  document.getElementById('knLinkInsertBtn').disabled = true;
  document.getElementById('knLinkModal').style.display = 'flex';
  renderLinkModalList();
  renderLinkModalPreview(null);
  document.getElementById('knLinkSearch').focus();
}

function closeLinkModal() {
  document.getElementById('knLinkModal').style.display = 'none';
  knLinkTargetId = null;
  knLinkSelected = null;
}

function onModalOverlayClick(e) {
  if (e.target === document.getElementById('knLinkModal')) closeLinkModal();
}

function filterLinkModal(q) {
  const lower = q.trim().toLowerCase();
  knLinkFiltered = lower
    ? knEntries.filter(e => (e.title || '').toLowerCase().includes(lower))
    : [...knEntries];
  knLinkSelected = null;
  document.getElementById('knLinkInsertBtn').disabled = true;
  renderLinkModalList();
  renderLinkModalPreview(null);
}

function renderLinkModalList() {
  const el = document.getElementById('knLinkList');
  if (!knLinkFiltered.length) {
    el.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text-muted);">見つかりません</div>';
    return;
  }
  el.innerHTML = knLinkFiltered.map(e => {
    const badgeClass = e.source_type === 'manual' ? 'kn-badge-manual'
                     : e.source_type === 'task_note' ? 'kn-badge-note' : 'kn-badge-meeting';
    const badgeLabel = e.source_type === 'manual' ? '手動'
                     : e.source_type === 'task_note' ? 'タスク' : '面談';
    const isActive = knLinkSelected?.id === e.id ? ' active' : '';
    return `<div class="kn-modal-item${isActive}" onclick="selectLinkEntry('${e.id}')">
      <div class="kn-modal-item-title">${esc(e.title || '（タイトルなし）')}</div>
      <div class="kn-modal-item-meta">
        <span class="kn-badge ${badgeClass}" style="font-size:9px;">${badgeLabel}</span>
        <span style="font-size:10px;color:var(--text-muted);">${(e.updated_at||'').slice(0,10)}</span>
      </div>
    </div>`;
  }).join('');
}

function selectLinkEntry(id) {
  knLinkSelected = knEntries.find(e => e.id === id) || null;
  document.getElementById('knLinkInsertBtn').disabled = !knLinkSelected;
  renderLinkModalList();
  renderLinkModalPreview(knLinkSelected);
}

function renderLinkModalPreview(e) {
  const el = document.getElementById('knLinkPreview');
  if (!e) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding-top:20px;">エントリを選択するとプレビューが表示されます</div>';
    return;
  }
  const bodyHtml = e.body
    ? `<div class="kn-modal-preview-body md-preview">${renderMarkdown(e.body)}</div>`
    : '<div style="color:var(--text-muted);font-size:13px;">(本文なし)</div>';
  el.innerHTML = `
    <div class="kn-modal-preview-title">${esc(e.title || '（タイトルなし）')}</div>
    ${bodyHtml}
  `;
}

function insertSelectedLink() {
  if (!knLinkSelected || !knLinkTargetId) return;
  const ta = document.getElementById(knLinkTargetId);
  if (!ta) return;
  const linkText = `[[id:${knLinkSelected.id}|${knLinkSelected.title}]]`;
  const start = ta.selectionStart;
  const end   = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + linkText + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + linkText.length;
  ta.focus();
  closeLinkModal();
}

// ─── Markdown パーサー ───────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';

  // ナレッジリンクをプレースホルダに変換（他のMarkdown処理前に）
  const linkMap = {};
  let linkIdx = 0;
  text = text.replace(/\[\[id:([^\]|]+)\|([^\]]*)\]\]/g, (_, id, display) => {
    const found = knEntries.find(e => e.id === id);
    const label = esc(found ? (found.title || display) : display);
    const key = `\x00KNLINK${linkIdx++}\x00`;
    if (found) {
      linkMap[key] = `<a href="#" class="kn-link" onclick="event.preventDefault();selectEntry('${id}');">${label}</a>`;
    } else {
      linkMap[key] = `<span class="kn-broken" title="リンク切れ"><del>${label}</del></span>`;
    }
    return key;
  });
  // [[タイトル]] パターン（未正規化）
  text = text.replace(/\[\[(?!id:)([^\]]+)\]\]/g, (_, title) => {
    const found = knEntries.find(e => e.title === title.trim());
    const key = `\x00KNLINK${linkIdx++}\x00`;
    if (found) {
      linkMap[key] = `<a href="#" class="kn-link" onclick="event.preventDefault();selectEntry('${found.id}');">${esc(found.title)}</a>`;
    } else {
      linkMap[key] = `<span class="kn-broken" title="リンク切れ">[[${esc(title)}]]</span>`;
    }
    return key;
  });

  let html = text
    .replace(/```[\s\S]*?```/g, m => {
      const code = m.replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
      return `<pre><code>${esc(code)}</code></pre>`;
    })
    .replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`)
    .replace(/^### (.+)$/gm, (_, t) => `<h3>${t}</h3>`)
    .replace(/^## (.+)$/gm,  (_, t) => `<h2>${t}</h2>`)
    .replace(/^# (.+)$/gm,   (_, t) => `<h1>${t}</h1>`)
    .replace(/^---+$/gm, '<hr>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  html = html.replace(/(<li>[\s\S]+?<\/li>)(\n|$)/g, m => '<ul>' + m.trim() + '</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  html = html.split(/\n\n+/).map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr)/.test(block)) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');

  // プレースホルダを戻す
  Object.entries(linkMap).forEach(([key, val]) => {
    html = html.replaceAll(key, val);
  });
  return html;
}

// ─── ユーティリティ ──────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function updateHeaderDatetime() {
  const now = new Date();
  const dateEl = document.getElementById('headerDate');
  const timeEl = document.getElementById('headerTime');
  if (dateEl) dateEl.textContent = now.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
  if (timeEl) timeEl.textContent = now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
}

function updateHeaderUser() {
  if (!currentUser) return;
  const av = document.getElementById('headerAvatar');
  const nm = document.getElementById('headerName');
  if (av) av.textContent = currentUser.avatar || currentUser.name?.[0] || '?';
  if (nm) nm.textContent = currentUser.name || '';
}

function switchUser() {
  clearCurrentUser();
  showUserSelectModal(data, user => {
    currentUser = user;
    updateHeaderUser();
  });
}

async function manualBackup() {
  try {
    await fetch('/api/backup', { method: 'POST' });
    const btn = document.getElementById('backupBtn');
    if (btn) { btn.title = 'バックアップ完了'; btn.style.opacity = '0.6'; }
  } catch {}
}
