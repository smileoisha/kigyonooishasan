function startInlineEdit(id) {
  const e = knEntries.find(x => x.id === id);
  if (!e) return;
  // manualエントリは常時編集可能（setupAlwaysEditableMode済み）
  if (e.source_type === 'manual') {
    if (knCurrentId !== id) selectEntry(id);
    return;
  }
  // 選択されていないエントリを編集しようとした場合は先にselectEntry
  if (knCurrentId !== id) { selectEntry(id); setTimeout(() => startInlineEdit(id), 80); return; }
  knInlineEditId = id;

  // 1) タイトルを contenteditable に（manualのみ）
  const titleEl = document.getElementById('knInlineTitle');
  if (titleEl && e.source_type === 'manual') {
    titleEl.setAttribute('contenteditable', 'true');
    titleEl.focus();
    // カーソルを末尾に
    const range = document.createRange();
    range.selectNodeContents(titleEl); range.collapse(false);
    window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
  }

  // 2) ボタンを Save/Cancel に差し替え
  const btnsEl = document.getElementById('knTitleBtns');
  if (btnsEl) {
    btnsEl.innerHTML = `
      <button class="btn btn-primary btn-sm" style="font-size:11px;padding:2px 9px;" onclick="saveInlineEdit('${id}')">${icon('save',11,'white')} 保存</button>
      <button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;" onclick="cancelInlineEdit('${id}')">✕</button>`;
  }

  // 3) md-preview → インラインエディタに差し替え（IDはknBodyPreviewで統一）
  const previewEl = document.getElementById('knBodyPreview');
  if (previewEl) {
    previewEl.id = 'knBodyPreviewHidden';
    previewEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.id = 'knInlineEditorWrapper';
    const toolbar = buildInlineToolbar('knBodyPreview');
    wrapper.innerHTML = toolbar + `<div class="kn-inline-editor" id="knBodyPreview" contenteditable="true"></div>`;
    previewEl.parentNode.insertBefore(wrapper, previewEl);
    // 本文をセット
    const editorEl = document.getElementById('knBodyPreview');
    if (editorEl) {
      editorEl.innerHTML = e.body || '<p><br></p>';
      setupAutoSave(id);
      setupFloatingToolbar();
    }
  }
}

function applyHeading(tag, divId) {
  if (!tag) return;

}

function applyFontSize(size, divId) {
  if (!size) return;
  const editor = document.getElementById(divId);
  if (!editor) return;
  restoreSavedRange(); // select操作で失われた選択範囲を復元
  // 選択範囲がエディタ内にあることを確認（外にあると document 全体に作用する危険）
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;
  editor.focus();
  document.execCommand('fontSize', false, 7);
  // エディタ外の font[size="7"] が万一あっても触らない
  editor.querySelectorAll('font[size="7"]').forEach(f => {
    const span = document.createElement('span');
    span.style.fontSize = size + 'px';
    while (f.firstChild) span.appendChild(f.firstChild);
    f.parentNode.replaceChild(span, f);
  });
}

function updateFloatingToolbar() {
  const tb = document.getElementById('knFloatingToolbar');
  if (!tb) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) { tb.style.display = 'none'; return; }
  const range = sel.getRangeAt(0);
  const editor = document.getElementById(KN_FT_EDITOR);
  if (!editor || !editor.contains(range.commonAncestorContainer)) { tb.style.display = 'none'; return; }
  const rect = range.getBoundingClientRect();
  if (!rect.width && !rect.height) { tb.style.display = 'none'; return; }
  tb.style.display = 'flex';
  _savedRange = range.cloneRange(); // select操作で失われる前に保存
  const tbW = tb.offsetWidth || 220;
  const tbH = tb.offsetHeight || 36;
  let top = rect.top - tbH - 8;
  let left = rect.left + rect.width / 2 - tbW / 2;
  top = Math.max(4, top);
  left = Math.max(4, Math.min(left, window.innerWidth - tbW - 4));
  tb.style.top = top + 'px';
  tb.style.left = left + 'px';
}

// フローティングツールバーで使う直前の選択範囲（select/dropdown用）
let _savedRange = null;

function restoreSavedRange() {
  if (!_savedRange) return;
  try {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_savedRange);
  } catch(e) {}
}

let _selectionHandler = null;
function setupFloatingToolbar() {
  ensureFloatingToolbar();
  if (_selectionHandler) document.removeEventListener('selectionchange', _selectionHandler);
  _selectionHandler = updateFloatingToolbar;
  document.addEventListener('selectionchange', _selectionHandler);
}
function teardownFloatingToolbar() {
  if (_selectionHandler) {
    document.removeEventListener('selectionchange', _selectionHandler);
    _selectionHandler = null;
  }
  const tb = document.getElementById('knFloatingToolbar');
  if (tb) tb.style.display = 'none';
}

function insertWysiwygTableTo(rows, cols, divId) {
  document.getElementById(divId)?.focus();
  let th = ''; for (let c = 0; c < cols; c++) th += '<th>ヘッダ</th>';
  let tbody = '';
  for (let r = 0; r < rows; r++) { let tds = ''; for (let c = 0; c < cols; c++) tds += '<td>　</td>'; tbody += `<tr>${tds}</tr>`; }
  document.execCommand('insertHTML', false, `<table><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table><p><br></p>`);
  closeTablePicker();
}

async function saveInlineEdit(id) {
  const e = knEntries.find(x => x.id === id);
  if (!e) return;
  const editorEl = document.getElementById('knBodyPreview');
  const titleEl = document.getElementById('knInlineTitle');
  const body = editorEl ? editorEl.innerHTML : (e.body || '');
  const title = (e.source_type === 'manual' && titleEl)
    ? (titleEl.textContent || titleEl.innerText || '').trim() || e.title
    : e.title;

  try {
    if (e.source_type === 'manual') {
      const res = await fetch(`/api/knowledge?id=${encodeURIComponent(id)}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, tags: e.tags, parent_id: e.parent_id || null })
      });
      const resp = await res.json();
      if (!resp.ok) throw new Error(resp.error);
    } else if (e.source_type === 'task_note') {
      let found = false;
      for (const task of (data?.tasks || [])) {
        const note = (task.notes || []).find(n => n.id === e.source_id);
        if (note) { note.content = body; note.updatedAt = new Date().toISOString(); found = true; break; }
      }
      if (!found) { alert('元のタスクノートが見つかりません'); return; }
      await saveData(data);
    } else if (e.source_type === 'customer_meeting') {
      let found = false;
      for (const customer of (data?.customers || [])) {
        const meeting = (customer.meetings || []).find(m => m.id === e.source_id);
        if (meeting) {
          meeting.content = body;
          if (title) meeting.conclusion = title;
          meeting.updatedAt = new Date().toISOString();
          found = true; break;
        }
      }
      if (!found) { alert('元の面談記録が見つかりません'); return; }
      await saveData(data);
    }
    teardownFloatingToolbar();
    clearAutoSave();
    knInlineEditId = null;
    await loadKnowledge();

// ─── 自動保存（3秒デバウンス） ────────────────────────────────
let _autoSaveTimer = null;

function setupAutoSave(id) {
  clearAutoSave();
  const editorEl = document.getElementById('knBodyPreview');
  const titleEl  = document.getElementById('knInlineTitle');
  if (!editorEl) return;

  const handler = () => {
    clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(() => autoSaveNow(id), 500);
  };
  editorEl.addEventListener('input', handler);
  if (titleEl) titleEl.addEventListener('input', handler);
  editorEl._autoSaveHandler = handler;
  if (titleEl) titleEl._autoSaveHandler = handler;

  // エディタからフォーカスが外れた瞬間に即保存（タブ切替で最も確実）
  window._autoSaveOnBlur = () => autoSaveNow(id);
  window._autoSaveBlurEl = editorEl;
  editorEl.addEventListener('blur', window._autoSaveOnBlur);

  // ページ離脱時
  window._autoSaveBeforeUnload = () => autoSaveNow(id);
  window.addEventListener('beforeunload', window._autoSaveBeforeUnload);
  // タブ非表示時（visibilitychange）
  window._autoSaveOnHide = () => { if (document.visibilityState === 'hidden') autoSaveNow(id); };
  document.addEventListener('visibilitychange', window._autoSaveOnHide);
  // pagehide（iOS・タブ閉じ対応）
  window._autoSaveOnPageHide = () => autoSaveNow(id);
  window.addEventListener('pagehide', window._autoSaveOnPageHide);
}

function clearAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = null;
  if (window._autoSaveOnBlur && window._autoSaveBlurEl) {
    window._autoSaveBlurEl.removeEventListener('blur', window._autoSaveOnBlur);
    window._autoSaveOnBlur = null;
    window._autoSaveBlurEl = null;
  }
  if (window._autoSaveBeforeUnload) {
    window.removeEventListener('beforeunload', window._autoSaveBeforeUnload);
    window._autoSaveBeforeUnload = null;
  }
  if (window._autoSaveOnHide) {
    document.removeEventListener('visibilitychange', window._autoSaveOnHide);
    window._autoSaveOnHide = null;
  }
  if (window._autoSaveOnPageHide) {
    window.removeEventListener('pagehide', window._autoSaveOnPageHide);
    window._autoSaveOnPageHide = null;
  }
}

function showAutoSaveStatus(msg, color) {
  let el = document.getElementById('knAutoSaveStatus');
  if (!el) {
    el = document.createElement('span');
    el.id = 'knAutoSaveStatus';
    el.style.cssText = 'font-size:11px;margin-left:10px;transition:opacity 0.5s;';
    const btns = document.getElementById('knTitleBtns');
    if (btns) btns.parentNode.insertBefore(el, btns.nextSibling);
  }
  el.style.opacity = '1';
  el.style.color = color || 'var(--text-muted)';
  el.textContent = msg;
  if (msg.includes('✓')) {
    clearTimeout(el._fadeTimer);
    el._fadeTimer = setTimeout(() => { el.style.opacity = '0'; }, 3000);
  }
}

async function autoSaveNow(id) {
  if (knInlineEditId !== id) return;
  const e = knEntries.find(x => x.id === id);
  if (!e) return;
  const editorEl = document.getElementById('knBodyPreview');
  const titleEl  = document.getElementById('knInlineTitle');
  if (!editorEl) return;

  showAutoSaveStatus('保存中…', 'var(--text-muted)');
  const body  = editorEl.innerHTML;
  const title = (e.source_type === 'manual' && titleEl)
    ? (titleEl.textContent || titleEl.innerText || '').trim() || e.title
    : e.title;
  try {
    if (e.source_type === 'manual') {
      const res = await fetch(`/api/knowledge?id=${encodeURIComponent(id)}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, tags: e.tags, parent_id: e.parent_id || null })
      });
      const resp = await res.json();
      if (!resp.ok) throw new Error(resp.error);
      // ローカルのknEntriesも更新
      e.body = body; e.title = title; e.updated_at = new Date().toISOString();
    } else if (e.source_type === 'task_note') {
      for (const task of (data?.tasks || [])) {
        const note = (task.notes || []).find(n => n.id === e.source_id);
        if (note) { note.content = body; note.updatedAt = new Date().toISOString(); break; }
      }
      await saveData(data);
      // クライアント側キャッシュも更新（別エントリから戻った時に古いbodyが出るのを防ぐ）
      e.body = body; e.updated_at = new Date().toISOString();
    } else if (e.source_type === 'customer_meeting') {
      for (const customer of (data?.customers || [])) {
        const meeting = (customer.meetings || []).find(m => m.id === e.source_id);
        if (meeting) { meeting.content = body; if (title) meeting.conclusion = title; meeting.updatedAt = new Date().toISOString(); break; }
      }
      await saveData(data);
      e.body = body; if (title) e.title = title; e.updated_at = new Date().toISOString();
    }
    showAutoSaveStatus('自動保存済み ✓', 'var(--success)');
  } catch (err) {
    showAutoSaveStatus('自動保存失敗 ⚠', 'var(--danger)');
  }
}

// ─── 履歴差分表示 ───────────────────────────────────────────
function htmlToLines(html) {
  // ページブロックをタイトルテキストに変換
  const s = html
    .replace(/<div[^>]*class="kn-page-block"[^>]*>[\s\S]*?<span[^>]*class="kn-page-block-title"[^>]*>(.*?)<\/span>[\s\S]*?<\/div>/g, '📄 $1')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/p>/gi, '\n')
    .replace(/<\/li>/gi, '\n')
    .replace(/<\/h[1-6]>/gi, '\n')
    .replace(/<[^>]+>/g, '');
  const tmp = document.createElement('div');
  tmp.innerHTML = s;
  return tmp.textContent.split('\n').map(l => l.trim()).filter(l => l.length > 0);
}

function simpleDiff(oldLines, newLines) {
  const MAX = 500;
  const a = oldLines.slice(0, MAX);
  const b = newLines.slice(0, MAX);
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const result = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) { result.unshift({type:'same', text:a[i-1]}); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { result.unshift({type:'add', text:b[j-1]}); j--; }
    else { result.unshift({type:'del', text:a[i-1]}); i--; }
  }
  return result;
}

function showHistoryDiff(knowledgeId, histId) {
  const body = document.getElementById('knHistoryPanelBody');
  if (!body) return;
  const currentEntry = knEntries.find(x => x.id === knowledgeId);
  if (!currentEntry) return;
  const histEntry = (_knHistoryCache[knowledgeId] || []).find(h => h.id === histId);
  if (!histEntry) return;

  const d = new Date(histEntry.saved_at);
  const dateStr = d.toLocaleString('ja-JP', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', timeZone:'Asia/Tokyo'});

  // タイトル差分
  const titleChanged = (currentEntry.title || '') !== (histEntry.title || '');
  const titleHtml = titleChanged
    ? `<div class="kn-diff-line del">${esc(histEntry.title || '（なし）')}</div><div class="kn-diff-line add">${esc(currentEntry.title || '（なし）')}</div>`
    : `<div class="kn-diff-line same">${esc(currentEntry.title || '（なし）')}</div>`;

  // 本文差分
  const oldLines = htmlToLines(histEntry.body || '');
  const newLines = htmlToLines(currentEntry.body || '');
  const diff = simpleDiff(oldLines, newLines);
  const hasChange = diff.some(d => d.type !== 'same');
  const diffHtml = hasChange
    ? diff.map(d => `<div class="kn-diff-line ${d.type}">${esc(d.text)}</div>`).join('')
    : `<div class="kn-diff-nochange">変更なし</div>`;

  body.innerHTML = `
    <div class="kn-diff-header">
      <span class="kn-diff-back" onclick="openHistoryPanel('${knowledgeId}')">← 戻る</span>
      <span class="kn-diff-label">履歴: ${dateStr} との差分</span>
    </div>
    <div class="kn-diff-section">タイトル</div>
    <div class="kn-diff-body">${titleHtml}</div>
    <div class="kn-diff-section">本文</div>
    <div class="kn-diff-body">${diffHtml}</div>`;
}

// 移動モーダルの <select> を DFS 階層順で構築
function _buildMoveSelect(excludeIds, currentParentId) {
  const allE = knAllEntries.length ? knAllEntries : knEntries;
  // 除外IDの子孫を収集
  const excluded = new Set(excludeIds);
  let changed = true;
  while (changed) {
    changed = false;
    for (const e of allE) {
      if (!excluded.has(e.id) && e.parent_id && excluded.has(e.parent_id)) {
        excluded.add(e.id); changed = true;
      }
    }
  }

  // DFS で手動順（sort_order）に並べて select を構築
  const map = new Map(allE.filter(x => x.source_type === 'manual').map(e => [e.id, { ...e, _children: [] }]));
  const roots = [];
  for (const node of map.values()) {
    if (node.parent_id && map.has(node.parent_id)) map.get(node.parent_id)._children.push(node);
    else roots.push(node);
  }
  const sortFn = arr => arr.sort((a, b) => {
    const ao = a.sort_order ?? Infinity, bo = b.sort_order ?? Infinity;
    if (ao !== bo) return ao - bo;
    return (a.created_at || '').localeCompare(b.created_at || '');
  });

  const sel = document.getElementById('knMoveParentSelect');
  sel.innerHTML = '<option value="">(なし＝ルートに移動)</option>';

  function addOptions(nodes, depth) {
    sortFn(nodes).forEach(node => {
      const opt = document.createElement('option');
      opt.value = node.id;
      const prefix = '  '.repeat(depth * 2) + (depth > 0 ? '└ ' : '');
      opt.textContent = prefix + (node.title || '（タイトルなし）');
      if (excluded.has(node.id)) {
        opt.disabled = true;
        opt.style.color = '#aaa';
      } else if (node.id === currentParentId) {
        opt.selected = true;
      }
      sel.appendChild(opt);
      if (node._children.length) addOptions(node._children, depth + 1);
    });
  }
  addOptions(roots, 0);
}

async function executeMoveKnowledge() {
  const newParentId = document.getElementById('knMoveParentSelect').value || null;
  const allE = knAllEntries.length ? knAllEntries : knEntries;

  try {
    if (knMoveBulkIds && knMoveBulkIds.length) {

      for (const id of knMoveBulkIds) {
        const e = allE.find(x => x.id === id);

        const res = await fetch(`/api/knowledge?id=${encodeURIComponent(id)}`, {

        });

      }
      closeMoveModal();
      clearAllSelection();
      await loadKnowledge();
    } else {
      // 単一移動
      if (!knMoveTargetId) return;
      const e = allE.find(x => x.id === knMoveTargetId);
      if (!e) return;
      const res = await fetch(`/api/knowledge?id=${encodeURIComponent(knMoveTargetId)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: e.title, body: e.body || '', tags: e.tags, parent_id: newParentId })
      });
      const resp = await res.json();
      if (!resp.ok) throw new Error(resp.error);
      closeMoveModal();
      await loadKnowledge();
      selectEntry(knMoveTargetId);
    }
  } catch (err) { alert('移動失敗: ' + err.message); }
}

// ─── mouse event ベース並び替え（同階層専用）────────────────────

let _knDragState = null;  // { srcId, srcEl, startX, startY, active, ghost }
let _knDropTarget = null; // { el, before }
let _knScrollTimer = null;

function _knMouseDown(e) {
  const item = e.target.closest('.kn-tree-item[data-id]');
  if (!item) return;
  if (e.target.closest('.kn-tree-toggle')) return; // トグルはドラッグ除外
  if (e.target.classList.contains('kn-select-cb')) return; // チェックボックスはドラッグ除外
  if (e.button !== 0) return; // 左クリックのみ

  const id = item.dataset.id;
  const entry = knEntries.find(x => x.id === id);
  if (!entry || entry.source_type !== 'manual') return;

  // e.preventDefault() はここでは呼ばない（click を壊さないため）
  // テキスト選択防止は mousemove 側で行う
  _knDragState = { srcId: id, srcEl: item, startX: e.clientX, startY: e.clientY, active: false, ghost: null };
  document.addEventListener('mousemove', _knMouseMove);
  document.addEventListener('mouseup', _knMouseUp);
}

function _knMouseMove(e) {
  if (!_knDragState) return;
  const dx = e.clientX - _knDragState.startX;
  const dy = e.clientY - _knDragState.startY;

  if (!_knDragState.active) {
    if (Math.sqrt(dx * dx + dy * dy) < 5) return; // 5px 閾値
    _knDragState.active = true;
    // ソース要素を半透明化
    _knDragState.srcEl.classList.add('kn-dragging');
    // ゴースト要素を作成
    const ghost = document.createElement('div');
    ghost.style.cssText = [
      'position:fixed','z-index:9999','pointer-events:none',
      'padding:4px 12px','background:var(--bg-card)',
      'border:1.5px solid var(--primary)','border-radius:6px',
      'font-size:12px','font-weight:500','color:var(--text)',
      'box-shadow:0 4px 14px rgba(0,0,0,.18)',
      'max-width:220px','overflow:hidden','text-overflow:ellipsis','white-space:nowrap',
      'left:-9999px','top:-9999px'
    ].join(';');
    ghost.textContent = _knDragState.srcEl.querySelector('.kn-tree-item-title')?.textContent || '';
    document.body.appendChild(ghost);
    _knDragState.ghost = ghost;
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'grabbing';
  }

  // ゴーストを追従
  if (_knDragState.ghost) {
    _knDragState.ghost.style.left = (e.clientX + 14) + 'px';
    _knDragState.ghost.style.top  = (e.clientY - 12) + 'px';
  }

  // ドロップ位置インジケータ更新
  _knUpdateDropTarget(e.clientX, e.clientY);

  // サイドバー端の自動スクロール
  _knAutoScroll(e.clientY);
}

function _knMouseUp(e) {
  document.removeEventListener('mousemove', _knMouseMove);
  document.removeEventListener('mouseup', _knMouseUp);
  if (!_knDragState) return;

  if (_knDragState.active && _knDropTarget) {
    const { el, mode } = _knDropTarget;
    const targetId = el.dataset.id;
    if (targetId && targetId !== _knDragState.srcId) {
      if (mode === 'into') {
        // Fix B: 子化（親を変更してターゲットの子にする）
        changeParent(_knDragState.srcId, targetId);
      } else {
        // 同階層並べ替え or クロス親の before/after（同階層のみ有効）
        const allE = knAllEntries.length ? knAllEntries : knEntries;
        const src = allE.find(x => x.id === _knDragState.srcId);
        const tgt = allE.find(x => x.id === targetId);
        if (src && tgt && src.parent_id === tgt.parent_id) {
          reorderSiblings(_knDragState.srcId, targetId, mode === 'before');
        } else if (src && tgt) {
          // 異なる親: before/after は tgt の兄弟位置へ移動
          changeParentWithPosition(_knDragState.srcId, tgt.parent_id, targetId, mode === 'before');
        }
      }
    }
  }
  _knDragCleanup();
}

function _knUpdateDropTarget(clientX, clientY) {
  // 前のインジケータをクリア
  if (_knDropTarget) {
    _knDropTarget.el.classList.remove('drop-before', 'drop-after', 'drop-into');
    _knDropTarget = null;
  }

  // ゴーストを一時非表示にしてelementFromPointを取得
  const ghost = _knDragState?.ghost;
  if (ghost) ghost.style.visibility = 'hidden';
  const el = document.elementFromPoint(clientX, clientY);
  if (ghost) ghost.style.visibility = '';

  if (!el) return;
  const item = el.closest('.kn-tree-item[data-id]');
  if (!item) return;

  const targetId = item.dataset.id;
  if (!targetId || targetId === _knDragState.srcId) return;

  // Fix B: 子孫チェック（自分の子孫にはドロップ不可）
  const allE = knAllEntries.length ? knAllEntries : knEntries;
  const srcId = _knDragState.srcId;
  const descendants = new Set();
  let changed = true;
  while (changed) {
    changed = false;
    for (const e of allE) {
      if (!descendants.has(e.id) && e.parent_id && (e.parent_id === srcId || descendants.has(e.parent_id))) {
        descendants.add(e.id); changed = true;
      }
    }
  }
  if (descendants.has(targetId)) return;

  // 3 ゾーン判定: 上25% = before / 中50% = into / 下25% = after
  const rect = item.getBoundingClientRect();
  const relY = (clientY - rect.top) / rect.height;
  let mode;
  if (relY < 0.25) mode = 'before';
  else if (relY > 0.75) mode = 'after';
  else mode = 'into';

  item.classList.add(mode === 'before' ? 'drop-before' : mode === 'after' ? 'drop-after' : 'drop-into');
  _knDropTarget = { el: item, mode };
}

function _knAutoScroll(clientY) {
  if (_knScrollTimer) { clearInterval(_knScrollTimer); _knScrollTimer = null; }
  const list = document.getElementById('knList');
  if (!list) return;
  const rect = list.getBoundingClientRect();
  const ZONE = 40, SPEED = 8;
  if (clientY < rect.top + ZONE)      _knScrollTimer = setInterval(() => { list.scrollTop -= SPEED; }, 16);
  else if (clientY > rect.bottom - ZONE) _knScrollTimer = setInterval(() => { list.scrollTop += SPEED; }, 16);
}

function _knDragCleanup() {
  if (_knDragState) {
    _knDragState.srcEl?.classList.remove('kn-dragging');
    if (_knDragState.ghost) document.body.removeChild(_knDragState.ghost);
    _knDragState = null;
  }
  if (_knDropTarget) {
    _knDropTarget.el.classList.remove('drop-before', 'drop-after', 'drop-into');
    _knDropTarget = null;
  }
  if (_knScrollTimer) { clearInterval(_knScrollTimer); _knScrollTimer = null; }
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
}

// ─── 同階層内ソート順変更 ─────────────────────────────────────
async function reorderSiblings(srcId, targetId, insertBefore) {
  const src = knEntries.find(x => x.id === srcId);
  const tgt = knEntries.find(x => x.id === targetId);
  if (!src || !tgt) return;

  // manual エントリの兄弟のみ対象
  const siblings = knEntries
    .filter(x => x.source_type === 'manual' && x.parent_id === src.parent_id)
    .sort((a, b) => {
      const ao = a.sort_order ?? Infinity, bo = b.sort_order ?? Infinity;
      if (ao !== bo) return ao - bo;
      return (a.created_at || '').localeCompare(b.created_at || '');
    });

  const withoutSrc = siblings.filter(x => x.id !== srcId);
  const tgtIdx = withoutSrc.findIndex(x => x.id === targetId);
  if (tgtIdx === -1) return;

  const insertIdx = insertBefore ? tgtIdx : tgtIdx + 1;
  withoutSrc.splice(insertIdx, 0, src);

  const orders = withoutSrc.map((x, i) => ({ id: x.id, sort_order: (i + 1) * 1000 }));
  try {
    const res = await fetch('/api/knowledge', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orders })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    await loadKnowledge();
    selectEntry(srcId);
  } catch (err) { alert('並べ替え失敗: ' + err.message); }
}

// knList へ mousedown リスナーを登録
document.getElementById('knList').addEventListener('mousedown', _knMouseDown);

// ─── Fix B: 親変更（ドラッグ子化）─────────────────────────────
async function changeParent(srcId, newParentId) {
  const allE = knAllEntries.length ? knAllEntries : knEntries;
  const src = allE.find(x => x.id === srcId);
  if (!src) return;
  try {
    const res = await fetch(`/api/knowledge?id=${encodeURIComponent(srcId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: src.title, body: src.body || '', tags: src.tags, parent_id: newParentId })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    // 展開して表示
    knExpandedIds.add(newParentId);
    await loadKnowledge();
    selectEntry(srcId);
  } catch (err) { alert('移動失敗: ' + err.message); }
}

// 異なる親へ before/after 位置指定で移動
async function changeParentWithPosition(srcId, newParentId, anchorId, insertBefore) {
  const allE = knAllEntries.length ? knAllEntries : knEntries;
  const src = allE.find(x => x.id === srcId);
  if (!src) return;
  try {
    const res = await fetch(`/api/knowledge?id=${encodeURIComponent(srcId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: src.title, body: src.body || '', tags: src.tags, parent_id: newParentId || null })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    // 移動後、新しい兄弟として並び順を設定
    if (newParentId) knExpandedIds.add(newParentId);
    await loadKnowledge();
    // anchor を基準に sort_order を調整
    const updated = (knAllEntries.length ? knAllEntries : knEntries);
    const srcNew = updated.find(x => x.id === srcId);
    const anchor = updated.find(x => x.id === anchorId);
    if (srcNew && anchor) await reorderSiblings(srcId, anchorId, insertBefore);
    else selectEntry(srcId);
  } catch (err) { alert('移動失敗: ' + err.message); }
}

// ─── ① 逆リンク追加（選んだエントリの本文に現在エントリへのリンクを追記）
async function addBacklinkToEntry(fromId) {
  const fromEntry = knEntries.find(e => e.id === fromId);
  const toEntry = knEntries.find(e => e.id === knCurrentId);
  if (!fromEntry || !toEntry) return;

  const linkHtml = `<a class="kn-wiki" data-id="${toEntry.id}" href="#">${esc(toEntry.title || '')}</a>`;

  if (fromEntry.source_type === 'manual') {
    const newBody = (fromEntry.body || '') + `<p>${linkHtml}</p>`;
    const res = await fetch(`/api/knowledge?id=${encodeURIComponent(fromId)}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: fromEntry.title, body: newBody, tags: fromEntry.tags, parent_id: fromEntry.parent_id || null })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
  } else if (fromEntry.source_type === 'task_note') {
    let found = false;
    for (const task of (data?.tasks || [])) {
      const note = (task.notes || []).find(n => n.id === fromEntry.source_id);
      if (note) {
        note.content = (note.content || '') + `<p>${linkHtml}</p>`;
        note.updatedAt = new Date().toISOString();
        found = true; break;
      }
    }
    if (!found) throw new Error('タスクノートが見つかりません');
    await saveData(data);
  } else {
    throw new Error('面談記録へのリンク追加はナレッジ編集画面からは直接できません。顧客タブで編集してください。');
  }
  // ナレッジ一覧再読み込みして被リンクを更新
  await loadKnowledge();
  await loadBacklinks(knCurrentId);
}

  document.getElementById('knLinkModalHint').textContent = '';
  document.getElementById('knLinkModal').style.display = 'flex';
  renderLinkModalList(); renderLinkModalPreview(null);
  document.getElementById('knLinkSearch').focus();
}
function closeLinkModal() {
  document.getElementById('knLinkModal').style.display = 'none';
  knLinkTargetId = null; knLinkSelected = null; knSavedRange = null;
}
function onModalOverlayClick(e) { if (e.target === document.getElementById('knLinkModal')) closeLinkModal(); }
function filterLinkModal(q) {
  const lower = q.trim().toLowerCase();
  if (knLinkTargetId === '__backlink__') {
    // 逆リンクモード：手動エントリのみ・自分以外
    const base = knEntries.filter(e => e.id !== knCurrentId && e.source_type === 'manual');
    knLinkFiltered = lower ? base.filter(e => (e.title || '').toLowerCase().includes(lower)) : base;
  } else {
    knLinkFiltered = lower ? knEntries.filter(e => (e.title || '').toLowerCase().includes(lower)) : [...knEntries];
  }
  knLinkSelected = null; document.getElementById('knLinkInsertBtn').disabled = true;
  renderLinkModalList(); renderLinkModalPreview(null);
}
function renderLinkModalList() {
  const el = document.getElementById('knLinkList');
  if (!knLinkFiltered.length) { el.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text-muted);">見つかりません</div>'; return; }
  el.innerHTML = knLinkFiltered.map(e => {
    const bc = e.source_type === 'manual' ? 'kn-badge-manual' : e.source_type === 'task_note' ? 'kn-badge-note' : 'kn-badge-meeting';
    const bl = e.source_type === 'manual' ? '企業のお医者さん' : e.source_type === 'task_note' ? 'タスク' : '面談';
    return `<div class="kn-modal-item${knLinkSelected?.id === e.id ? ' active' : ''}" onclick="selectLinkEntry('${e.id}')">
      <div class="kn-modal-item-title">${esc(e.title || '（タイトルなし）')}</div>
      <div class="kn-modal-item-meta"><span class="kn-badge ${bc}" style="font-size:9px;">${bl}</span><span style="font-size:10px;color:var(--text-muted);">${(e.updated_at || '').slice(0, 10)}</span></div>
    </div>`;
  }).join('');
}
function selectLinkEntry(id) {
  knLinkSelected = knEntries.find(e => e.id === id) || null;
  document.getElementById('knLinkInsertBtn').disabled = !knLinkSelected;
  renderLinkModalList(); renderLinkModalPreview(knLinkSelected);
}
function renderLinkModalPreview(e) {
  const el = document.getElementById('knLinkPreview');
  if (!e) { el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding-top:20px;">エントリを選択するとプレビューが表示されます</div>'; return; }
  const bodyHtml = e.source_type === 'manual' ? (e.body || '') : renderMarkdown(e.body || '');
  el.innerHTML = `<div class="kn-modal-preview-title">${esc(e.title || '（タイトルなし）')}</div>${bodyHtml ? `<div class="md-preview" style="font-size:13px;">${bodyHtml}</div>` : '<div style="color:var(--text-muted);font-size:13px;">(本文なし)</div>'}`;
}

// ① 逆リンクモード or 通常リンク挿入を分岐
async function insertSelectedLink() {
  if (!knLinkSelected) return;

  if (knLinkTargetId === '__backlink__') {
    // ① 逆リンクモード
    try {
      await addBacklinkToEntry(knLinkSelected.id);
      closeLinkModal();
      alert(`「${knLinkSelected.title}」の本文にリンクを追加しました`);
    } catch (err) { alert('追加失敗: ' + err.message); }
    return;
  }

  // ③-C 通常リンク挿入：DOM操作
  const editor = document.getElementById(knLinkTargetId);
  if (!editor) { closeLinkModal(); return; }
  const linkEl = document.createElement('a');
  linkEl.className = 'kn-wiki';
  linkEl.dataset.id = knLinkSelected.id;
  linkEl.href = '#';
  linkEl.textContent = knLinkSelected.title || '';
  editor.focus();
  if (knSavedRange) {
    try {
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(knSavedRange);
      const range = sel.getRangeAt(0);
      range.deleteContents(); range.insertNode(linkEl);
      range.setStartAfter(linkEl); range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
    } catch { editor.appendChild(linkEl); }
    knSavedRange = null;
  } else { editor.appendChild(linkEl); }
  closeLinkModal();
}

// ─── 木構造ユーティリティ ────────────────────────────────────

// 新規作成時の親候補: contextIdがある場合はそのツリー内のみ表示（候補を絞る）
function buildParentOptionsForNew(contextId) {
  let candidates = knEntries.filter(e => e.source_type === 'manual');
  if (contextId) {
    // 現在のエントリとその子孫のみ（"家系"内から親を選ぶ）
    const treeIds = getDescendantIds(contextId);
    candidates = candidates.filter(e => treeIds.has(e.id));
  }
  const options = candidates.map(e => {
    const label = getBreadcrumb(e.id).map(x => x.title || '（タイトルなし）').join(' › ');
    return `<option value="${e.id}">${esc(label)}</option>`;
  }).join('');
  return `<option value="">なし（ルートレベル）</option>${options}`;
}

function getDescendantIds(id) {
  const result = new Set([id]); const queue = [id];
  while (queue.length) { const cur = queue.shift(); knEntries.filter(e => e.parent_id === cur).forEach(e => { result.add(e.id); queue.push(e.id); }); }
  return result;
}
function buildParentOptions(excludeId, currentParentId) {
  const excluded = excludeId ? getDescendantIds(excludeId) : new Set();
  const options = knEntries.filter(e => e.source_type === 'manual' && !excluded.has(e.id)).map(e => {
    const label = getBreadcrumb(e.id).map(x => x.title || '（タイトルなし）').join(' › ');
    return `<option value="${e.id}"${e.id === currentParentId ? ' selected' : ''}>${esc(label)}</option>`;
  }).join('');
  return `<option value="">なし（ルートレベル）</option>${options}`;
}

function getEditorContent(divId) { const el = document.getElementById(divId); return el ? el.innerHTML : ''; }
function setEditorContent(divId, html) { const el = document.getElementById(divId); if (el) el.innerHTML = html || '<p><br></p>'; }
function applyForeColor(color, divId) { document.getElementById(divId)?.focus(); document.execCommand('foreColor', false, color); closeColorPalette(); }
function applyHighlight(divId) { document.getElementById(divId)?.focus(); document.execCommand('hiliteColor', false, '#fef08a'); closeColorPalette(); }
function toggleColorPalette(palId) { const pal = document.getElementById(palId); if (!pal) return; const wasOpen = pal.classList.contains('open'); closeColorPalette(); if (!wasOpen) pal.classList.add('open'); }
function closeColorPalette() { document.querySelectorAll('.kn-color-palette.open').forEach(p => p.classList.remove('open')); }
function toggleTablePicker(pickId) { const el = document.getElementById(pickId); if (!el) return; const wasOpen = el.classList.contains('open'); closeTablePicker(); if (!wasOpen) el.classList.add('open'); }
function closeTablePicker() { document.querySelectorAll('.kn-table-picker.open').forEach(e => e.classList.remove('open')); }
function hoverTablePicker(r, c, pickId) {
  document.querySelectorAll(`#${pickId} .kn-table-cell`).forEach(cell => {
    cell.classList.toggle('hover', parseInt(cell.dataset.r) <= r && parseInt(cell.dataset.c) <= c);
  });
  // tpick_label_XXX の id はツールバー関数で付けた方式に合わせる
  const labelId = pickId.startsWith('itpick_') ? `tpick_label_${pickId}` : `tpick_label_${pickId.replace('tpick_', '')}`;
  const label = document.getElementById(labelId);
  if (label) label.textContent = `${c}列 × ${r}行`;
}
function insertWysiwygTable(rows, cols, divId) {
  document.getElementById(divId)?.focus();
  let th = ''; for (let c = 0; c < cols; c++) th += '<th>ヘッダ</th>';
  let tbody = '';
  for (let r = 0; r < rows; r++) { let tds = ''; for (let c = 0; c < cols; c++) tds += '<td>　</td>'; tbody += `<tr>${tds}</tr>`; }
  document.execCommand('insertHTML', false, `<table><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table><p><br></p>`);
  closeTablePicker();
}

// ─── GFMテーブルパーサー ─────────────────────────────────────
function parseGFMTables(text) {
  const lines = text.split('\n'); const out = []; let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim(); const next = (lines[i + 1] || '').trim();
    if (/^\|.+\|$/.test(line) && /^\|[-:\s|]+\|$/.test(next)) {
      const headers = splitTableRow(lines[i]); i += 2; const rows = [];
      while (i < lines.length && /^\|.+\|$/.test(lines[i].trim())) { rows.push(splitTableRow(lines[i])); i++; }
      const th = headers.map(h => `<th>${h}</th>`).join('');
      const tb = rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      out.push(`<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`);
    } else { out.push(lines[i]); i++; }
  }
  return out.join('\n');
}
function splitTableRow(line) { return line.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim()); }

// ─── Markdownパーサー ─────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  if (/<[a-z][^>]*>/i.test(text)) return text;
  text = parseGFMTables(text);
  const linkMap = {}; let idx = 0;
  text = text.replace(/\[\[id:([^\]|]+)\|([^\]]*)\]\]/g, (_, id, display) => {
    const found = knEntries.find(e => e.id === id);
    const label = esc(found ? (found.title || display) : display);
    const key = `\x00KL${idx++}\x00`;
    linkMap[key] = found
      ? `<a class="kn-wiki" data-id="${id}" href="#">${label}</a>`
      : `<span class="kn-broken">${label}</span>`;
    return key;
  });
  let html = text
    .replace(/```[\s\S]*?```/g, m => { const code = m.replace(/^```[^\n]*\n?/, '').replace(/```$/, ''); return `<pre><code>${esc(code)}</code></pre>`; })
    .replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`)
    .replace(/^### (.+)$/gm, (_, t) => `<h3>${t}</h3>`).replace(/^## (.+)$/gm, (_, t) => `<h2>${t}</h2>`).replace(/^# (.+)$/gm, (_, t) => `<h1>${t}</h1>`)
    .replace(/^---+$/gm, '<hr>').replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>').replace(/^[-*] (.+)$/gm, '<li>$1</li>').replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]+?<\/li>)(\n|$)/g, m => '<ul>' + m.trim() + '</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  html = html.split(/\n\n+/).map(block => {
    block = block.trim(); if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr|table)/.test(block)) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');
  Object.entries(linkMap).forEach(([k, v]) => { html = html.replaceAll(k, v); });
  return html;
}

// ─── 画像サイドパネル（右スライド） ────────────────────────────
function openImagePanel(src) {
  const panel  = document.getElementById('knImagePanel');
  const img    = document.getElementById('knImagePanelImg');
  const newTab = document.getElementById('knImagePanelNewTab');
  const title  = document.getElementById('knImagePanelTitle');
  if (!panel || !img) return;
  img.src = src;
  if (newTab) newTab.href = src;
  // ファイル名をタイトルとして表示（URLの末尾部分）
  if (title) {
    try { title.textContent = decodeURIComponent(src.split('/').pop().split('?')[0]) || '画像'; }
    catch { title.textContent = '画像'; }
  }
  panel.classList.add('open');
  document.addEventListener('keydown', onImagePanelKey);
}
function closeImagePanel() {
  const panel = document.getElementById('knImagePanel');
  if (panel) panel.classList.remove('open');
  document.removeEventListener('keydown', onImagePanelKey);
}
function onImagePanelKey(e) { if (e.key === 'Escape') closeImagePanel(); }

// ─── バックグラウンドresync（knowledge最新化）─────────────────
async function triggerResync() {
  try {
    await fetch('/api/resync', { method: 'POST' });
    // resync完了後、一覧を再読み込みして最新内容・更新日時を反映
    await loadKnowledge();
  } catch { /* silent fail */ }
}

// ─── 日付フォーマット（数値タイムスタンプ対応）─────────────────
function formatDate(val) {
  if (!val) return '';
  // 数値 or 数字のみ文字列（Date.now()等）→ ローカル日時
  if (typeof val === 'number' || /^\d{10,13}$/.test(String(val))) {
    const d = new Date(Number(val));
    return d.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tokyo' });
  }
  const d = new Date(val);
  if (isNaN(d)) return String(val).slice(0, 16);
  return d.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tokyo' });
}

// ─── ユーティリティ ──────────────────────────────────────────
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function updateHeaderDatetime() {
  const now = new Date();
  const d = document.getElementById('headerDate'), t = document.getElementById('headerTime');
  if (d) d.textContent = now.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
  if (t) t.textContent = now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
}
function updateHeaderUser() {
  if (!currentUser) return;
  const av = document.getElementById('headerAvatar'), nm = document.getElementById('headerName');
  if (av) av.textContent = currentUser.avatar || currentUser.name?.[0] || '?';
  if (nm) nm.textContent = currentUser.name || '';
}
function switchUser() { clearCurrentUser(); showUserSelectModal(data, user => { currentUser = user; updateHeaderUser(); }); }
