<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナレッジ | 企業のお医者さん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="icons.js"></script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ─── レイアウト ─── */
  .kn-layout { flex: 1; min-height: 0; display: flex; overflow: hidden; }

  /* ─── 左パネル ─── */
  .kn-list-col {
    width: 300px; min-width: 220px; max-width: 400px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--bg-card); flex-shrink: 0;
  }
  .kn-list-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    background: var(--bg-card); flex-shrink: 0;
  }
  .kn-list-scroll { flex: 1; overflow-y: auto; }

  /* ツリーアイテム */
  .kn-item {
    display: flex; align-items: flex-start; gap: 4px;
    padding: 9px 12px 9px 10px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .12s; user-select: none;
  }
  .kn-item:hover { background: #f1f5f9; }
  .kn-item.active { background: #e0e7ff; border-left: 3px solid var(--primary); padding-left: 7px; }
  .kn-tree-toggle {
    flex-shrink: 0; width: 16px; height: 16px; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--text-muted); border-radius: 3px; transition: background .1s;
  }
  .kn-tree-toggle:hover { background: rgba(0,0,0,0.08); }
  .kn-tree-toggle-placeholder { flex-shrink: 0; width: 16px; }
  .kn-item-content { flex: 1; min-width: 0; }
  .kn-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
  .kn-item-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .kn-badge { font-size: 9px; padding: 1px 5px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .kn-badge-manual  { background: #dcfce7; color: #15803d; }
  .kn-badge-note    { background: #dbeafe; color: #1d4ed8; }
  .kn-badge-meeting { background: #fef3c7; color: #92400e; }
  .kn-item-date { font-size: 10px; color: var(--text-muted); }
  .kn-item-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
  .kn-tag { font-size: 9px; padding: 1px 5px; border-radius: 10px; background: #f1f5f9; color: var(--text-sub); border: 1px solid var(--border); }
  .kn-section-header {
    padding: 6px 12px; font-size: 10px; font-weight: 700;
    color: var(--text-muted); background: #f8fafc;
    border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em;
  }
  .kn-empty-list { text-align: center; padding: 30px 14px; color: var(--text-muted); font-size: 13px; }

  /* ─── 右パネル ─── */
  .kn-detail-col { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
  .kn-detail-header {
    padding: 12px 16px 10px; border-bottom: 1px solid var(--border);
    background: var(--bg-card); flex-shrink: 0;
  }
  .kn-breadcrumb { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .kn-breadcrumb-link { color: var(--primary); cursor: pointer; }
  .kn-breadcrumb-link:hover { text-decoration: underline; }

  /* 子ナレッジセクション（本文エリア上部・折りたたみ対応） */
  .kn-children-section {
    margin-bottom: 14px; padding: 8px 12px;
    background: #f8fafc; border: 1px solid var(--border); border-radius: 8px;
  }
  .kn-children-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .kn-children-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; flex: 1; }
  .kn-children-chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .kn-child-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: #f0fdf4; border: 1px solid #86efac; border-radius: 20px;
    padding: 2px 10px; font-size: 11px; color: #15803d; cursor: pointer;
    transition: background .12s;
  }
  .kn-child-chip:hover { background: #dcfce7; }
  .kn-child-chip-add {
    background: #f8fafc; border: 1px dashed var(--border); color: var(--text-muted);
  }
  .kn-child-chip-add:hover { background: #f1f5f9; border-color: var(--text-muted); }
  .kn-child-expand-btn {
    font-size: 11px; color: var(--primary); background: none; border: none;
    cursor: pointer; padding: 1px 6px; text-decoration: underline;
    white-space: nowrap; flex-shrink: 0;
  }
  .kn-child-expand-btn:hover { opacity: 0.75; }

  /* ─── 画像サイドパネル（右スライド） ─── */
  .kn-image-panel {
    width: 0; min-width: 0; overflow: hidden;
    border-left: 1px solid transparent;
    background: var(--bg-card);
    display: flex; flex-direction: column;
    transition: width 0.25s ease, min-width 0.25s ease, border-color 0.25s;
    flex-shrink: 0;
  }
  .kn-image-panel.open {
    width: 480px; min-width: 480px;
    border-left-color: var(--border);
  }
  .kn-image-panel-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; gap: 8px;
  }
  .kn-image-panel-title {
    font-size: 12px; font-weight: 600; color: var(--text-sub);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
  }
  .kn-image-panel-body {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; align-items: flex-start; justify-content: center;
  }
  .kn-image-panel-body img {
    max-width: 100%; height: auto; border-radius: 6px; display: block;
  }
  /* 履歴パネルアイテム */
  .kn-hist-item {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    cursor: default;
  }
  .kn-hist-item:hover { background: #f8fafc; }
  .kn-hist-meta {
    display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 4px;
  }
  .kn-hist-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .kn-hist-title { font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kn-hist-preview { font-size: 11px; color: var(--text-sub); line-height: 1.5; }
  /* モバイル：全幅オーバーレイ */
  @media (max-width: 768px) {
    .kn-image-panel.open {
      position: fixed; inset: 0;
      width: 100% !important; min-width: 100% !important;
      z-index: 500;
    }
  }

  /* ④ タイトル行（ボタン横並び） */
  .kn-title-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .kn-detail-title {
    font-size: 18px; font-weight: 700; color: var(--navy); line-height: 1.3;
    flex: 0 1 auto; min-width: 0; outline: none;
    border-radius: 4px; padding: 1px 4px; margin: -1px -4px;
  }
  .kn-detail-title[contenteditable="true"] {
    border: 2px solid var(--primary); background: #fafffe; padding: 2px 6px; margin: 0;
  }
  .kn-title-btns { display: flex; gap: 5px; flex-shrink: 0; margin-top: 2px; }
  .kn-detail-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .kn-detail-body { flex: 1; overflow-y: auto; padding: 20px; }

  /* ─── 面談構造化表示 ─── */
  .kn-meeting-structured { font-size: 13px; }
  .kn-meeting-structured > div { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .kn-meeting-structured > div:last-child { border-bottom: none; }

  /* ─── コンテンツ表示 ─── */
  .md-preview { font-size: 14px; line-height: 1.8; color: var(--text); }
  .md-preview h1 { font-size: 20px; font-weight: 700; color: var(--navy); margin: 20px 0 8px; }
  .md-preview h2 { font-size: 17px; font-weight: 700; color: var(--navy); margin: 16px 0 6px; }
  .md-preview h3 { font-size: 15px; font-weight: 600; color: var(--navy); margin: 12px 0 4px; }
  .md-preview p  { margin: 0 0 10px; }
  .md-preview ul, .md-preview ol { margin: 0 0 10px; padding-left: 20px; }
  .md-preview li { margin-bottom: 2px; }
  .md-preview strong { font-weight: 700; }
  .md-preview em { font-style: italic; }
  .md-preview code { background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }
  .md-preview pre { background: #f1f5f9; padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 0 0 10px; }
  .md-preview blockquote { border-left: 3px solid var(--border); margin: 0 0 10px; padding: 4px 12px; color: var(--text-sub); }
  .md-preview hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .md-preview table { border-collapse: collapse; width: 100%; margin: 0 0 12px; font-size: 13px; }
  .md-preview th, .md-preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .md-preview th { background: #f1f5f9; font-weight: 700; }
  .md-preview tr:nth-child(even) td { background: #f8fafc; }
  .md-preview mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; color: inherit; }
  /* ② 画像：クリックで新タブ、カーソル変化 */
  .md-preview img { max-width: 100%; height: auto; border-radius: 6px; margin: 6px 0; cursor: zoom-in; }

  /* ─── ナレッジリンクチップ ─── */
  a.kn-wiki {
    display: inline-flex; align-items: center; gap: 3px;
    background: #e0e7ff; color: #3730a3;
    border-radius: 4px; padding: 1px 7px; font-size: 0.9em;
    text-decoration: none; border: 1px solid #c7d2fe; cursor: pointer; transition: background .12s;
  }
  a.kn-wiki::before { content: '📎'; font-size: 0.8em; }
  a.kn-wiki:hover { background: #c7d2fe; }
  .kn-broken { color: var(--danger); font-size: 0.9em; text-decoration: line-through; opacity: 0.7; }

  /* バックリンク・子ナレッジ下部 */
  .kn-sub-section { margin-top: 24px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .kn-sub-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .kn-sub-item { display: flex; align-items: center; gap: 7px; padding: 5px 7px; border-radius: 6px; transition: background .12s; font-size: 13px; color: var(--navy); }
  .kn-sub-item:hover { background: #f1f5f9; }
  .kn-source-link { font-size: 12px; color: var(--primary); text-decoration: none; }
  .kn-source-link:hover { text-decoration: underline; }

  /* ─── 書式ツールバー ─── */
  .kn-fmt-toolbar {
    display: flex; align-items: center; gap: 2px; padding: 4px 8px;
    background: #f8fafc; border: 1px solid var(--border); border-bottom: none;
    border-radius: 8px 8px 0 0; flex-wrap: wrap;
  }
  .kn-fmt-btn {
    padding: 2px 7px; border: 1px solid transparent; border-radius: 4px;
    cursor: pointer; background: none; font-size: 13px; font-family: inherit;
    color: var(--text); transition: background .12s;
    display: flex; align-items: center; justify-content: center;
    min-width: 28px; height: 26px; line-height: 1;
  }
  .kn-fmt-btn:hover { background: #e2e8f0; border-color: var(--border); }
  .kn-fmt-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }
  .kn-fmt-color-wrap { position: relative; display: inline-flex; }
  .kn-color-palette {
    position: absolute; top: calc(100% + 3px); left: 0; z-index: 200;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 7px; display: none; gap: 5px; flex-wrap: wrap; min-width: 140px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.14);
  }
  .kn-color-palette.open { display: flex; }
  .kn-color-swatch {
    width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    border: 2px solid rgba(0,0,0,0.1); transition: transform .1s, box-shadow .1s;
    font-size: 9px; font-weight: 700;
  }
  .kn-color-swatch:hover { transform: scale(1.2); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

  /* テーブルピッカー */
  .kn-table-picker {
    position: absolute; top: calc(100% + 3px); left: 0; z-index: 200;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.14);
  }
  .kn-table-picker.open { display: block; }
  .kn-table-grid { display: grid; grid-template-columns: repeat(6, 20px); gap: 2px; }
  .kn-table-cell { width: 20px; height: 20px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; background: #f8fafc; transition: background .08s, border-color .08s; }
  .kn-table-cell.hover { background: #bfdbfe; border-color: #3b82f6; }
  .kn-table-picker-label { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 5px; }

  /* ─── WYSIWYGエディタ ─── */
  .kn-editor {
    min-height: 220px; width: 100%; box-sizing: border-box;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.8;
    padding: 10px 16px; border: 1px solid var(--border);
    border-radius: 0 0 8px 8px; border-top: none;
    background: #fff; color: var(--text);
    overflow-y: auto; outline: none;
  }
  .kn-editor:focus { border-color: var(--primary); }
  .kn-editor table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .kn-editor td, .kn-editor th { border: 1px solid var(--border); padding: 6px 10px; min-width: 40px; vertical-align: top; }
  .kn-editor th { background: #f1f5f9; font-weight: 700; }
  .kn-editor p { margin: 0 0 6px; }
  .kn-editor mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; color: inherit; }
  .kn-editor ul, .kn-editor ol { padding-left: 1.5em; margin-left: 0; margin-bottom: 6px; }
  .kn-editor img { max-width: 100%; height: auto; border-radius: 4px; }

  /* ④ インライン編集時のエディタ（枠なしツールバー） */
  .kn-inline-toolbar {
    display: flex; align-items: center; gap: 2px; padding: 4px 8px;
    background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px;
    flex-wrap: wrap; margin-bottom: 4px;
  }
  .kn-floating-toolbar {
    display: none; position: fixed; z-index: 9999;
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 3px 14px rgba(0,0,0,0.18);
    padding: 4px 6px; flex-wrap: nowrap; pointer-events: auto;
  }
  .kn-fmt-select {
    font-size: 11px; padding: 2px 4px; border: 1px solid var(--border);
    border-radius: 4px; background: #fff; color: var(--text);
    cursor: pointer; height: 22px; max-width: 72px;
  }
  .kn-inline-editor {
    min-height: 160px; width: 100%; box-sizing: border-box;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.8;
    padding: 10px 16px; border: 2px solid var(--primary);
    border-radius: 8px; background: #fafffe; color: var(--text);
    overflow-y: auto; outline: none;
  }
  .kn-inline-editor ul, .kn-inline-editor ol { padding-left: 1.5em; margin-left: 0; margin-bottom: 6px; }
  .kn-inline-editor table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .kn-inline-editor td, .kn-inline-editor th { border: 1px solid var(--border); padding: 6px 10px; min-width: 40px; vertical-align: top; }
  .kn-inline-editor mark { background: #fef08a; }
  .kn-inline-editor img { max-width: 100%; height: auto; border-radius: 4px; }

  /* ─── 編集フォーム（新規作成用） ─── */
  .kn-edit-form { display: flex; flex-direction: column; gap: 12px; padding: 20px; flex: 1; overflow-y: auto; }
  .kn-form-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; display: block; }

  /* ─── 空状態 ─── */
  .kn-welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
  .kn-welcome-icon { font-size: 48px; margin-bottom: 12px; }
  .kn-welcome-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .kn-welcome-desc { font-size: 13px; }

  /* ─── モーダル ─── */
  .kn-modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(3px);
    z-index: 500; display: flex; align-items: center; justify-content: center;
  }
  .kn-modal-box {
    background: var(--bg-card); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 760px; max-width: 95vw; height: 500px; max-height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .kn-modal-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .kn-modal-header input { flex: 1; font-size: 14px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); outline: none; }
  .kn-modal-header input:focus { border-color: var(--primary); }
  .kn-modal-body { flex: 1; display: flex; overflow: hidden; }
  .kn-modal-list { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; }
  .kn-modal-item { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .1s; }
  .kn-modal-item:hover { background: #f1f5f9; }
  .kn-modal-item.active { background: #e0e7ff; }
  .kn-modal-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .kn-modal-item-meta { display: flex; gap: 6px; margin-top: 2px; align-items: center; }
  .kn-modal-preview { flex: 1; overflow-y: auto; padding: 16px 18px; }
  .kn-modal-preview-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .kn-modal-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .kn-modal-footer-hint { font-size: 11px; color: var(--text-muted); }

  /* ─── AI検索モーダル ─── */
  .kn-ai-box {
    background: var(--bg-card); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 700px; max-width: 95vw; height: 560px; max-height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .kn-ai-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .kn-ai-title { font-size: 14px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 7px; }
  .kn-ai-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .kn-ai-msg { max-width: 90%; border-radius: 10px; padding: 10px 14px; font-size: 13px; line-height: 1.75; }
  .kn-ai-msg-user { background: var(--navy); color: #fff; align-self: flex-end; }
  .kn-ai-msg-assistant { background: #f1f5f9; color: var(--text); align-self: flex-start; max-width: 100%; }
  .kn-ai-sources { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .kn-ai-source-chip { display: inline-flex; align-items: center; background: #e0e7ff; color: #3730a3; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin: 2px; cursor: pointer; border: 1px solid #c7d2fe; }
  .kn-ai-source-chip:hover { background: #c7d2fe; }
  .kn-ai-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .kn-ai-input { flex: 1; font-size: 14px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit; }
  .kn-ai-input:focus { border-color: var(--primary); }

  /* ─── Quick View モーダル ─── */
  .kn-quick-box {
    background: var(--bg-card); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 700px; max-width: 95vw; max-height: 85vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .kn-quick-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .kn-quick-title { font-size: 15px; font-weight: 700; color: var(--navy); flex: 1; min-width: 0; }
  .kn-quick-body { flex: 1; overflow-y: auto; padding: 20px; }

  /* ⑤ AIアイコン（スパークルSVG） */
  .ai-sparkle-icon { display: inline-flex; align-items: center; }

  /* ─── タグフィルタバー ─── */
  .kn-tag-filter-bar {
    padding: 5px 10px; border-bottom: 1px solid var(--border);
    background: #f8fafc; display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
    min-height: 32px;
  }
  .kn-tag-chip-filter {

<script>
// ─── 状態 ───────────────────────────────────────────────────
let knEntries = [];
let knCurrentId = null;
let knSearchQ = '';
let knTypeFilter = '';
let knSearchTimer = null;
let data = null;
let currentUser = null;

// タグフィルタ・顧客フィルタ・グルーピング用
let knTagFilter    = [];     // 選択中タグ配列
let knTagFilterMode = 'or';  // 'or' | 'and'
let knAllTags      = [];     // 全タグ一覧（フィルタ非依存）
let knCustFilter   = '';     // 顧客IDフィルタ
let knCustMap      = {};     // customer_id → customer.name
let knGroupExpandedIds = new Set(); // グループ展開状態

let knExpandedIds = new Set();
function saveExpandedIds() { /* セッション内のみ保持・リロード後は初期状態 */ }

let knLinkTargetId = null;   // エディタID or '__backlink__'
let knLinkSelected = null;
let knLinkFiltered = [];
let knSavedRange = null;
let knQuickTargetId = null;
let knInlineEditId = null;   // ④ インライン編集中のエントリID

// ─── 初期化（並列ロード）────────────────────────────────────
const knEarlyFetch = fetch('/api/knowledge?limit=200')
  .then(r => r.json())
  .catch(() => ({ entries: [] }));

loadData().then(d => {
  data = d;
  // 顧客名マップを構築（サイドバーの顧客別グルーピングに使用）
  knCustMap = Object.fromEntries((d.customers || []).map(c => [c.id, c.name || c.id]));
  // 顧客フィルタ select を更新
  buildCustFilter();
  // 顧客名が確定したのでサイドバーを再描画
  renderSidebar();
  initAuth(data, user => {
    currentUser = user;
    updateHeaderDatetime();
    setInterval(updateHeaderDatetime, 1000);
    updateHeaderUser();
  });
});

knEarlyFetch.then(resp => {
  knEntries = resp.entries || [];
  renderSidebar();
  if (!localStorage.getItem('kn_migrated_v2')) migrateOldEntries();
  const hashId = location.hash.slice(1);
  if (hashId) {
    const e = knEntries.find(x => x.id === hashId);
    if (e) { knCurrentId = hashId; renderSidebar(); renderDetail(e); }
  }
  // バックグラウンドでknowledgeテーブルを最新データに再同期（最新内容・時刻を反映）
  triggerResync();
}).catch(e => {
  document.getElementById('knList').innerHTML =
    `<div class="kn-empty-list" style="color:var(--danger);">読み込み失敗: ${e.message}</div>`;
});

// ⑤ 戻るボタン
window.addEventListener('popstate', ev => {
  if (ev.state?.entryId) selectEntry(ev.state.entryId, false);
  else {
    knCurrentId = null; renderSidebar();
    document.getElementById('knDetail').innerHTML = `<div class="kn-welcome"><div class="kn-welcome-icon">${icon('book-open',32,'#94a3b8')}</div><div class="kn-welcome-title">ナレッジを選択</div><div class="kn-welcome-desc">左のリストからエントリを選んでください</div></div>`;
  }
});

// グローバルクリックハンドラ
document.addEventListener('click', e => {
  if (!e.target.closest('.kn-fmt-color-wrap')) { closeColorPalette(); closeTablePicker(); }

  // ③ wiki リンクチップ → Quick View（編集中は除外）
  const wikiLink = e.target.closest('a.kn-wiki');
  if (wikiLink && !wikiLink.closest('.kn-editor') && !wikiLink.closest('.kn-inline-editor')
      && !wikiLink.closest('.kn-modal-preview') && !wikiLink.closest('.kn-quick-body')) {
    e.preventDefault();
    const targetId = wikiLink.dataset.id;
    if (targetId) openQuickModal(targetId);
  }

  // ② 画像クリック → 右サイドパネルに表示
  const img = e.target.closest('.md-preview img, .kn-quick-body img');
  if (img && !img.closest('#knImagePanel')) {
    e.preventDefault();
    if (img.src) openImagePanel(img.src);
  }
});

// ② 画像ドラッグ&ドロップ → R2アップロード → img挿入
document.addEventListener('dragover', ev => {
  const editor = ev.target.closest('.kn-editor, .kn-inline-editor');
  if (!editor) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'copy';
});
document.addEventListener('drop', async ev => {
  const editor = ev.target.closest('.kn-editor, .kn-inline-editor');
  if (!editor) return;
  const files = ev.dataTransfer?.files;
  if (!files || files.length === 0) return;
  const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (imageFiles.length === 0) return;
  ev.preventDefault();
  editor.focus();
  for (const file of imageFiles) {
    const ext = file.type.split('/')[1] || 'png';
    const uploadFile = new File([file], `drop_${Date.now()}.${ext}`, { type: file.type });
    const formData = new FormData();
    formData.append('file', uploadFile);
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const resp = await res.json();
      if (resp.ok && resp.key) {
        const imgEl = document.createElement('img');
        imgEl.src = `/api/file/${resp.key}`;
        imgEl.style.maxWidth = '100%'; imgEl.alt = '画像';
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0) {
          const range = sel.getRangeAt(0);
          range.deleteContents(); range.insertNode(imgEl);
          range.setStartAfter(imgEl); range.collapse(true);
          sel.removeAllRanges(); sel.addRange(range);
        } else { editor.appendChild(imgEl); }
      }
    } catch (err) { alert('画像アップロード失敗: ' + err.message); }
  }
});

// ② 画像ペースト → R2アップロード → img挿入
document.addEventListener('paste', async ev => {
  const editor = ev.target.closest('.kn-editor, .kn-inline-editor');
  if (!editor) return;
  const items = ev.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      ev.preventDefault();
      const file = item.getAsFile();
      if (!file) continue;
      const ext = file.type.split('/')[1] || 'png';
      const uploadFile = new File([file], `paste_${Date.now()}.${ext}`, { type: file.type });
      const formData = new FormData();
      formData.append('file', uploadFile);
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const resp = await res.json();
        if (resp.ok && resp.key) {
          editor.focus();
          const imgEl = document.createElement('img');
          imgEl.src = `/api/file/${resp.key}`;
          imgEl.style.maxWidth = '100%'; imgEl.alt = '画像';
          const sel = window.getSelection();
          if (sel && sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            range.deleteContents(); range.insertNode(imgEl);
            range.setStartAfter(imgEl); range.collapse(true);
            sel.removeAllRanges(); sel.addRange(range);
          } else { editor.appendChild(imgEl); }
        }
      } catch (err) { alert('画像アップロード失敗: ' + err.message); }
      return;
    }
  }
});

async function loadKnowledge() {
  try {
    const params = new URLSearchParams({ limit: '200' });
    if (knSearchQ) params.set('q', knSearchQ);
    if (knTypeFilter) params.set('source_type', knTypeFilter);
    if (knCustFilter) params.set('customer_id', knCustFilter);
    const res = await fetch(`/api/knowledge?${params}`);
    const resp = await res.json();
    let entries = resp.entries || [];

    // タグ一覧をフィルタ適用前に更新（チップ表示用）
    knAllTags = [...new Set(entries.flatMap(e => Array.isArray(e.tags) ? e.tags : []))].sort();

    // タグフィルタをクライアント側で適用
    if (knTagFilter.length > 0) {
      entries = entries.filter(e => {
        const tags = Array.isArray(e.tags) ? e.tags : [];
        return knTagFilterMode === 'and'
          ? knTagFilter.every(t => tags.includes(t))
          : knTagFilter.some(t => tags.includes(t));
      });
    }

    knEntries = entries;
    buildTagBar();
    renderSidebar();
    if (knCurrentId) {
      const e = knEntries.find(x => x.id === knCurrentId);
      if (e && !knInlineEditId) renderDetail(e);
    }
  } catch (e) {
    document.getElementById('knList').innerHTML =
      `<div class="kn-empty-list" style="color:var(--danger);">読み込み失敗: ${e.message}</div>`;
  }
}

async function migrateOldEntries() {
  const needsMigration = knEntries.filter(e =>
    e.source_type === 'manual' && e.body &&
    (/\*\*[^*]+\*\*/.test(e.body) || /\[\[id:[^\]]+\]\]/.test(e.body) ||
     /^\|.+\|$/m.test(e.body) || /^#{1,3} /.test(e.body) || /^[-*] /.test(e.body))
  );
  if (!needsMigration.length) { localStorage.setItem('kn_migrated_v2', '1'); return; }
  for (const entry of needsMigration) {
    try {
      await fetch(`/api/knowledge?id=${encodeURIComponent(entry.id)}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: entry.title, body: convertMdToHtml(entry.body || ''), tags: entry.tags, parent_id: entry.parent_id || null })
      });
    } catch {}
  }
  localStorage.setItem('kn_migrated_v2', '1');
  await loadKnowledge();
}

function convertMdToHtml(text) {
  if (!text) return '';
  text = text.replace(/\[\[id:([^\]|]+)\|([^\]]*)\]\]/g, (_, id, display) =>
    `<a class="kn-wiki" data-id="${id}" href="#">${esc(display)}</a>`);
  text = parseGFMTables(text);
  let html = text
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^---+$/gm, '<hr>').replace(/^[-*] (.+)$/gm, '<li>$1</li>').replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]+?<\/li>)(\n|$)/g, m => '<ul>' + m.trim() + '</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  html = html.split(/\n\n+/).map(block => {
    block = block.trim(); if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr|table|a )/.test(block)) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');
  return html;
}

function renderGrouped(entries, getKey, getLabel) {
  if (!entries.length) return '';

  // キーでグルーピング
  const groups = new Map();
  for (const e of entries) {
    const key = getKey(e) || '（グループなし）';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(e);
  }

  // グループが1つだけならフラット表示
  if (groups.size === 1) {
    return [...groups.values()][0].map(e => renderFlatItem(e)).join('');
  }

  let html = '';
  for (const [key, items] of groups) {
    const label = getLabel(key);
    const gid = 'grp_' + btoa(unescape(encodeURIComponent(key))).slice(0, 12);
    const isOpen = knGroupExpandedIds.has(gid);
    html += `<div class="kn-tree-item" onclick="toggleGroupExpand('${gid}')">
      <span class="kn-tree-toggle" style="font-size:9px;">${isOpen ? '▼' : '▶'}</span>
      <span class="kn-tree-item-title">${esc(label)}</span>
      <span class="kn-tree-item-count">${items.length}件</span>
    </div>`;
    if (isOpen) html += items.map(e => renderFlatItem(e, 14)).join('');
  }
  return html;
}

// ─── 関連ナレッジ抽出（本文の wiki link から） ───────────────
function extractRelatedEntries(htmlBody) {
  if (!htmlBody) return [];
  const seen = new Set();
  const result = [];
  // HTML形式：<a class="kn-wiki" data-id="xxx">
  const re1 = /data-id="([^"]+)"/g;
  let m;
  while ((m = re1.exec(htmlBody)) !== null) {
    if (!seen.has(m[1]) && m[1] !== knCurrentId) {
      seen.add(m[1]);
      const e = knEntries.find(x => x.id === m[1]);
      if (e) result.push(e);
    }
  }
  // Markdown形式（未変換残骸対応）
  const re2 = /\[\[id:([^\]|]+)\|/g;
  while ((m = re2.exec(htmlBody)) !== null) {
    if (!seen.has(m[1]) && m[1] !== knCurrentId) {
      seen.add(m[1]);
      const e = knEntries.find(x => x.id === m[1]);
      if (e) result.push(e);
    }
  }
  return result;
}

function renderTree(entries) {
  const map = new Map(entries.map(e => [e.id, { ...e, _children: [] }]));
  const roots = [];
  for (const node of map.values()) {
    if (node.parent_id && map.has(node.parent_id)) map.get(node.parent_id)._children.push(node);
    else roots.push(node);
  }
  const sortByTitle = arr => arr.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ja'));
  sortByTitle(roots); roots.forEach(r => sortByTitle(r._children));
  return roots.map(r => renderTreeNode(r, 0)).join('');
}

function renderTreeNode(node, depth) {
  const hasChildren = node._children && node._children.length > 0;
  const isExpanded = knExpandedIds.has(node.id);
  const isActive = node.id === knCurrentId;
  const indent = depth * 14;
  // active 時は左ボーダー 3px 分を padding から引いて位置を揃える
  const padLeft = 12 + indent - (isActive ? 3 : 0);
  const toggle = hasChildren
    ? `<span class="kn-tree-toggle" onclick="toggleExpand('${node.id}',event)" style="font-size:9px;">${isExpanded ? '▼' : '▶'}</span>`
    : `<span class="kn-tree-toggle-placeholder"></span>`;
  const countBadge = hasChildren ? `<span class="kn-tree-item-count">${node._children.length}件</span>` : '';
  let html = `<div class="kn-tree-item${isActive ? ' active' : ''}" style="padding-left:${padLeft}px;"
    draggable="true"
    onclick="selectEntry('${node.id}')"
    ondragstart="knDragStart(event,'${node.id}')"
    ondragend="knDragEnd(event)"
    ondragover="knDragOver(event,'${node.id}');return false"
    ondragleave="knDragLeave(event)"
    ondrop="knDrop(event,'${node.id}')">
    ${toggle}
    <span class="kn-tree-item-title">${esc(node.title || '（タイトルなし）')}</span>
    ${countBadge}
  </div>`;
  if (hasChildren && isExpanded) html += node._children.map(c => renderTreeNode(c, depth + 1)).join('');
  return html;
}

function renderFlatItem(e, indent = 0) {
  const isActive = e.id === knCurrentId;
  // active 時は左ボーダー 3px 分を padding から引いて位置を揃える（renderTreeNode と同様）
  const padLeft = 12 + indent - (isActive ? 3 : 0);
  return `<div class="kn-tree-item${isActive ? ' active' : ''}" style="padding-left:${padLeft}px;" onclick="selectEntry('${e.id}')">
    <span class="kn-tree-toggle-placeholder"></span>
    <span class="kn-tree-item-title">${esc(e.title || '（タイトルなし）')}</span>
  </div>`;
}

// ─── AI検索 ─────────────────────────────────────────────────
let knAiLoading = false;
function openAiSearch() { document.getElementById('knAiModal').style.display = 'flex'; document.getElementById('knAiInput').focus(); }
function closeAiSearch() { document.getElementById('knAiModal').style.display = 'none'; }

async function sendAiQuestion() {
  if (knAiLoading) return;
  const input = document.getElementById('knAiInput');
  const question = input.value.trim();
  if (!question) return;
  input.value = ''; knAiLoading = true;
  const sendBtn = document.getElementById('knAiSendBtn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.innerHTML = icon('loader',12,'currentColor'); }
  const body = document.getElementById('knAiBody');
  const userDiv = document.createElement('div');
  userDiv.className = 'kn-ai-msg kn-ai-msg-user';
  userDiv.textContent = question;
  body.appendChild(userDiv);
  const aiDiv = document.createElement('div');
  aiDiv.className = 'kn-ai-msg kn-ai-msg-assistant';
  aiDiv.innerHTML = '<span style="color:var(--text-muted);font-style:italic;">考え中...</span>';
  body.appendChild(aiDiv);
  body.scrollTop = body.scrollHeight;
  try {
    const res = await fetch('/api/ai-search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    if (!res.ok) throw new Error('API error: ' + res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', fullText = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const parsed = JSON.parse(raw);
          if (parsed.type === 'sources' && parsed.sources?.length) {
            const srcHtml = `<div class="kn-ai-sources"><div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">📎 参照元</div>
              ${parsed.sources.map(s => {
                const bc = s.source_type === 'manual' ? 'kn-badge-manual' : s.source_type === 'task_note' ? 'kn-badge-note' : 'kn-badge-meeting';
                const bl = s.source_type === 'manual' ? '企業のお医者さん' : s.source_type === 'task_note' ? 'タスク' : '面談';
                return `<span class="kn-ai-source-chip" onclick="closeAiSearch();selectEntry('${s.id}')"><span class="kn-badge ${bc}" style="font-size:8px;">${bl}</span> ${esc(s.title || s.id)}</span>`;
              }).join('')}</div>`;
            aiDiv.innerHTML = (fullText ? renderMarkdown(fullText) : '') + srcHtml;
          } else if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
            fullText += parsed.delta.text;
            aiDiv.innerHTML = renderMarkdown(fullText);
          }
        } catch {}
      }
      body.scrollTop = body.scrollHeight;
    }
    if (!fullText) aiDiv.innerHTML = '<span style="color:var(--text-muted);">応答がありませんでした</span>';
  } catch (e) {
    aiDiv.innerHTML = `<span style="color:var(--danger);">エラー: ${esc(e.message)}</span>`;
  } finally {
    knAiLoading = false;
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '送信'; }
    body.scrollTop = body.scrollHeight;
  }
}

function getBreadcrumb(id) {
  const chain = []; let cur = knEntries.find(e => e.id === id); const visited = new Set();
  while (cur && !visited.has(cur.id)) { chain.unshift(cur); visited.add(cur.id); cur = cur.parent_id ? knEntries.find(e => e.id === cur.parent_id) : null; }
  return chain;
}

  const chain = getBreadcrumb(id);
  if (chain.length <= 1) return '';
  const parts = chain.slice(0, -1).map(e => `<a class="kn-breadcrumb-link" onclick="selectEntry('${e.id}')">${esc(e.title || '（タイトルなし）')}</a>`);
  return `<div class="kn-breadcrumb">${parts.join(' <span style="color:var(--border)">›</span> ')} <span style="color:var(--border)">›</span></div>`;
}

// ─── 面談構造化データ表示（customers.html と同じ構成） ────────
function renderMeetingBody(e) {
  let s = {};
  try { s = JSON.parse(e.structured || '{}'); } catch { s = {}; }

  function section(icon, label, content, isPreWrap) {
    if (!content || (Array.isArray(content) ? !content.length : !content.trim())) return '';
    const body = Array.isArray(content)
      ? `<ul style="margin:0;padding-left:18px;">${content.map(x => `<li style="font-size:12px;line-height:1.7;color:var(--text);">${esc(x)}</li>`).join('')}</ul>`
      : `<div style="font-size:12px;${isPreWrap ? 'white-space:pre-wrap;' : ''}line-height:1.6;color:var(--text);">${esc(content)}</div>`;
    return `<div style="margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:4px;">${icon} ${label}</div>
      ${body}
    </div>`;
  }

  const parts = [
    section(icon('clipboard',11,'currentColor'), '過程・議事', s.process, true),
    section(icon('file-text',11,'currentColor'), 'メモ',       s.content, false),
    section(icon('bot',11,'#764ba2'),            'AI要約',     s.aiSummary, false),

// ─── 詳細描画 ────────────────────────────────────────────────
function renderDetail(e) {
  const isManual = e.source_type === 'manual';
  const isNote = e.source_type === 'task_note';
  const tags = Array.isArray(e.tags) ? e.tags : [];
  const badgeClass = isManual ? 'kn-badge-manual' : isNote ? 'kn-badge-note' : 'kn-badge-meeting';
  const badgeLabel = isManual ? '企業のお医者さん' : isNote ? 'タスクメモ' : '面談記録';
  const date = formatDate(e.updated_at);
  const tagHtml = tags.map(t => `<span class="kn-tag" style="font-size:11px;">${esc(t)}</span>`).join('');
  const breadcrumb = isManual ? renderBreadcrumb(e.id) : '';

  // ボタンはタイトル直後（flex:0 1 auto により自然な位置に）

    : isNote

  // 子ナレッジ：本文エリア上部に配置・3件超は折りたたみ

      `<span class="kn-child-chip" onclick="selectEntry('${c.id}')">${esc(c.title || '（タイトルなし）')}</span>`).join('');
    const hidChips = hidden.map(c =>

        const related = extractRelatedEntries(e.body || '');
        if (!related.length) return '';
        return `<div class="kn-sub-section">
          <div class="kn-sub-title">${icon('link',12,'currentColor')} 関連ナレッジ</div>

function toggleChildrenExpand() {
  const extra = document.getElementById('knChildrenExtra');
  const btn   = document.getElementById('knChildExpandBtn');
  if (!extra || !btn) return;
  if (extra.style.display === 'none' || extra.style.display === '') {
    extra.style.display = 'flex';
    btn.textContent = '↑ 折りたたむ';
  } else {
    extra.style.display = 'none';
    btn.textContent = `↓ ${btn.dataset.count}件を表示`;
  }
}

function sourceLink(e) {
  if (e.source_type === 'task_note') return `<a class="kn-source-link" href="project.html">→ タスクで確認</a>`;
  if (e.source_type === 'customer_meeting') return `<a class="kn-source-link" href="customers.html">→ 顧客で確認</a>`;
  return '';
}

// ① 被リンクに「＋ リンクを張る」ボタン追加
async function loadBacklinks(id) {
  const el = document.getElementById('knBacklinksBody');
  if (!el) return;
  const addChip = `<span class="kn-child-chip kn-child-chip-add" onclick="openBacklinkAddModal()">＋ リンクを張る</span>`;
  try {
    const res = await fetch(`/api/knowledge?backlinks=${encodeURIComponent(id)}`);
    const resp = await res.json();
    const entries = resp.entries || [];
    if (!entries.length) { el.innerHTML = addChip; return; }
    const chips = entries.map(e =>
      `<span class="kn-child-chip" onclick="selectEntry('${e.id}')">${esc(e.title || '（タイトルなし）')}</span>`
    ).join('');
    el.innerHTML = addChip + chips;
    return;
  } catch { if (el) el.innerHTML = addChip + '<span style="font-size:11px;color:var(--text-muted);">読み込み失敗</span>'; }
}

// ① 被リンク追加：現在のエントリへのリンクを「別のエントリ」の本文に追加
function openBacklinkAddModal() {
  if (!knCurrentId) return;

// ─── ④ Notion風インライン編集 ───────────────────────────────
function startInlineEdit(id) {
  // 選択されていないエントリを編集しようとした場合は先にselectEntry
  if (knCurrentId !== id) { selectEntry(id); setTimeout(() => startInlineEdit(id), 80); return; }
  const e = knEntries.find(x => x.id === id);
  if (!e) return;
  knInlineEditId = id;

  // 1) タイトルを contenteditable に（manualのみ）
  const titleEl = document.getElementById('knInlineTitle');
  if (titleEl && e.source_type === 'manual') {
    titleEl.setAttribute('contenteditable', 'true');
    titleEl.focus();
    // カーソルを末尾に
    const range = document.createRange();
    range.selectNodeContents(titleEl); range.collapse(false);
    window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
  }

  // 2) ボタンを Save/Cancel に差し替え
  const btnsEl = document.getElementById('knTitleBtns');
  if (btnsEl) {
    btnsEl.innerHTML = `
      <button class="btn btn-primary btn-sm" style="font-size:11px;padding:2px 9px;" onclick="saveInlineEdit('${id}')">${icon('save',11,'white')} 保存</button>
      <button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;" onclick="cancelInlineEdit('${id}')">✕</button>`;
  }

  // 3) md-preview → インラインエディタに差し替え
  const previewEl = document.getElementById('knBodyPreview');
  if (previewEl) {
    previewEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.id = 'knInlineEditorWrapper';
    const toolbar = buildInlineToolbar('knInlineEditor');
    wrapper.innerHTML = toolbar + `<div class="kn-inline-editor" id="knInlineEditor" contenteditable="true"></div>`;
    previewEl.parentNode.insertBefore(wrapper, previewEl);
    // 本文をセット
    const editorEl = document.getElementById('knInlineEditor');
    if (editorEl) {
      editorEl.innerHTML = e.body || '<p><br></p>';
      setupAutoSave(id);
      setupFloatingToolbar();
    }
  }
}

function applyHeading(tag, divId) {
  if (!tag) return;
  document.getElementById(divId)?.focus();
  document.execCommand('formatBlock', false, tag);
}

function applyFontSize(size, divId) {
  if (!size) return;
  const editor = document.getElementById(divId);
  if (!editor) return;
  restoreSavedRange(); // select操作で失われた選択範囲を復元
  // 選択範囲がエディタ内にあることを確認（外にあると document 全体に作用する危険）
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;
  editor.focus();
  document.execCommand('fontSize', false, 7);
  // エディタ外の font[size="7"] が万一あっても触らない
  editor.querySelectorAll('font[size="7"]').forEach(f => {
    const span = document.createElement('span');
    span.style.fontSize = size + 'px';
    while (f.firstChild) span.appendChild(f.firstChild);
    f.parentNode.replaceChild(span, f);
  });
}

function updateFloatingToolbar() {
  const tb = document.getElementById('knFloatingToolbar');
  if (!tb) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) { tb.style.display = 'none'; return; }
  const range = sel.getRangeAt(0);
  const editor = document.getElementById(KN_FT_EDITOR);
  if (!editor || !editor.contains(range.commonAncestorContainer)) { tb.style.display = 'none'; return; }
  const rect = range.getBoundingClientRect();
  if (!rect.width && !rect.height) { tb.style.display = 'none'; return; }
  tb.style.display = 'flex';
  _savedRange = range.cloneRange(); // select操作で失われる前に保存
  const tbW = tb.offsetWidth || 220;
  const tbH = tb.offsetHeight || 36;
  let top = rect.top - tbH - 8;
  let left = rect.left + rect.width / 2 - tbW / 2;
  top = Math.max(4, top);
  left = Math.max(4, Math.min(left, window.innerWidth - tbW - 4));
  tb.style.top = top + 'px';
  tb.style.left = left + 'px';
}

// フローティングツールバーで使う直前の選択範囲（select/dropdown用）
let _savedRange = null;

function restoreSavedRange() {
  if (!_savedRange) return;
  try {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_savedRange);
  } catch(e) {}
}

let _selectionHandler = null;
function setupFloatingToolbar() {
  ensureFloatingToolbar();
  if (_selectionHandler) document.removeEventListener('selectionchange', _selectionHandler);
  _selectionHandler = updateFloatingToolbar;
  document.addEventListener('selectionchange', _selectionHandler);
}
function teardownFloatingToolbar() {
  if (_selectionHandler) {
    document.removeEventListener('selectionchange', _selectionHandler);
    _selectionHandler = null;
  }
  const tb = document.getElementById('knFloatingToolbar');
  if (tb) tb.style.display = 'none';
}

function insertWysiwygTableTo(rows, cols, divId) {
  document.getElementById(divId)?.focus();
  let th = ''; for (let c = 0; c < cols; c++) th += '<th>ヘッダ</th>';
  let tbody = '';
  for (let r = 0; r < rows; r++) { let tds = ''; for (let c = 0; c < cols; c++) tds += '<td>　</td>'; tbody += `<tr>${tds}</tr>`; }
  document.execCommand('insertHTML', false, `<table><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table><p><br></p>`);
  closeTablePicker();
}

async function saveInlineEdit(id) {
  const e = knEntries.find(x => x.id === id);
  if (!e) return;
  const editorEl = document.getElementById('knInlineEditor');
  const titleEl = document.getElementById('knInlineTitle');
  const body = editorEl ? editorEl.innerHTML : (e.body || '');
  const title = (e.source_type === 'manual' && titleEl)
    ? (titleEl.textContent || titleEl.innerText || '').trim() || e.title
    : e.title;

  try {
    if (e.source_type === 'manual') {
      const res = await fetch(`/api/knowledge?id=${encodeURIComponent(id)}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, tags: e.tags, parent_id: e.parent_id || null })
      });
      const resp = await res.json();
      if (!resp.ok) throw new Error(resp.error);
    } else if (e.source_type === 'task_note') {
      let found = false;
      for (const task of (data?.tasks || [])) {
        const note = (task.notes || []).find(n => n.id === e.source_id);
        if (note) { note.content = body; note.updatedAt = new Date().toISOString(); found = true; break; }
      }
      if (!found) { alert('元のタスクノートが見つかりません'); return; }
      await saveData(data);
    } else if (e.source_type === 'customer_meeting') {
      let found = false;
      for (const customer of (data?.customers || [])) {
        const meeting = (customer.meetings || []).find(m => m.id === e.source_id);
        if (meeting) {
          meeting.content = body;
          if (title) meeting.conclusion = title;
          meeting.updatedAt = new Date().toISOString();
          found = true; break;
        }
      }
      if (!found) { alert('元の面談記録が見つかりません'); return; }
      await saveData(data);
    }
    teardownFloatingToolbar();
    clearAutoSave();
    knInlineEditId = null;
    await loadKnowledge();
    const updated = knEntries.find(x => x.id === id);
    if (updated) renderDetail(updated);
  } catch (err) { alert('保存失敗: ' + err.message); }
}

function cancelInlineEdit(id) {
  teardownFloatingToolbar();
  clearAutoSave();
  knInlineEditId = null;
  const e = knEntries.find(x => x.id === id);
  if (e) renderDetail(e);
}

// ─── 自動保存（3秒デバウンス） ────────────────────────────────
let _autoSaveTimer = null;

function setupAutoSave(id) {
  clearAutoSave();
  const editorEl = document.getElementById('knInlineEditor');
  const titleEl  = document.getElementById('knInlineTitle');
  if (!editorEl) return;

  const handler = () => {
    clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(() => autoSaveNow(id), 500);
  };
  editorEl.addEventListener('input', handler);
  if (titleEl) titleEl.addEventListener('input', handler);
  editorEl._autoSaveHandler = handler;
  if (titleEl) titleEl._autoSaveHandler = handler;

  // エディタからフォーカスが外れた瞬間に即保存（タブ切替で最も確実）
  window._autoSaveOnBlur = () => autoSaveNow(id);
  window._autoSaveBlurEl = editorEl;
  editorEl.addEventListener('blur', window._autoSaveOnBlur);

  // ページ離脱時
  window._autoSaveBeforeUnload = () => autoSaveNow(id);
  window.addEventListener('beforeunload', window._autoSaveBeforeUnload);
  // タブ非表示時（visibilitychange）
  window._autoSaveOnHide = () => { if (document.visibilityState === 'hidden') autoSaveNow(id); };
  document.addEventListener('visibilitychange', window._autoSaveOnHide);
  // pagehide（iOS・タブ閉じ対応）
  window._autoSaveOnPageHide = () => autoSaveNow(id);
  window.addEventListener('pagehide', window._autoSaveOnPageHide);
}

function clearAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = null;
  if (window._autoSaveOnBlur && window._autoSaveBlurEl) {
    window._autoSaveBlurEl.removeEventListener('blur', window._autoSaveOnBlur);
    window._autoSaveOnBlur = null;
    window._autoSaveBlurEl = null;
  }
  if (window._autoSaveBeforeUnload) {
    window.removeEventListener('beforeunload', window._autoSaveBeforeUnload);
    window._autoSaveBeforeUnload = null;
  }
  if (window._autoSaveOnHide) {
    document.removeEventListener('visibilitychange', window._autoSaveOnHide);
    window._autoSaveOnHide = null;
  }
  if (window._autoSaveOnPageHide) {
    window.removeEventListener('pagehide', window._autoSaveOnPageHide);
    window._autoSaveOnPageHide = null;
  }
}

function showAutoSaveStatus(msg, color) {
  let el = document.getElementById('knAutoSaveStatus');

    el = document.createElement('span');
    el.id = 'knAutoSaveStatus';
    el.style.cssText = 'font-size:11px;margin-left:10px;transition:opacity 0.5s;';
    const btns = document.getElementById('knTitleBtns');
    if (btns) btns.parentNode.insertBefore(el, btns.nextSibling);
  }
  el.style.opacity = '1';
  el.style.color = color || 'var(--text-muted)';
  el.textContent = msg;
  if (msg.includes('✓')) {
    clearTimeout(el._fadeTimer);
    el._fadeTimer = setTimeout(() => { el.style.opacity = '0'; }, 3000);
  }
}

async function autoSaveNow(id) {
  if (knInlineEditId !== id) return;
  const e = knEntries.find(x => x.id === id);
  if (!e) return;
  const editorEl = document.getElementById('knInlineEditor');
  const titleEl  = document.getElementById('knInlineTitle');
  if (!editorEl) return;

  showAutoSaveStatus('保存中…', 'var(--text-muted)');
  const body  = editorEl.innerHTML;
  const title = (e.source_type === 'manual' && titleEl)
    ? (titleEl.textContent || titleEl.innerText || '').trim() || e.title
    : e.title;
  try {
    if (e.source_type === 'manual') {
      const res = await fetch(`/api/knowledge?id=${encodeURIComponent(id)}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, tags: e.tags, parent_id: e.parent_id || null })
      });
      const resp = await res.json();
      if (!resp.ok) throw new Error(resp.error);
      // ローカルのknEntriesも更新
      e.body = body; e.title = title; e.updated_at = new Date().toISOString();
    } else if (e.source_type === 'task_note') {
      for (const task of (data?.tasks || [])) {
        const note = (task.notes || []).find(n => n.id === e.source_id);
        if (note) { note.content = body; note.updatedAt = new Date().toISOString(); break; }
      }
      await saveData(data);
      // クライアント側キャッシュも更新（別エントリから戻った時に古いbodyが出るのを防ぐ）
      e.body = body; e.updated_at = new Date().toISOString();
    } else if (e.source_type === 'customer_meeting') {
      for (const customer of (data?.customers || [])) {
        const meeting = (customer.meetings || []).find(m => m.id === e.source_id);
        if (meeting) { meeting.content = body; if (title) meeting.conclusion = title; meeting.updatedAt = new Date().toISOString(); break; }
      }
      await saveData(data);
      e.body = body; if (title) e.title = title; e.updated_at = new Date().toISOString();
    }
    showAutoSaveStatus('自動保存済み ✓', 'var(--success)');
  } catch (err) {
    showAutoSaveStatus('自動保存失敗 ⚠', 'var(--danger)');
  }
}

async function openHistoryPanel(knowledgeId) {

async function restoreHistory(knowledgeId, historyId) {
  if (!confirm('この版に戻しますか？\n現在の内容は自動的に履歴として保存されます。')) return;
  try {
    // 履歴一覧から該当版を取得
    const res  = await fetch(`/api/knowledge/history?id=${encodeURIComponent(knowledgeId)}`);
    const resp = await res.json();
    const hist = (resp.history || []).find(h => h.id === historyId);
    if (!hist) { alert('該当する履歴が見つかりません'); return; }

    // 現在版を上書き保存（= 保存API経由で現在版が履歴に入る）
    const saveRes = await fetch(`/api/knowledge?id=${encodeURIComponent(knowledgeId)}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: hist.title, body: hist.body, tags: hist.tags ? JSON.parse(hist.tags) : [] })
    });
    const saveResp = await saveRes.json();
    if (!saveResp.ok) throw new Error(saveResp.error);

    closeHistoryPanel();
    await loadKnowledge();
    const updated = knEntries.find(x => x.id === knowledgeId);
    if (updated) renderDetail(updated);
    alert('復元しました。');
  } catch (err) { alert('復元失敗: ' + err.message); }
}

// ─── 本文コピー（Phase A-2）──────────────────────────────────
function copyBodyText(id) {
  const e = knEntries.find(x => x.id === id);
  if (!e) return;
  // HTML タグを除去してプレーンテキスト化
  const tmp = document.createElement('div');
  tmp.innerHTML = e.body || '';
  // <br>/<p>/<hr> を改行に変換してから HTML タグを除去
  const html = (e.body || '')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/p>/gi, '\n')
    .replace(/<hr[^>]*>/gi, '\n---\n');
  tmp.innerHTML = html;
  const plainText = `【${e.title || '（タイトルなし）'}】\n\n${tmp.textContent.replace(/\n{3,}/g, '\n\n').trim()}`;

  navigator.clipboard.writeText(plainText).then(() => {
    const btn = document.getElementById(`knCopyBtn_${id}`);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✅ コピー済み';
      btn.style.background = '#dcfce7';
      btn.style.borderColor = '#86efac';
      setTimeout(() => { btn.textContent = orig; btn.style.background = ''; btn.style.borderColor = ''; }, 2000);
    }
  }).catch(() => {
    // フォールバック：古いブラウザ対応
    const ta = document.createElement('textarea');
    ta.value = plainText;
    ta.style.position = 'fixed'; ta.style.top = '0'; ta.style.left = '0'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('クリップボードにコピーしました');
  });
}

// ─── 親ナレッジ変更モーダル ──────────────────────────────────
let knMoveTargetId = null;
let knDragSourceId = null;

function openMoveModal(id) {
  const e = knEntries.find(x => x.id === id);

  // 選択肢を構築（自分自身と子孫を除くmanualエントリ）
  const descendants = new Set();
  const queue = [id];
  while (queue.length) {
    const cur = queue.shift();
    knEntries.filter(x => x.parent_id === cur).forEach(x => { descendants.add(x.id); queue.push(x.id); });
  }
  const sel = document.getElementById('knMoveParentSelect');
  sel.innerHTML = '<option value="">(なし＝ルートに移動)</option>';
  knEntries
    .filter(x => x.source_type === 'manual' && x.id !== id && !descendants.has(x.id))
    .sort((a, b) => (a.title || '').localeCompare(b.title || ''))
    .forEach(x => {
      const opt = document.createElement('option');
      opt.value = x.id;
      opt.textContent = x.title || '（タイトルなし）';
      if (x.id === e.parent_id) opt.selected = true;
      sel.appendChild(opt);
    });

  document.getElementById('knMoveModal').style.display = 'flex';
}

// ─── ドラッグ＆ドロップ移動（manual エントリのみ） ───────────────

function knDragStart(e, id) {
  knDragSourceId = id;
  e.dataTransfer.effectAllowed = 'move';
  // ゴースト画像が取得されてからフェードさせる
  const el = e.currentTarget;
  setTimeout(() => { el.style.opacity = '0.4'; }, 0);
  // ルートドロップゾーンを表示
  const root = document.getElementById('knDropRoot');
  if (root) root.classList.add('kn-drop-visible');
}

function knDragEnd(e) {
  e.currentTarget.style.opacity = '';
  knDragSourceId = null;
  const root = document.getElementById('knDropRoot');
  if (root) { root.classList.remove('kn-drop-visible'); root.classList.remove('kn-drag-over'); }
}

function knDragOver(e, id) {
  if (!knDragSourceId) return;
  if (id === knDragSourceId) return;                 // 自己ドロップ禁止
  if (id && knIsDescendant(id, knDragSourceId)) return; // 子孫ドロップ禁止
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('kn-drag-over');
}

function knDragLeave(e) {
  e.currentTarget.classList.remove('kn-drag-over');
}

async function knDrop(e, id) {
  e.preventDefault();
  e.currentTarget.classList.remove('kn-drag-over');
  const srcId = knDragSourceId;
  knDragSourceId = null;
  const root = document.getElementById('knDropRoot');
  if (root) { root.classList.remove('kn-drop-visible'); root.classList.remove('kn-drag-over'); }

  if (!srcId || srcId === id) return;
  if (id && knIsDescendant(id, srcId)) return;

  const source = knEntries.find(x => x.id === srcId);
  if (!source || source.source_type !== 'manual') return;

  const targetLabel = id ? (knEntries.find(x => x.id === id)?.title || id) : 'ルート';
  if (!confirm(`"${source.title}" を "${targetLabel}" へ移動しますか？`)) return;

  try {
    const res = await fetch(`/api/knowledge?id=${encodeURIComponent(srcId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: source.title, body: source.body || '', tags: source.tags, parent_id: id || null })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
    await loadKnowledge();
    selectEntry(srcId);
  } catch (err) { alert('移動失敗: ' + err.message); }
}

// nodeId が ancestorId の子孫か判定（循環参照対策付き）
function knIsDescendant(nodeId, ancestorId) {
  const visited = new Set();
  let node = knEntries.find(x => x.id === nodeId);
  while (node && node.parent_id) {
    if (visited.has(node.id)) break;
    if (node.parent_id === ancestorId) return true;
    visited.add(node.id);
    node = knEntries.find(x => x.id === node.parent_id);
  }
  return false;
}

// ─── ① 逆リンク追加（選んだエントリの本文に現在エントリへのリンクを追記）
async function addBacklinkToEntry(fromId) {
  const fromEntry = knEntries.find(e => e.id === fromId);
  const toEntry = knEntries.find(e => e.id === knCurrentId);
  if (!fromEntry || !toEntry) return;

  const linkHtml = `<a class="kn-wiki" data-id="${toEntry.id}" href="#">${esc(toEntry.title || '')}</a>`;

  if (fromEntry.source_type === 'manual') {
    const newBody = (fromEntry.body || '') + `<p>${linkHtml}</p>`;
    const res = await fetch(`/api/knowledge?id=${encodeURIComponent(fromId)}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: fromEntry.title, body: newBody, tags: fromEntry.tags, parent_id: fromEntry.parent_id || null })
    });
    const resp = await res.json();
    if (!resp.ok) throw new Error(resp.error);
  } else if (fromEntry.source_type === 'task_note') {
    let found = false;
    for (const task of (data?.tasks || [])) {
      const note = (task.notes || []).find(n => n.id === fromEntry.source_id);
      if (note) {
        note.content = (note.content || '') + `<p>${linkHtml}</p>`;
        note.updatedAt = new Date().toISOString();
        found = true; break;
      }
    }
    if (!found) throw new Error('タスクノートが見つかりません');
    await saveData(data);
  } else {
    throw new Error('面談記録へのリンク追加はナレッジ編集画面からは直接できません。顧客タブで編集してください。');
  }
  // ナレッジ一覧再読み込みして被リンクを更新
  await loadKnowledge();
  await loadBacklinks(knCurrentId);
}

  // ③-C 通常リンク挿入：DOM操作
  const editor = document.getElementById(knLinkTargetId);
  if (!editor) { closeLinkModal(); return; }
  const linkEl = document.createElement('a');
  linkEl.className = 'kn-wiki';
  linkEl.dataset.id = knLinkSelected.id;
  linkEl.href = '#';
  linkEl.textContent = knLinkSelected.title || '';
  editor.focus();
  if (knSavedRange) {
    try {
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(knSavedRange);
      const range = sel.getRangeAt(0);
      range.deleteContents(); range.insertNode(linkEl);
      range.setStartAfter(linkEl); range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
    } catch { editor.appendChild(linkEl); }
    knSavedRange = null;
  } else { editor.appendChild(linkEl); }
  closeLinkModal();
}

// ─── 木構造ユーティリティ ────────────────────────────────────

// 新規作成時の親候補: contextIdがある場合はそのツリー内のみ表示（候補を絞る）
function buildParentOptionsForNew(contextId) {
  let candidates = knEntries.filter(e => e.source_type === 'manual');
  if (contextId) {
    // 現在のエントリとその子孫のみ（"家系"内から親を選ぶ）
    const treeIds = getDescendantIds(contextId);
    candidates = candidates.filter(e => treeIds.has(e.id));
  }
  const options = candidates.map(e => {
    const label = getBreadcrumb(e.id).map(x => x.title || '（タイトルなし）').join(' › ');
    return `<option value="${e.id}">${esc(label)}</option>`;
  }).join('');
  return `<option value="">なし（ルートレベル）</option>${options}`;
}

function getDescendantIds(id) {
  const result = new Set([id]); const queue = [id];
  while (queue.length) { const cur = queue.shift(); knEntries.filter(e => e.parent_id === cur).forEach(e => { result.add(e.id); queue.push(e.id); }); }
  return result;
}
function buildParentOptions(excludeId, currentParentId) {
  const excluded = excludeId ? getDescendantIds(excludeId) : new Set();
  const options = knEntries.filter(e => e.source_type === 'manual' && !excluded.has(e.id)).map(e => {
    const label = getBreadcrumb(e.id).map(x => x.title || '（タイトルなし）').join(' › ');
    return `<option value="${e.id}"${e.id === currentParentId ? ' selected' : ''}>${esc(label)}</option>`;
  }).join('');
  return `<option value="">なし（ルートレベル）</option>${options}`;
}

// ─── 新規作成用ツールバー（通常モード）──────────────────────
function buildToolbar(divId) {
  const colors = [
    { hex: '#dc2626', label: '赤' }, { hex: '#ea580c', label: 'オレンジ' },
    { hex: '#2563eb', label: '青' }, { hex: '#16a34a', label: '緑' }, { hex: '#64748b', label: 'グレー' },
  ];
  const swatches = colors.map(c =>
    `<span class="kn-color-swatch" style="background:${c.hex};" title="${c.label}"
      onmousedown="event.preventDefault();applyForeColor('${c.hex}','${divId}')"></span>`).join('');
  let gridCells = '';
  for (let r = 1; r <= 5; r++)
    for (let c = 1; c <= 6; c++)
      gridCells += `<div class="kn-table-cell" data-r="${r}" data-c="${c}"
        onmouseover="hoverTablePicker(${r},${c},'tpick_${divId}')"
        onmousedown="event.preventDefault();insertWysiwygTable(${r},${c},'${divId}')"></div>`;
  return `<div class="kn-fmt-toolbar">
    <button class="kn-fmt-btn" title="太文字 (Ctrl+B)" onmousedown="event.preventDefault();document.execCommand('bold')"><strong>B</strong></button>
    <button class="kn-fmt-btn" title="下線 (Ctrl+U)" onmousedown="event.preventDefault();document.execCommand('underline')"><u>U</u></button>
    <button class="kn-fmt-btn" title="斜体 (Ctrl+I)" onmousedown="event.preventDefault();document.execCommand('italic')"><em style="font-style:italic;">I</em></button>
    <div class="kn-fmt-color-wrap">
      <button class="kn-fmt-btn" title="文字色" onmousedown="event.preventDefault();toggleColorPalette('pal_${divId}')">🎨</button>
      <div class="kn-color-palette" id="pal_${divId}">${swatches}
        <span class="kn-color-swatch" style="background:#fef08a;color:#92400e;" title="HL"
          onmousedown="event.preventDefault();applyHighlight('${divId}')">HL</span>
      </div>
    </div>
    <span class="kn-fmt-sep"></span>
    <button class="kn-fmt-btn" title="ナレッジリンク" onmousedown="event.preventDefault();openLinkModal('${divId}')">🔗</button>
    <div class="kn-fmt-color-wrap">
      <button class="kn-fmt-btn" title="表を挿入" onmousedown="event.preventDefault();toggleTablePicker('tpick_${divId}')" style="font-size:15px;">⊞</button>
      <div class="kn-table-picker" id="tpick_${divId}">
        <div class="kn-table-grid">${gridCells}</div>
        <div class="kn-table-picker-label" id="tpick_label_${divId}">列×行を選択</div>
      </div>
    </div>
  </div>`;
}

function getEditorContent(divId) { const el = document.getElementById(divId); return el ? el.innerHTML : ''; }
function setEditorContent(divId, html) { const el = document.getElementById(divId); if (el) el.innerHTML = html || '<p><br></p>'; }
function applyForeColor(color, divId) { document.getElementById(divId)?.focus(); document.execCommand('foreColor', false, color); closeColorPalette(); }
function applyHighlight(divId) { document.getElementById(divId)?.focus(); document.execCommand('hiliteColor', false, '#fef08a'); closeColorPalette(); }
function toggleColorPalette(palId) { const pal = document.getElementById(palId); if (!pal) return; const wasOpen = pal.classList.contains('open'); closeColorPalette(); if (!wasOpen) pal.classList.add('open'); }
function closeColorPalette() { document.querySelectorAll('.kn-color-palette.open').forEach(p => p.classList.remove('open')); }
function toggleTablePicker(pickId) { const el = document.getElementById(pickId); if (!el) return; const wasOpen = el.classList.contains('open'); closeTablePicker(); if (!wasOpen) el.classList.add('open'); }
function closeTablePicker() { document.querySelectorAll('.kn-table-picker.open').forEach(e => e.classList.remove('open')); }
function hoverTablePicker(r, c, pickId) {
  document.querySelectorAll(`#${pickId} .kn-table-cell`).forEach(cell => {
    cell.classList.toggle('hover', parseInt(cell.dataset.r) <= r && parseInt(cell.dataset.c) <= c);
  });
  // tpick_label_XXX の id はツールバー関数で付けた方式に合わせる
  const labelId = pickId.startsWith('itpick_') ? `tpick_label_${pickId}` : `tpick_label_${pickId.replace('tpick_', '')}`;
  const label = document.getElementById(labelId);
  if (label) label.textContent = `${c}列 × ${r}行`;
}
function insertWysiwygTable(rows, cols, divId) {
  document.getElementById(divId)?.focus();
  let th = ''; for (let c = 0; c < cols; c++) th += '<th>ヘッダ</th>';
  let tbody = '';
  for (let r = 0; r < rows; r++) { let tds = ''; for (let c = 0; c < cols; c++) tds += '<td>　</td>'; tbody += `<tr>${tds}</tr>`; }
  document.execCommand('insertHTML', false, `<table><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table><p><br></p>`);
  closeTablePicker();
}

// ─── GFMテーブルパーサー ─────────────────────────────────────
function parseGFMTables(text) {
  const lines = text.split('\n'); const out = []; let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim(); const next = (lines[i + 1] || '').trim();
    if (/^\|.+\|$/.test(line) && /^\|[-:\s|]+\|$/.test(next)) {
      const headers = splitTableRow(lines[i]); i += 2; const rows = [];
      while (i < lines.length && /^\|.+\|$/.test(lines[i].trim())) { rows.push(splitTableRow(lines[i])); i++; }
      const th = headers.map(h => `<th>${h}</th>`).join('');
      const tb = rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      out.push(`<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`);
    } else { out.push(lines[i]); i++; }
  }
  return out.join('\n');
}
function splitTableRow(line) { return line.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim()); }

// ─── Markdownパーサー ─────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  if (/<[a-z][^>]*>/i.test(text)) return text;
  text = parseGFMTables(text);
  const linkMap = {}; let idx = 0;
  text = text.replace(/\[\[id:([^\]|]+)\|([^\]]*)\]\]/g, (_, id, display) => {
    const found = knEntries.find(e => e.id === id);
    const label = esc(found ? (found.title || display) : display);
    const key = `\x00KL${idx++}\x00`;
    linkMap[key] = found
      ? `<a class="kn-wiki" data-id="${id}" href="#">${label}</a>`
      : `<span class="kn-broken">${label}</span>`;
    return key;
  });
  let html = text
    .replace(/```[\s\S]*?```/g, m => { const code = m.replace(/^```[^\n]*\n?/, '').replace(/```$/, ''); return `<pre><code>${esc(code)}</code></pre>`; })
    .replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`)
    .replace(/^### (.+)$/gm, (_, t) => `<h3>${t}</h3>`).replace(/^## (.+)$/gm, (_, t) => `<h2>${t}</h2>`).replace(/^# (.+)$/gm, (_, t) => `<h1>${t}</h1>`)
    .replace(/^---+$/gm, '<hr>').replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>').replace(/^[-*] (.+)$/gm, '<li>$1</li>').replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]+?<\/li>)(\n|$)/g, m => '<ul>' + m.trim() + '</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  html = html.split(/\n\n+/).map(block => {
    block = block.trim(); if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr|table)/.test(block)) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');
  Object.entries(linkMap).forEach(([k, v]) => { html = html.replaceAll(k, v); });
  return html;
}

// ─── 画像サイドパネル（右スライド） ────────────────────────────
function openImagePanel(src) {
  const panel  = document.getElementById('knImagePanel');
  const img    = document.getElementById('knImagePanelImg');
  const newTab = document.getElementById('knImagePanelNewTab');
  const title  = document.getElementById('knImagePanelTitle');
  if (!panel || !img) return;
  img.src = src;
  if (newTab) newTab.href = src;
  // ファイル名をタイトルとして表示（URLの末尾部分）
  if (title) {
    try { title.textContent = decodeURIComponent(src.split('/').pop().split('?')[0]) || '画像'; }
    catch { title.textContent = '画像'; }
  }
  panel.classList.add('open');
  document.addEventListener('keydown', onImagePanelKey);
}
function closeImagePanel() {
  const panel = document.getElementById('knImagePanel');
  if (panel) panel.classList.remove('open');
  document.removeEventListener('keydown', onImagePanelKey);
}
function onImagePanelKey(e) { if (e.key === 'Escape') closeImagePanel(); }

// ─── バックグラウンドresync（knowledge最新化）─────────────────
async function triggerResync() {
  try {
    await fetch('/api/resync', { method: 'POST' });
    // resync完了後、一覧を再読み込みして最新内容・更新日時を反映
    await loadKnowledge();
  } catch { /* silent fail */ }
}

// ─── 日付フォーマット（数値タイムスタンプ対応）─────────────────
function formatDate(val) {
  if (!val) return '';
  // 数値 or 数字のみ文字列（Date.now()等）→ ローカル日時
  if (typeof val === 'number' || /^\d{10,13}$/.test(String(val))) {
    const d = new Date(Number(val));
    return d.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tokyo' });
  }
  const d = new Date(val);
  if (isNaN(d)) return String(val).slice(0, 16);
  return d.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tokyo' });
}

// ─── ユーティリティ ──────────────────────────────────────────
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function updateHeaderDatetime() {
  const now = new Date();
  const d = document.getElementById('headerDate'), t = document.getElementById('headerTime');
  if (d) d.textContent = now.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
  if (t) t.textContent = now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
}
function updateHeaderUser() {
  if (!currentUser) return;
  const av = document.getElementById('headerAvatar'), nm = document.getElementById('headerName');
  if (av) av.textContent = currentUser.avatar || currentUser.name?.[0] || '?';
  if (nm) nm.textContent = currentUser.name || '';
}
function switchUser() { clearCurrentUser(); showUserSelectModal(data, user => { currentUser = user; updateHeaderUser(); }); }
