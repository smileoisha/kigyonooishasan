<html lang="ja">
<head>
<meta charset="UTF-8">

<title>プロジェクト | 企業のお医者さん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="icons.js"></script>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo">
      <img src="logo.png" alt="企業のお医者さん">
    </span>
    <nav class="nav-tabs">
      <a href="index.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><g fill="none" stroke="#1E3A5F" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g></svg> マイタスク</a>
      <span class="nav-tab active"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><path fill="none" stroke="#1E3A5F" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> プロジェクト</span>
      <a href="gantt.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><path fill="none" stroke="#D4AF37" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 5h12M4 12h10m-2 7h8"/></svg> ガント</a>
      <a href="customers.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><g fill="none" stroke="#E8662A" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M16 3.128a4 4 0 0 1 0 7.744M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></g></svg> 顧客</a>
      <a href="knowledge.html" class="nav-tab"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><path fill="none" stroke="#7C3AED" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 7v14m-9-3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4a4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3a3 3 0 0 0-3-3z"/></svg> ナレッジ</a>
    </nav>
  </div>
  <div class="header-right">
    <div class="header-datetime" id="headerDatetime">
      <span class="header-datetime-date" id="headerDate"></span>
      <span class="header-datetime-time" id="headerTime"></span>
    </div>
    <button id="backupBtn" class="backup-btn" onclick="manualBackup()" title="バックアップ未実施（クリックして実行）">💾</button>
    <div class="user-badge" onclick="switchUser()" title="ユーザーを切り替え">
      <div class="user-avatar" id="headerAvatar">?</div>
      <span class="user-name" id="headerName">未選択</span>

  </div>
</header>


<!-- 通知バナーエリア -->
<div id="notifBannerArea"></div>

<!-- Page layout -->
<div class="page-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="projectSidebar">
    <div class="sidebar-title">プロジェクト</div>
    <div id="sidebarList"></div>
    <div class="sidebar-add">
      <button class="btn btn-outline btn-sm" style="width:100%;" onclick="openProjectModal()">＋ 新規プロジェクト</button>
    </div>
  </aside>
  <button class="sidebar-toggle-btn" id="sidebarToggleBtn" onclick="toggleProjectSidebar()" title="サイドバーを開閉">◀</button>

  <!-- モバイル時のサイドバー開放中のみ表示される背景（タップで閉じる） -->
  <div class="sidebar-mobile-backdrop" onclick="toggleProjectSidebar()"></div>

  <!-- Content -->
  <div class="project-content" id="projectContent">
    <div class="empty-state">
      <div class="empty-icon" id="projectSelectEmptyIcon">📁</div>
      <div class="empty-title">プロジェクトを選択</div>
      <div class="empty-desc">左のリストからプロジェクトを選んでください</div>
    </div>
  </div>
</div>

<!-- Status popup -->
<div class="status-popup" id="statusPopup"></div>

<!-- Note panel overlay -->
<div class="note-panel-overlay" id="notePanelOverlay" onclick="closeNotePanel()"></div>

<!-- Note panel -->
<div class="note-panel" id="notePanel">
  <div class="note-panel-header">
    <span style="font-size:18px;flex-shrink:0;" id="projNotePanelIcon">📋</span>
    <span class="note-panel-title" id="notePanelTitle">ノート</span>
    <button class="note-panel-close" onclick="closeNotePanel()">✕</button>
  </div>
  <div class="note-panel-body" id="notePanelBody"></div>
</div>

<!-- File viewer panel -->
<div class="file-viewer-panel" id="fileViewerPanel">
  <div class="file-viewer-header">
    <span class="file-viewer-icon" id="fvIcon">📄</span>
    <span class="file-viewer-title" id="fvTitle"></span>
    <a class="file-viewer-btn" id="fvDownload" download>⬇ DL</a>
    <button class="file-viewer-btn" onclick="closeFileViewer()">✕ 閉じる</button>
  </div>
  <div class="file-viewer-body" id="fvBody"></div>
</div>

<!-- Memo popup -->
<div class="memo-popup" id="memoPopup">
  <textarea id="memoTextarea" placeholder="メモを入力..."></textarea>
  <div class="memo-popup-footer">
    <button class="btn btn-outline btn-xs" onclick="closeMemoPopup()">キャンセル</button>
    <button class="btn btn-primary btn-xs" onclick="saveMemoPopup()">保存</button>
  </div>
</div>

<!-- Date picker popup -->
<div class="datepicker-popup" id="datepickerPopup">
  <div class="datepicker-header">
    <button class="datepicker-nav" onclick="dpPrevMonth()">◀</button>
    <span class="datepicker-header-label" id="dpMonthLabel"></span>
    <button class="datepicker-nav" onclick="dpNextMonth()">▶</button>
  </div>
  <div class="datepicker-weekdays">
    <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
  </div>
  <div class="datepicker-days" id="dpDays"></div>
  <div class="datepicker-input-row">
    <input type="date" class="form-input" id="dpDateInput" style="font-size:12px;padding:5px 8px;"
      onchange="dpOnInputChange(this.value)">
  </div>
  <div class="datepicker-footer" style="flex-wrap:wrap;gap:6px;">
    <button class="btn btn-outline btn-sm" onclick="dpAddGcal()">📅 Gカレンダー</button>
    <button class="btn btn-sm" id="dpClearStartBtn" onclick="dpClearStart()" style="display:none;color:#dc2626;border-color:#dc2626;">🗑 開始日消去</button>
    <button class="btn btn-sm" id="dpClearDueBtn" onclick="dpClearDue()" style="display:none;color:#dc2626;border-color:#dc2626;">🗑 期限消去</button>
  </div>
  <div class="datepicker-set-msg" id="dpSetMsg"></div>
</div>

<!-- Link popup -->
<div class="link-popup" id="linkPopup" style="width:340px;">
  <div class="link-popup-label">🔗 リンク・添付ファイル</div>
  <div id="linkChipList"></div>
  <div class="link-add-form">
    <div class="link-tabs">
      <button class="link-tab active" id="linkTabUrl" onclick="switchLinkTab('url')">🔗 URL</button>
      <button class="link-tab" id="linkTabFile" onclick="switchLinkTab('file')">📎 ファイル</button>
    </div>
    <div id="linkPanelUrl">
      <input class="form-input" id="linkUrlInput" placeholder="https://..."
        style="font-size:12px;padding:5px 8px;"
        onkeydown="if(event.key==='Enter')addLinkToTask()">
      <div style="display:flex;justify-content:flex-end;margin-top:6px;">
        <button class="btn btn-primary btn-xs" onclick="addLinkToTask()">追加</button>
      </div>
    </div>
    <div id="linkPanelFile" style="display:none;">
      <div class="file-drop-zone" id="fileDropZone"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleFileDrop(event)">
        <div style="font-size:20px;margin-bottom:4px;">📎</div>
        <div>ここにドロップ</div>
        <div style="font-size:11px;color:var(--text-muted);margin:4px 0;">または</div>
        <label class="btn btn-outline btn-xs" style="cursor:pointer;display:inline-flex;">
          ファイルを選択

        </label>

    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">新規タスク</span>
      <button class="modal-close" onclick="closeModal('taskModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editTaskId">
      <div class="form-group">
        <label class="form-label">タスク名 *</label>
        <input class="form-input" id="taskTitleInput" placeholder="タスクの内容を入力">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">ステータス</label>
          <select class="form-select" id="taskStatusSelect">
            <option value="pending">未着手</option>
            <option value="inProgress">進行中</option>
            <option value="stuck">スタック</option>
            <option value="review">確認待ち</option>
            <option value="done">完了</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">担当者</label>
          <select class="form-select" id="taskAssigneeSelect"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">顧客</label>
        <select class="form-select" id="taskCustomerSelect"></select>
      </div>
      <!-- 開始日・期限・メモはタスク行のアイコン（📅/📝）から設定できます -->
      <div class="form-group" id="subtaskSection" style="display:none;">
        <label class="form-label" style="margin-bottom:6px;">サブタスク</label>
        <div id="modalSubtaskList"></div>
        <div style="display:flex;gap:6px;margin-top:6px;">
          <input class="form-input" id="modalNewSubtaskInput" placeholder="サブタスクを追加..."
            style="flex:1;font-size:13px;"
            onkeydown="if(event.key==='Enter')addModalSubtask()">
          <button class="btn btn-outline btn-sm" onclick="addModalSubtask()" style="white-space:nowrap;">＋ 追加</button>
        </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('taskModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<!-- Project Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="projectModalTitle">新規プロジェクト</span>
      <button class="modal-close" onclick="closeModal('projectModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editProjectId">
      <div class="form-group">
        <label class="form-label">プロジェクト名 *</label>
        <input class="form-input" id="projectNameInput" placeholder="プロジェクト名を入力">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">カラー</label>
          <input type="color" class="form-input" id="projectColorInput" value="#4A90D9" style="height:40px;padding:4px;">
        </div>
        <div class="form-group">
          <label class="form-label">期限</label>
          <input type="date" class="form-input" id="projectDueInput">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('projectModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveProject()">保存</button>
    </div>
  </div>
</div>

<!-- 担当者ピッカー -->
<div class="assignee-picker-popup" id="assigneePickerPopup">
  <div class="assignee-picker-list" id="assigneePickerList"></div>
</div>

<script src="data.js"></script>
<script src="auth.js"></script>
<script>
// ─── Header clock ────────────────────────────────────
const DOW_JA = ['日','月','火','水','木','金','土'];
function updateHeaderClock() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const dow = DOW_JA[now.getDay()];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const dateEl = document.getElementById('headerDate');
  const timeEl = document.getElementById('headerTime');
  if (dateEl) dateEl.textContent = `${y}年${m}月${d}日（${dow}）`;
  if (timeEl) timeEl.textContent = `${hh}:${mm}:${ss}`;
}
updateHeaderClock();
setInterval(updateHeaderClock, 1000);

// ─── State ────────────────────────────────────────────
let data = null;
let currentUser = null;
let currentProjectId = null;
const openNodes = new Set();
let _dragSrcId = null;
let _memoTarget = null;
let statusFilter = 'active';

function matchStatusFilter(t) {
  if (statusFilter === 'all') return true;
  if (statusFilter === 'active') return t.status !== 'done';
  if (statusFilter === 'stuck') return t.status === 'stuck' || isOverdue(t);
  if (statusFilter === 'done') return t.status === 'done';
  return true;
}

function hasDescendantMatchingStatus(task) {
  return getDescendantIds(data, task.id).some(id => {
    const c = data.tasks.find(t => t.id === id);
    return c && matchStatusFilter(c);
  });
}
function setStatusFilter(v) {
  statusFilter = v;
  document.querySelectorAll('#projStatusFilter .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === v);
  });
  renderContent();
}
let _statusTarget = null;
let _linkTarget = null;

// ─── Init ─────────────────────────────────────────────
loadData().then(d => {
  data = d;
  initBackupIndicator();
  autoBackupIfNeeded();
  initAuth(data, user => {
    currentUser = user;
    updateHeaderUser();
    renderSidebar();
    // URLパラメータでプロジェクト指定があれば選択
    const params = new URLSearchParams(location.search);
    const pid = params.get('p');
    if (pid && data.projects.find(p => p.id === pid)) selectProject(pid);
    else if (data.projects.length) selectProject(data.projects[0].id);
    initNotifications();
  });
});

function updateHeaderUser() {
  if (!currentUser) return;
  document.getElementById('headerAvatar').textContent = currentUser.avatar;
  document.getElementById('headerName').textContent = currentUser.name;
}

function switchUser() {
  clearCurrentUser();
  showUserSelectModal(data, user => {
    currentUser = user;
    updateHeaderUser();
    renderContent();
  });
}

// ─── Sidebar collapse ──────────────────────────────────
// モバイル（≤768px）では初期状態で閉じる。PCでは従来通り開いたまま。
let sidebarCollapsed = window.matchMedia('(max-width: 768px)').matches;
function toggleProjectSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const sb = document.getElementById('projectSidebar');
  const btn = document.getElementById('sidebarToggleBtn');
  sb.classList.toggle('collapsed', sidebarCollapsed);
  btn.textContent = sidebarCollapsed ? '▶' : '◀';
  btn.title = sidebarCollapsed ? 'サイドバーを開く' : 'サイドバーを閉じる';
}
// 初期状態を DOM に反映（JS読み込み時点で collapsed をあてる）
document.addEventListener('DOMContentLoaded', () => {
  const sb = document.getElementById('projectSidebar');
  const btn = document.getElementById('sidebarToggleBtn');
  if (sb && btn) {
    sb.classList.toggle('collapsed', sidebarCollapsed);
    btn.textContent = sidebarCollapsed ? '▶' : '◀';
    btn.title = sidebarCollapsed ? 'サイドバーを開く' : 'サイドバーを閉じる';
  }
});

// ─── Sidebar ───────────────────────────────────────────
function renderSidebar() {
  document.getElementById('sidebarList').innerHTML = data.projects.map(p => `
    <button class="sidebar-item ${p.id === currentProjectId ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <span class="sidebar-item-dot" style="background:${p.color}"></span>
      ${escH(p.name)}
    </button>
  `).join('');
}

function selectProject(pid) {
  currentProjectId = pid;
  renderSidebar();
  renderContent();
}

// ─── タスクの実効日付（自身＋サブタスク再帰で最小）────────
function getEffectiveDueDate(taskId) {
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return null;
  const dates = [];
  if (task.dueDate) dates.push(task.dueDate);
  (task.children || []).forEach(cid => {
    const childDate = getEffectiveDueDate(cid);
    if (childDate) dates.push(childDate);
  });
  return dates.length ? dates.sort()[0] : null;
}

function sortByEffectiveDueDate(tasks) {
  return [...tasks].sort((a, b) => {
    const da = getEffectiveDueDate(a.id);
    const db = getEffectiveDueDate(b.id);
    if (da && db) return da.localeCompare(db);
    if (da) return -1; // 日付ありを上に
    if (db) return 1;
    return 0; // 両方なしは順不同
  });
}

// ─── Content ───────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('projectContent');
  const project = data.projects.find(p => p.id === currentProjectId);
  if (!project) return;

  const projectTasks = data.tasks.filter(t => t.projectId === currentProjectId && t.parentId === null);

  // 担当者別グループ化（ソート後）
  const assigneeGroups = {};
  const unassigned = [];
  sortByEffectiveDueDate(projectTasks).forEach(t => {
    if (t.assigneeId) {
      if (!assigneeGroups[t.assigneeId]) assigneeGroups[t.assigneeId] = [];
      assigneeGroups[t.assigneeId].push(t);
    } else {
      unassigned.push(t);
    }
  });

  const dueMeta = project.dueDate ? `期限 ${fmtDate(project.dueDate)}` : '';
  const stObj = STATUSES[project.status] || STATUSES.pending;

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <div>
        <h2 style="font-size:20px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:10px;">
          <span style="width:14px;height:14px;border-radius:50%;background:${project.color};display:inline-block;"></span>
          ${escH(project.name)}
          ${dueMeta ? `<span style="font-size:13px;font-weight:500;color:var(--text-sub);">${dueMeta}</span>` : ''}
        </h2>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="filter-group" id="projStatusFilter">
          <button class="filter-btn ${statusFilter==='all'?'active':''}" data-status="all" onclick="setStatusFilter('all')">すべて</button>
          <button class="filter-btn ${statusFilter==='active'?'active':''}" data-status="active" onclick="setStatusFilter('active')">未完了</button>
          <button class="filter-btn ${statusFilter==='stuck'?'active':''}" data-status="stuck" onclick="setStatusFilter('stuck')">スタック</button>
          <button class="filter-btn ${statusFilter==='done'?'active':''}" data-status="done" onclick="setStatusFilter('done')">完了</button>
        </div>
        <button class="btn btn-outline btn-sm" onclick="openProjectModal('${project.id}')">${icon('pencil',12,'currentColor')} 編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProject('${project.id}')">${icon('trash',12,'white')} 削除</button>
        <button class="btn btn-primary btn-sm" onclick="openAddTaskModal()">＋ タスク追加</button>
      </div>
    </div>`;

  // 担当者グループ表示
  const renderGroup = (user, tasks) => {
    const name = user ? user.name : '未割り当て';
    const avatar = user ? user.avatar : '？';
    return `
      <div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--navy);color:var(--gold);
                      font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;">
            ${avatar}
          </div>
          <span style="font-size:13px;font-weight:700;color:var(--text);">担当：${escH(name)}</span>
          <span style="font-size:11px;color:var(--text-muted);background:var(--border-light);padding:1px 8px;border-radius:10px;">${tasks.length}件</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          ${tasks.map(t => renderTaskRow(t, false)).join('')}
          <div class="add-task-row" onclick="openAddTaskModal()">
            <span style="font-size:15px;line-height:1;">+</span>
            <span>タスクを追加</span>
          </div>
        </div>
      </div>`;
  };

  Object.entries(assigneeGroups).forEach(([uid, tasks]) => {
    const filtered = tasks.filter(t => matchStatusFilter(t) || hasDescendantMatchingStatus(t));
    if (!filtered.length) return;
    const user = data.users.find(u => u.id === uid);
    html += renderGroup(user, filtered);
  });

  const filteredUnassigned = unassigned.filter(t => matchStatusFilter(t) || hasDescendantMatchingStatus(t));
  if (filteredUnassigned.length) html += renderGroup(null, filteredUnassigned);

  if (!projectTasks.length) {
    html += `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">タスクがありません</div>
      <div class="empty-desc">「＋ タスク追加」から作成しましょう</div>
    </div>`;
  }

  content.innerHTML = html;

  // サブタスク展開復元
  openNodes.forEach(id => {
    const el = document.getElementById('sub-' + id);
    if (el) el.style.display = 'flex';
  });
}

function renderTaskRow(task, isChild) {
  const st = STATUSES[task.status] || STATUSES.pending;
  const asgn = data.users.find(u => u.id === task.assigneeId);
  const children = getChildren(task.id);
  const hasChildren = children.length > 0;
  const isExpanded = openNodes.has(task.id);
  const isDone = task.status === 'done';
  const od = isOverdue(task) && !isDone;
  const stuck = task.status === 'stuck';

  let cls = 'task-row' + (isChild ? ' subtask' : '');
  if (isDone) cls += ' done';
  else if (od) cls += ' overdue';
  else if (stuck) cls += ' stuck';

  let dueHtml = '';
  if (task.dueDate) {
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((new Date(task.dueDate + 'T00:00:00') - today) / 86400000);
    let dcls = 'task-due-badge';
    let dt = fmtDate(task.dueDate);
    if (diff < 0 && !isDone) { dcls += ' overdue'; dt = Math.abs(diff) + '日超過'; }
    else if (diff === 0) { dcls += ' today'; dt = '今日'; }
    else if (diff === 1) dt = '明日';
    dueHtml = `<span class="${dcls}">${dt}</span>`;
  }

  // サブタスクはステータスフィルタを適用しない（親が表示されていれば子はすべて見せる）
  const visibleChildren = children;
  const childrenDone = children.filter(c => c.status === 'done').length;
  const taskLinks = task.links || [];
  const hasLink = taskLinks.length > 0;

  const attachHtml = hasLink
    ? `<div class="task-attach-chips">${taskLinks.map(lnk =>
        lnk.type === 'file'
          ? `<a href="${escA(lnk.url)}" target="_blank" class="attach-chip" onclick="event.stopPropagation();event.preventDefault();openFileViewer('${escA(lnk.url)}','${escA(lnk.label)}','${escA(lnk.fileType||'')}')">${linkIcon(lnk)}${escH(lnk.label)}</a>`
          : `<a href="${escA(lnk.url)}" target="_blank" class="attach-chip" onclick="event.stopPropagation()">${linkIcon(lnk)}${escH(lnk.label || lnk.url)}</a>`
      ).join('')}</div>`
    : '';

  const subHtml = (hasChildren || isExpanded)
    ? `<div class="subtask-group" id="sub-${task.id}" style="display:${isExpanded ? 'flex' : 'none'};flex-direction:column;">
        ${visibleChildren.map(c => renderTaskRow(c, true)).join('')}
        <div class="subtask-add-row">
          <input class="subtask-add-input" id="subtask-input-${task.id}" placeholder="サブタスクを追加..."
            onkeydown="if(event.key==='Enter')commitSubtask('${task.id}');else if(event.key==='Escape')toggleChildren('${task.id}')">
          <button class="btn btn-outline btn-xs" onclick="commitSubtask('${task.id}')">追加</button>
        </div>
       </div>`
    : '';

  const tagHtml = (task.tags || []).map(tag =>
    `<span class="task-tag" style="background:${tagColor(tag)}20;color:${tagColor(tag)};">${escH(tag)}</span>`
  ).join('');

  const noteCount = (task.notes || []).length;
  const icons = `<span class="task-icons">
    <button class="task-icon-btn ${task.memo ? 'has-memo' : 'task-icon-empty'}" onclick="event.stopPropagation();showMemoPopup(event,'${task.id}')" title="${task.memo ? 'メモあり：クリックで編集' : 'メモを追加'}">${icon('file-text',12,'currentColor')}${task.memo ? ' メモ' : ''}</button>
    <button class="task-icon-btn ${noteCount > 0 ? 'has-notes' : 'task-icon-empty'}" onclick="event.stopPropagation();openNotePanel('${task.id}')" title="${noteCount > 0 ? noteCount + '件のノート' : 'ノートを追加'}">${icon('clipboard',12,'currentColor')}${noteCount > 0 ? ' ' + noteCount + '件' : ' ノート'}</button>
    <button class="task-icon-btn ${hasLink ? 'has-link' : 'task-icon-empty'}" onclick="event.stopPropagation();showLinkPopup(event,'${task.id}')" title="${hasLink ? taskLinks.length + '件のリンク' : 'リンクを追加'}">${icon('link',12,'currentColor')}${hasLink ? ' ' + taskLinks.length + '件' : ' リンク'}</button>
    <button class="task-icon-btn ${(task.startDate||task.dueDate) ? 'has-link' : 'task-icon-empty'}" onclick="event.stopPropagation();showDatepicker(event,'${task.id}')" title="${task.startDate && task.dueDate ? '開始: ' + fmtDate(task.startDate) + ' 期限: ' + fmtDate(task.dueDate) : task.dueDate ? '期限: ' + fmtDate(task.dueDate) : task.startDate ? '開始: ' + fmtDate(task.startDate) : '日付を設定'}">${icon('calendar',12,'currentColor')}${task.startDate && task.dueDate ? ' ' + fmtDate(task.startDate) + '〜' + fmtDate(task.dueDate) : task.dueDate ? ' ' + fmtDate(task.dueDate) : task.startDate ? ' 開始' + fmtDate(task.startDate) : ' 日付'}</button>
    <button class="task-icon-btn ${hasChildren ? 'has-subtasks' : 'task-icon-empty'}" onclick="event.stopPropagation();toggleChildren('${task.id}')" title="${hasChildren ? 'サブタスクを表示' : 'サブタスクを追加'}">▶ サブタスク ${visibleChildren.length}/${children.length}</button>
  </span>`;

  return `
    <div class="${cls}" data-id="${task.id}" draggable="true"
  ondragstart="event.stopPropagation();taskDragStart(event,'${task.id}')"
  ondragover="event.stopPropagation();taskDragOver(event,'${task.id}')"
  ondragleave="event.stopPropagation();taskDragLeave(event)"
  ondrop="event.stopPropagation();taskDrop(event,'${task.id}')"
  ondragend="event.stopPropagation();taskDragEnd(event)">
      <span class="drag-handle" title="ドラッグで移動">⠿</span>
      <div class="task-check ${isDone ? 'checked' : ''}" onclick="toggleDone('${task.id}')">${isDone ? '✓' : ''}</div>
      <span class="task-title-area">
        <button class="task-pencil-btn" onclick="event.stopPropagation();editTaskTitle('${task.id}')" title="タスク名を変更">${icon('pencil',12,'currentColor')}</button>
        <span class="task-title-text" onclick="openEditModal('${task.id}')">${escH(task.title)}</span>
        ${tagHtml}
        ${icons}
      </span>
      <span style="flex:1;min-width:8px"></span>
      <span class="task-status-badge" style="background:${st.bg};color:${st.color};"
        onclick="event.stopPropagation();showStatusPopup(event,'${task.id}')">${st.label}</span>
      ${dueHtml}
      <div class="task-assignee ${asgn ? '' : 'task-assignee-empty'}"
        title="${asgn ? escA(asgn.name) : '担当者を設定'}"
        onclick="event.stopPropagation();showAssigneePicker(event,'${task.id}')"
        style="cursor:pointer;${asgn ? '' : 'background:var(--border);color:var(--text-muted);font-size:14px;'}"
      >${asgn ? asgn.avatar : '+'}</div>
      <div class="task-hover-actions">
        <button class="task-action-btn" onclick="event.stopPropagation();duplicateTask('${task.id}')" title="複製">${icon('clipboard',12,'currentColor')}</button>
        <button class="task-action-btn danger" onclick="event.stopPropagation();deleteTask('${task.id}')" title="削除">${icon('trash',12,'currentColor')}</button>
      </div>
      ${attachHtml}
    </div>
    ${subHtml}`;
}

function getChildren(taskId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return [];
  const children = t.children.map(id => data.tasks.find(t => t.id === id)).filter(Boolean);
  return children.sort((a, b) => {
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return 0;
  });
}

// ─── Interactions ─────────────────────────────────────
function toggleChildren(taskId) {
  if (openNodes.has(taskId)) openNodes.delete(taskId);
  else openNodes.add(taskId);
  renderContent();
}

function toggleDone(taskId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  t.status = t.status === 'done' ? 'pending' : 'done';
  saveData(data);
  renderContent();
}

function duplicateTask(taskId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;

  function deepCopy(srcId, newParentId) {
    const src = data.tasks.find(t => t.id === srcId);
    if (!src) return null;
    const newId = genId();
    const copy = {
      ...src,
      id: newId,
      title: srcId === taskId ? src.title + ' (コピー)' : src.title,
      parentId: newParentId,
      children: [],
      status: 'pending'
    };
    data.tasks.push(copy);
    // 子タスクを再帰コピー
    (src.children || []).forEach(childId => {
      const childNewId = deepCopy(childId, newId);
      if (childNewId) copy.children.push(childNewId);
    });
    return newId;
  }

  const newId = deepCopy(taskId, t.parentId);

  // 親タスクのchildren配列に追加（サブタスクとして複製された場合）
  if (t.parentId) {
    const parent = data.tasks.find(p => p.id === t.parentId);
    if (parent) {
      const childIdx = parent.children.indexOf(taskId);
      parent.children.splice(childIdx + 1, 0, newId);
    }
  }

  saveData(data);
  renderContent();
}

// ─── Drag & Drop ───────────────────────────────────────
// ─── D&D ヘルパー（3階層上限チェック用）──────────────────
function _taskDepth(tasks, taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || !t.parentId) return 1;
  return 1 + _taskDepth(tasks, t.parentId);
}
function _subtreeHeight(tasks, taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || !t.children || !t.children.length) return 1;
  return 1 + Math.max(...t.children.map(c => _subtreeHeight(tasks, c)));
}

function taskDragStart(e, taskId) {
  _dragSrcId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
  setTimeout(() => {
    const el = document.querySelector(`.task-row[data-id="${taskId}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function taskDragOver(e, taskId) {
  if (taskId === _dragSrcId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = e.currentTarget;
  el.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into');
  const rect = el.getBoundingClientRect();
  const relY = e.clientY - rect.top;
  // ゾーンを上40%・下40%・中央20%に拡張
  if (relY < rect.height * 0.4) {
    el.classList.add('drag-over-top');
  } else if (relY > rect.height * 0.6) {
    el.classList.add('drag-over-bottom');
  } else {
    el.classList.add('drag-over-into');
  }
}

function taskDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into');
}

// ドロップ先がなく中断した場合も透明化をリセット
function taskDragEnd(e) {
  document.querySelectorAll('.task-row').forEach(r =>
    r.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into', 'dragging'));
  _dragSrcId = null;
}

function taskDrop(e, targetId) {
  e.preventDefault();
  const el = e.currentTarget;
  const dropClass = el.classList.contains('drag-over-top') ? 'top'
    : el.classList.contains('drag-over-bottom') ? 'bottom' : 'into';
  document.querySelectorAll('.task-row').forEach(r =>
    r.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into', 'dragging'));

  if (!_dragSrcId || _dragSrcId === targetId) { _dragSrcId = null; return; }

  const srcTask = data.tasks.find(t => t.id === _dragSrcId);
  const targetTask = data.tasks.find(t => t.id === targetId);
  if (!srcTask || !targetTask) { _dragSrcId = null; return; }

  // Remove src from parent's children list
  if (srcTask.parentId) {
    const oldParent = data.tasks.find(t => t.id === srcTask.parentId);
    if (oldParent) oldParent.children = oldParent.children.filter(id => id !== _dragSrcId);
  }

  if (dropClass === 'into') {
    // Guard 1: 循環参照チェック（src の子孫に target が含まれる場合はキャンセル）
    if (getDescendantIds(data, _dragSrcId).includes(targetId)) {
      _dragSrcId = null; return;
    }
    // Guard 2: 3階層上限チェック（targetDepth + srcHeight > 3 はキャンセル）
    const targetDepth = _taskDepth(data.tasks, targetId);
    const srcHeight   = _subtreeHeight(data.tasks, _dragSrcId);
    if (targetDepth + srcHeight > 3) {
      _dragSrcId = null; return;
    }
    // Make srcTask a subtask of targetTask
    srcTask.parentId = targetId;
    if (!targetTask.children.includes(_dragSrcId)) {
      targetTask.children.push(_dragSrcId);
    }
  } else {
    // Reorder: place before or after targetTask
    srcTask.parentId = targetTask.parentId;
    if (targetTask.parentId) {
      // Both in same parent's children
      const parent = data.tasks.find(t => t.id === targetTask.parentId);
      if (parent) {
        parent.children = parent.children.filter(id => id !== _dragSrcId);
        const tIdx = parent.children.indexOf(targetId);
        if (dropClass === 'top') {
          parent.children.splice(tIdx, 0, _dragSrcId);
        } else {
          parent.children.splice(tIdx + 1, 0, _dragSrcId);
        }
      }
    } else {
      // Top-level reorder
      const srcIdx = data.tasks.findIndex(t => t.id === _dragSrcId);
      data.tasks.splice(srcIdx, 1);
      const tIdx = data.tasks.findIndex(t => t.id === targetId);
      if (dropClass === 'top') {
        data.tasks.splice(tIdx, 0, srcTask);
      } else {
        data.tasks.splice(tIdx + 1, 0, srcTask);
      }
    }
  }

  saveData(data);
  renderContent();
  _dragSrcId = null;
}

function deleteTask(taskId) {
  if (!confirm('このタスクを削除しますか？')) return;
  deleteTaskDeep(data, taskId);
  saveData(data);
  renderContent();
}

function deleteProject(pid) {
  if (!confirm('このプロジェクトとすべてのタスクを削除しますか？')) return;
  data.tasks = data.tasks.filter(t => t.projectId !== pid);
  data.projects = data.projects.filter(p => p.id !== pid);
  saveData(data);
  currentProjectId = data.projects[0]?.id || null;
  renderSidebar();
  if (currentProjectId) renderContent();
  else document.getElementById('projectContent').innerHTML = `<div class="empty-state"><div class="empty-icon">${icon('folder',32,'#94a3b8')}</div><div class="empty-title">プロジェクトがありません</div></div>`;
}

// ─── Status popup ──────────────────────────────────────
function showStatusPopup(e, taskId) {
  e.stopPropagation();
  _statusTarget = taskId;
  const popup = document.getElementById('statusPopup');
  popup.innerHTML = Object.entries(STATUSES).map(([key, s]) =>
    `<button class="status-option" onclick="setTaskStatus('${key}')">
      <span class="status-dot" style="background:${s.color}"></span>${s.label}
    </button>`
  ).join('');
  const x = Math.min(e.clientX, window.innerWidth - 160);
  const y = Math.min(e.clientY + 4, window.innerHeight - 200);
  popup.style.left = x + 'px'; popup.style.top = y + 'px';
  popup.classList.add('open');
  const close = () => { popup.classList.remove('open'); document.removeEventListener('click', close); };
  setTimeout(() => document.addEventListener('click', close), 0);
}

function setTaskStatus(status) {
  const t = data.tasks.find(t => t.id === _statusTarget);
  if (!t) return;
  t.status = status;
  saveData(data);
  renderContent();
}

// ─── Memo popup ────────────────────────────────────────
function showMemoPopup(e, taskId) {
  e.stopPropagation();
  _memoTarget = taskId;
  const t = data.tasks.find(t => t.id === taskId);
  document.getElementById('memoTextarea').value = t?.memo || '';
  const popup = document.getElementById('memoPopup');
  const x = Math.min(e.clientX, window.innerWidth - 280);
  const y = Math.min(e.clientY + 8, window.innerHeight - 180);
  popup.style.left = x + 'px'; popup.style.top = y + 'px';
  popup.classList.add('open');
  document.getElementById('memoTextarea').focus();
  const close = ev => { if (!popup.contains(ev.target)) { closeMemoPopup(); document.removeEventListener('mousedown', close); } };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}

function closeMemoPopup() { document.getElementById('memoPopup').classList.remove('open'); }

function saveMemoPopup() {
  const t = data.tasks.find(t => t.id === _memoTarget);
  if (t) { t.memo = document.getElementById('memoTextarea').value.trim(); saveData(data); renderContent(); }
  closeMemoPopup();
}

// ─── Task modal ────────────────────────────────────────
// ─── 担当者ピッカー ───────────────────────────────────────
let _assigneeTargetId = null;
function showAssigneePicker(e, taskId) {
  e.stopPropagation();
  _assigneeTargetId = taskId;
  const task = data.tasks.find(t => t.id === taskId);
  const popup = document.getElementById('assigneePickerPopup');
  const list = document.getElementById('assigneePickerList');
  list.innerHTML =
    `<div class="assignee-picker-item ${!task.assigneeId ? 'selected' : ''}" onclick="setAssignee(null)">
       <span class="assignee-picker-avatar" style="background:#94a3b8;color:#fff;">？</span>
       <span>未割り当て</span>
     </div>` +
    data.users.map(u =>
      `<div class="assignee-picker-item ${task.assigneeId === u.id ? 'selected' : ''}" onclick="setAssignee('${escA(u.id)}')">
         <span class="assignee-picker-avatar" style="background:var(--navy);color:var(--gold);">${escH(u.avatar)}</span>
         <span>${escH(u.name)}</span>
       </div>`
    ).join('');
  const rect = e.currentTarget.getBoundingClientRect();
  const x = Math.min(rect.right + 4, window.innerWidth - 200);
  let y = rect.top;
  if (y + 200 > window.innerHeight - 8) y = window.innerHeight - 208;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.classList.add('open');
  setTimeout(() => document.addEventListener('mousedown', closeAssigneePickerOutside), 0);
}
function closeAssigneePickerOutside(e) {
  const popup = document.getElementById('assigneePickerPopup');
  if (popup && !popup.contains(e.target)) {
    popup.classList.remove('open');
    document.removeEventListener('mousedown', closeAssigneePickerOutside);
  }
}
function setAssignee(userId) {
  const task = data.tasks.find(t => t.id === _assigneeTargetId);
  if (task) {
    task.assigneeId = userId;
    saveData(data);
    renderContent();
  }
  document.getElementById('assigneePickerPopup').classList.remove('open');
  document.removeEventListener('mousedown', closeAssigneePickerOutside);
}

function openAddTaskModal() {
  document.getElementById('taskModalTitle').textContent = '新規タスク';
  document.getElementById('editTaskId').value = '';
  document.getElementById('taskTitleInput').value = '';
  document.getElementById('taskStatusSelect').value = 'pending';
  populateAssigneeSelect(currentUser?.id);
  populateCustomerSelect(null);
  renderModalSubtaskList(null);
  openModal('taskModal');
}

function openEditModal(taskId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  document.getElementById('taskModalTitle').textContent = 'タスクを編集';
  document.getElementById('editTaskId').value = taskId;
  document.getElementById('taskTitleInput').value = t.title;

  populateAssigneeSelect(t.assigneeId);

}

function populateAssigneeSelect(currentId) {
  document.getElementById('taskAssigneeSelect').innerHTML =
    `<option value="">未割り当て</option>` +
    data.users.map(u => `<option value="${u.id}" ${u.id === currentId ? 'selected' : ''}>${u.name}</option>`).join('');
}

function populateCustomerSelect(currentId) {
  const cSel = document.getElementById('taskCustomerSelect');
  cSel.innerHTML = `<option value="">紐付けなし</option>` +
    (data.customers || []).map(c =>
      `<option value="${c.id}" ${c.id === currentId ? 'selected' : ''}>${escH(c.name)}${c.company ? ' / ' + escH(c.company) : ''}</option>`
    ).join('');
}

function commitSubtask(taskId) {
  const inp = document.getElementById('subtask-input-' + taskId);
  if (!inp) return;
  const title = inp.value.trim();
  if (!title) return;
  const parent = data.tasks.find(t => t.id === taskId);
  if (!parent) return;
  const id = genId();
  data.tasks.push({
    id, projectId: parent.projectId, parentId: taskId,
    title, status: 'pending',
    assigneeId: parent.assigneeId, dueDate: null, memo: '', tags: [], children: [], links: []
  });
  if (!parent.children.includes(id)) parent.children.push(id);
  openNodes.add(taskId);
  saveData(data);
  renderContent();
  setTimeout(() => { const ni = document.getElementById('subtask-input-' + taskId); if (ni) ni.focus(); }, 0);
}

function editTaskTitle(taskId) {
  const titleEl = document.querySelector(`.task-row[data-id="${taskId}"] .task-title-text`);
  if (!titleEl) return;
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  const inp = document.createElement('input');
  inp.className = 'task-title-input';
  inp.value = t.title;
  titleEl.replaceWith(inp);
  inp.focus(); inp.select();
  const commit = () => { const val = inp.value.trim(); if (val) { t.title = val; saveData(data); } renderContent(); };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.removeEventListener('blur', commit); commit(); }
    if (e.key === 'Escape') { inp.removeEventListener('blur', commit); renderContent(); }
  });
}

function saveTask() {
  const id = document.getElementById('editTaskId').value;
  const title = document.getElementById('taskTitleInput').value.trim();
  if (!title) { alert('タスク名を入力してください'); return; }
  const status = document.getElementById('taskStatusSelect').value;
  const assigneeId = document.getElementById('taskAssigneeSelect').value || null;
  const customerId = document.getElementById('taskCustomerSelect').value || null;

  if (id) {
    const t = data.tasks.find(t => t.id === id);
    // 日付・メモはアイコンから個別編集するため上書きしない
    if (t) Object.assign(t, { title, status, assigneeId, customerId });
  } else {
    data.tasks.push({
      id: genId(), projectId: currentProjectId, parentId: null,
      title, status, assigneeId, startDate: null, dueDate: null, customerId, memo: '',
      tags: [], children: [], links: []
    });
  }
  saveData(data);
  closeModal('taskModal');
  renderContent();
}

// ─── Project modal ─────────────────────────────────────
function openProjectModal(pid = null) {
  const project = pid ? data.projects.find(p => p.id === pid) : null;
  document.getElementById('projectModalTitle').textContent = project ? 'プロジェクトを編集' : '新規プロジェクト';
  document.getElementById('editProjectId').value = pid || '';
  document.getElementById('projectNameInput').value = project?.name || '';
  document.getElementById('projectColorInput').value = project?.color || '#4A90D9';
  document.getElementById('projectDueInput').value = project?.dueDate || '';
  openModal('projectModal');
}

function saveProject() {
  const id = document.getElementById('editProjectId').value;
  const name = document.getElementById('projectNameInput').value.trim();
  if (!name) { alert('プロジェクト名を入力してください'); return; }
  const color = document.getElementById('projectColorInput').value;
  const dueDate = document.getElementById('projectDueInput').value || null;

  if (id) {
    const p = data.projects.find(p => p.id === id);
    if (p) Object.assign(p, { name, color, dueDate });
  } else {
    data.projects.push({ id: genId(), name, color, dueDate, status: 'active' });
  }
  saveData(data);
  closeModal('projectModal');
  renderSidebar();
  if (id === currentProjectId) renderContent();
}

// ─── Date picker ───────────────────────────────────────
let _dpTarget = null;
let _dpDate = null;
let _dpYear = null;
let _dpMonth = null;
let _dpPhase = 'start'; // 'start' | 'due'

function dpUpdateMsg() {
  const t = _dpTarget ? data.tasks.find(x => x.id === _dpTarget) : null;
  const phaseHint = _dpPhase === 'start' ? '① 開始日をクリック' : '② 期限をクリック';
  const parts = [];
  if (t?.startDate) parts.push(`開始: ${fmtDate(t.startDate)}`);
  if (t?.dueDate)   parts.push(`期限: ${fmtDate(t.dueDate)}`);
  document.getElementById('dpSetMsg').textContent = phaseHint + (parts.length ? '　' + parts.join('　') : '');
  document.getElementById('dpClearStartBtn').style.display = t?.startDate ? '' : 'none';
  document.getElementById('dpClearDueBtn').style.display = t?.dueDate ? '' : 'none';
}

function showDatepicker(e, taskId) {
  e.stopPropagation();
  _dpTarget = taskId;
  const t = data.tasks.find(t => t.id === taskId);
  const today = new Date();
  _dpPhase = (t?.startDate && !t?.dueDate) ? 'due' : 'start';
  const base = t?.startDate ? new Date(t.startDate + 'T00:00:00') : t?.dueDate ? new Date(t.dueDate + 'T00:00:00') : today;
  _dpYear = base.getFullYear();
  _dpMonth = base.getMonth();
  _dpDate = null;
  document.getElementById('dpDateInput').value = '';
  dpUpdateMsg();
  dpRenderCalendar();
  const popup = document.getElementById('datepickerPopup');
  const x = Math.min(e.clientX, window.innerWidth - 260);
  const y = Math.min(e.clientY + 8, window.innerHeight - 320);
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  popup.classList.add('open');
  const close = ev => {
    if (!popup.contains(ev.target)) { closeDatepicker(); document.removeEventListener('mousedown', close); }
  };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}

function closeDatepicker() {
  document.getElementById('datepickerPopup').classList.remove('open');
}

function dpRenderCalendar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const t = _dpTarget ? data.tasks.find(x => x.id === _dpTarget) : null;
  const rs = t?.startDate || null;
  const re = t?.dueDate   || null;
  document.getElementById('dpMonthLabel').textContent = `${_dpYear}年${_dpMonth + 1}月`;
  const firstDow = new Date(_dpYear, _dpMonth, 1).getDay();
  const daysInMonth = new Date(_dpYear, _dpMonth + 1, 0).getDate();
  let html = '';
  for (let i = 0; i < firstDow; i++) html += '<span class="dp-day dp-empty"></span>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${_dpYear}-${String(_dpMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(_dpYear, _dpMonth, d).getDay();
    let cls = 'dp-day';
    if (ds === todayStr) cls += ' dp-today';
    if (rs && re && ds === rs && ds === re) cls += ' dp-range-single';
    else if (rs && ds === rs) cls += ' dp-range-start';
    else if (re && ds === re) cls += ' dp-range-end';
    else if (rs && re && ds > rs && ds < re) cls += ' dp-in-range';
    else if (ds === _dpDate) cls += ' dp-selected';
    if (dow === 0 || dow === 6) cls += ' dp-weekend';
    html += `<span class="${cls}" onclick="dpSelectDate('${ds}')">${d}</span>`;
  }
  document.getElementById('dpDays').innerHTML = html;
}

function dpPrevMonth() {
  _dpMonth--;
  if (_dpMonth < 0) { _dpMonth = 11; _dpYear--; }
  dpRenderCalendar();
}
function dpNextMonth() {
  _dpMonth++;
  if (_dpMonth > 11) { _dpMonth = 0; _dpYear++; }
  dpRenderCalendar();
}

function dpSelectDate(dateStr) {
  _dpDate = dateStr;
  document.getElementById('dpDateInput').value = dateStr;
  const t = _dpTarget ? data.tasks.find(x => x.id === _dpTarget) : null;
  if (!t) { dpRenderCalendar(); return; }

  if (_dpPhase === 'start') {
    t.startDate = dateStr;
    if (t.dueDate && t.dueDate < dateStr) t.dueDate = null;
    _dpPhase = 'due';
    saveData(data);
    renderContent();
  } else {
    if (!t.startDate || dateStr >= t.startDate) {
      t.dueDate = dateStr;
      _dpPhase = 'start';
      saveData(data);
      renderContent();
    } else {
      t.startDate = dateStr;
      t.dueDate = null;
      saveData(data);
      renderContent();
    }
  }
  dpUpdateMsg();
  dpRenderCalendar();
}

function dpOnInputChange(val) {
  if (!val) {
    _dpDate = null;
    dpRenderCalendar();
    return;
  }
  _dpDate = val;
  const d = new Date(val + 'T00:00:00');
  _dpYear = d.getFullYear();
  _dpMonth = d.getMonth();
  dpRenderCalendar();
}

function dpSetStart() {
  if (!_dpDate) { document.getElementById('dpSetMsg').textContent = '日付を選択してください'; return; }
  const t = data.tasks.find(t => t.id === _dpTarget);
  if (!t) return;
  t.startDate = _dpDate;
  if (t.dueDate && t.dueDate < _dpDate) t.dueDate = null;
  _dpPhase = 'due';
  saveData(data);
  renderContent();
  dpUpdateMsg();
  dpRenderCalendar();
}

function dpClearStart() {
  const t = data.tasks.find(t => t.id === _dpTarget);
  if (!t) return;
  t.startDate = null;
  _dpDate = null;
  document.getElementById('dpDateInput').value = '';
  _dpPhase = 'start';
  saveData(data);
  renderContent();
  dpUpdateMsg();
  dpRenderCalendar();
}

function dpSetDue() {
  if (!_dpDate) { document.getElementById('dpSetMsg').textContent = '日付を選択してください'; return; }
  const t = data.tasks.find(t => t.id === _dpTarget);
  if (!t) return;
  t.dueDate = _dpDate;
  _dpPhase = 'start';
  saveData(data);
  renderContent();
  dpUpdateMsg();
  dpRenderCalendar();
}

function dpClearDue() {
  const t = data.tasks.find(t => t.id === _dpTarget);
  if (!t) return;
  t.dueDate = null;
  _dpDate = null;
  document.getElementById('dpDateInput').value = '';
  _dpPhase = 'due';
  saveData(data);
  renderContent();
  dpUpdateMsg();
  dpRenderCalendar();
}

function dpAddGcal() {
  const t = data.tasks.find(t => t.id === _dpTarget);

function showLinkPopup(e, taskId) {
  e.stopPropagation();
  _linkTarget = taskId;
  renderLinkChipList();
  document.getElementById('linkUrlInput').value = '';
  const popup = document.getElementById('linkPopup');
  const x = Math.min(e.clientX, window.innerWidth - 340);
  const y = Math.min(e.clientY + 8, window.innerHeight - 200);
  popup.style.left = x + 'px'; popup.style.top = y + 'px';
  popup.classList.add('open');
  switchLinkTab('url');
  setTimeout(() => document.getElementById('linkUrlInput').focus(), 50);
  const close = ev => { if (!popup.contains(ev.target)) { closeLinkPopup(); document.removeEventListener('mousedown', close); } };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}
function closeLinkPopup() { document.getElementById('linkPopup').classList.remove('open'); }
function renderLinkChipList() {
  const t = data.tasks.find(t => t.id === _linkTarget);
  const links = t?.links || [];
  const list = document.getElementById('linkChipList');
  if (!links.length) { list.innerHTML = '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">リンクはありません</div>'; return; }
  list.innerHTML = links.map((lnk, i) => {
    const isFile = lnk.type === 'file';
    const chip = isFile
      ? `<a href="${escA(lnk.url)}" target="_blank" class="attach-chip" style="flex:1;min-width:0;" onclick="event.preventDefault();openFileViewer('${escA(lnk.url)}','${escA(lnk.label)}','${escA(lnk.fileType||'')}')">${linkIcon(lnk)}${escH(lnk.label)}</a>`
      : `<a href="${escA(lnk.url)}" target="_blank" class="attach-chip" style="flex:1;min-width:0;">${linkIcon(lnk)}${escH(lnk.label || lnk.url)}</a>`;
    return `<div class="link-chip-row">${chip}<button class="link-chip-del" onclick="removeLinkFromTask(${i})" title="削除">✕</button></div>`;
  }).join('');
}
function addLinkToTask() {
  const url = document.getElementById('linkUrlInput').value.trim();
  if (!url) { document.getElementById('linkUrlInput').focus(); return; }
  const label = autoLabelFromUrl(url);
  const t = data.tasks.find(t => t.id === _linkTarget);
  if (!t) return;
  if (!t.links) t.links = [];
  t.links.push({ label, url });
  saveData(data);
  renderLinkChipList();
  document.getElementById('linkUrlInput').value = '';
  document.getElementById('linkUrlInput').focus();
  renderContent();
}
function autoLabelFromUrl(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url.length > 30 ? url.slice(0,30)+'…' : url; }
}
function switchLinkTab(tab) {
  const isUrl = tab === 'url';
  document.getElementById('linkPanelUrl').style.display = isUrl ? 'block' : 'none';
  document.getElementById('linkPanelFile').style.display = isUrl ? 'none' : 'block';
  document.getElementById('linkTabUrl').classList.toggle('active', isUrl);
  document.getElementById('linkTabFile').classList.toggle('active', !isUrl);
  if (isUrl) setTimeout(() => document.getElementById('linkUrlInput').focus(), 50);
}
function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('fileDropZone').classList.remove('drag-over');
  Array.from(e.dataTransfer.files).forEach(f => addFileToTask(f));
}
function handleFileSelect(e) {
  Array.from(e.target.files).forEach(f => addFileToTask(f));
  e.target.value = '';
}
function addFileToTask(file) {
  if (file.size > 10 * 1024 * 1024) { alert('10MB以内のファイルを選択してください: ' + file.name); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const t = data.tasks.find(t => t.id === _linkTarget);
    if (!t) return;
    if (!t.links) t.links = [];
    t.links.push({ label: file.name, url: ev.target.result, type: 'file', fileType: file.type });
    saveData(data);
    renderLinkChipList();
    renderContent();
  };
  reader.readAsDataURL(file);
}
function removeLinkFromTask(idx) {
  const t = data.tasks.find(t => t.id === _linkTarget);
  if (!t || !t.links) return;
  t.links.splice(idx, 1);
  saveData(data);
  renderLinkChipList();
  renderContent();
}
function linkIcon(lnk) {
  if (typeof lnk === 'string') lnk = { url: lnk };
  if (lnk.type === 'file') {
    const ft = lnk.fileType || '';
    if (ft.startsWith('image/')) return icon('image',12,'currentColor') + ' ';
    if (ft.includes('pdf')) return icon('file-text',12,'currentColor') + ' ';
    if (ft.includes('word') || ft.includes('document')) return icon('file-text',12,'currentColor') + ' ';
    if (ft.includes('spreadsheet') || ft.includes('excel')) return icon('bar-chart',12,'currentColor') + ' ';
    return icon('paperclip',12,'currentColor') + ' ';
  }
  const url = lnk.url || '';
  if (url.includes('notion.so')) return icon('file-text',12,'currentColor') + ' ';
  if (url.includes('drive.google.com') || url.includes('docs.google.com')) return icon('file',12,'currentColor') + ' ';
  if (url.includes('dropbox.com')) return icon('folder',12,'currentColor') + ' ';
  if (url.match(/\.(pdf)$/i)) return icon('file-text',12,'currentColor') + ' ';
  return icon('link',12,'currentColor') + ' ';
}

async function deleteModalSubtask(subId) {

  if (!sub) return;
  const parentId = sub.parentId;
  const parent = data.tasks.find(t => t.id === parentId);
  if (parent) parent.children = (parent.children || []).filter(c => c !== subId);
  data.tasks = data.tasks.filter(t => t.id !== subId);
  saveData(data);
  renderModalSubtaskList(parentId);
}

// ─── Utils ────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function escH(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s || '').replace(/"/g,'&quot;'); }
// HTMLまたはプレーンテキストを安全に表示（WYSIWYG対応）
function safeNoteHtml(content) {
  if (!content) return '';
  if (/<[a-z][^>]*>/i.test(content)) return content; // HTMLコンテンツ→そのまま
  return escH(content).replace(/\n/g, '<br>'); // プレーンテキスト→エスケープ
}

function buildGcalUrl(task) {
  const title = encodeURIComponent(task.title);
  const startD = task.startDate || task.dueDate;
  const endD   = task.dueDate   || task.startDate;
  if (!startD) return '';
  const ds = startD.replace(/-/g, '');
  const ed = new Date(endD + 'T00:00:00');
  ed.setDate(ed.getDate() + 1);
  const es = ed.getFullYear() + String(ed.getMonth()+1).padStart(2,'0') + String(ed.getDate()).padStart(2,'0');
  let det = task.memo || '';
  (task.links || []).forEach(lnk => { det += (det ? '\n' : '') + (lnk.label || 'Link') + ': ' + lnk.url; });
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${ds}/${es}&details=${encodeURIComponent(det)}`;
}
function tagColor(tag) {
  const palette = ['#4f46e5','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777','#0369a1'];
  let h = 0;
  for (const c of tag) h = (h * 31 + c.charCodeAt(0)) % palette.length;
  return palette[h];
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['taskModal', 'projectModal'].forEach(id => document.getElementById(id)?.classList.remove('open'));
    closeMemoPopup();
    closeLinkPopup();
    closeDatepicker();
  }
});
</script>

<script>
// 通知チェック（プロジェクト用：全プロジェクトのタスクを対象）
function checkNotifications() {
  if (!data) return;
  const today = new Date().toISOString().slice(0, 10);

  const allTasks = (data.tasks || []).filter(t =>
    t.parentId === null && t.status !== 'done'
  );

  const overdue  = allTasks.filter(t => t.dueDate && t.dueDate < today);
  const dueToday = allTasks.filter(t => t.dueDate === today);
  const stuck    = allTasks.filter(t => t.status === 'stuck');

  renderNotifBanners({ overdue, dueToday, stuck });
  fireOsNotification({ overdue, dueToday, stuck });
}

function renderNotifBanners({ overdue, dueToday, stuck }) {
  const area = document.getElementById('notifBannerArea');
  if (!area) return;
  area.innerHTML = '';
  if (overdue.length)   area.appendChild(makeBanner('overdue', `${icon('alert-triangle',13,'currentColor')} 期限超過 ${overdue.length}件`, overdue.map(t => t.title)));
  if (dueToday.length)  area.appendChild(makeBanner('warning', `${icon('pin',13,'currentColor')} 今日期限 ${dueToday.length}件`, dueToday.map(t => t.title)));
  if (stuck.length)     area.appendChild(makeBanner('info',    `🛑 スタック ${stuck.length}件`,    stuck.map(t => t.title)));
}

function makeBanner(type, label, titles) {
  const div = document.createElement('div');
  div.className = `notif-banner ${type}`;
  const labelSpan = document.createElement('span');
  labelSpan.style.fontWeight = '700';
  labelSpan.innerHTML = label + '：';
  div.appendChild(labelSpan);
  const items = document.createElement('span');
  items.className = 'notif-banner-items';
  titles.forEach(title => {
    const span = document.createElement('span');
    span.className = 'notif-banner-item';
    span.textContent = title;
    items.appendChild(span);
  });
  div.appendChild(items);
  const close = document.createElement('button');
  close.className = 'notif-banner-close';
  close.textContent = '✕';
  close.onclick = () => div.remove();
  div.appendChild(close);
  return div;
}

let _lastNotifKey = '';
function fireOsNotification({ overdue, dueToday, stuck }) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') { Notification.requestPermission(); return; }
  const total = overdue.length + dueToday.length + stuck.length;
  if (total === 0) return;
  const key = `${overdue.map(t=>t.id).join(',')}|${dueToday.map(t=>t.id).join(',')}|${stuck.map(t=>t.id).join(',')}`;
  if (key === _lastNotifKey) return;
  _lastNotifKey = key;
  const lines = [];
  if (overdue.length)   lines.push(`⚠️ 期限超過 ${overdue.length}件`);
  if (dueToday.length)  lines.push(`📌 今日期限 ${dueToday.length}件`);
  if (stuck.length)     lines.push(`🛑 スタック ${stuck.length}件`);
  const n = new Notification('タスク管理 - 要確認', { body: lines.join('\n'), icon: '/logo.png', tag: 'task-notif' });
  n.onclick = () => { window.focus(); n.close(); };
}

function initNotifications() {
  checkNotifications();
  setInterval(checkNotifications, 30 * 60 * 1000);
}
</script>

<script>
// ─── AI Chat ──────────────────────────────────────────
function toggleAiChat() {
  document.getElementById('aiChatPanel').classList.toggle('hidden');
}

function preFilterTasksForAI(question, tasks) {
  let filtered = [...tasks];
  const today = new Date().toISOString().slice(0, 10);

  if (/進行中|作業中/.test(question))  filtered = filtered.filter(t => t.status === 'inProgress');
  else if (/完了/.test(question))      filtered = filtered.filter(t => t.status === 'done');
  else if (/未着手/.test(question))    filtered = filtered.filter(t => t.status === 'pending');
  else if (/スタック/.test(question))  filtered = filtered.filter(t => t.status === 'stuck');
  else if (/確認待ち/.test(question))  filtered = filtered.filter(t => t.status === 'review');

  if (/今日/.test(question)) {
    filtered = filtered.filter(t => t.dueDate === today);
  } else if (/今週/.test(question)) {
    const d = new Date();
    const end = new Date(d);
    end.setDate(d.getDate() + (7 - d.getDay() || 7));
    const endStr = end.toISOString().slice(0, 10);
    filtered = filtered.filter(t => t.dueDate && t.dueDate >= today && t.dueDate <= endStr);
  } else if (/期限切れ|遅延|遅れ|overdue/.test(question)) {
    filtered = filtered.filter(t => t.dueDate && t.dueDate < today && t.status !== 'done');
  }

  const kws = [...question.matchAll(/[「『]([^」』]+)[」』]/g)].map(m => m[1]);
  if (kws.length > 0) {
    const kwFiltered = filtered.filter(t => kws.some(k => t.title.includes(k)));
    if (kwFiltered.length > 0) filtered = kwFiltered;
  }

  if (filtered.length === 0) filtered = tasks;
  return filtered.slice(0, 50);
}

function buildTasksForAI() {
  const projectTasks = (data.tasks || []).filter(t => t.projectId === currentProjectId && t.parentId === null);
  return projectTasks.map(t => ({
    ...t,
    children: (data.tasks || []).filter(s => s.parentId === t.id)
  }));
}

async function sendAiChat() {
  const input = document.getElementById('aiChatInput');
  const question = input.value.trim();
  if (!question) return;

  const sendBtn = document.getElementById('aiChatSend');
  const messages = document.getElementById('aiChatMessages');

  appendChatMsg('user', question);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'ai-chat-thinking';
  thinkingEl.textContent = '⏳ 考えています…';
  messages.appendChild(thinkingEl);
  messages.scrollTop = messages.scrollHeight;

  try {
    const allTasks = buildTasksForAI();
    const filtered = preFilterTasksForAI(question, allTasks);

    const res = await fetch('/api/task-ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        tasks: filtered,
        projects: data.projects || [],
        users: data.users || [],
        currentUser,
        today: new Date().toISOString().slice(0, 10)
      })
    });

    thinkingEl.remove();
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const result = await res.json();
    if (result.error) throw new Error(result.error);

    if (result.action) {
      appendChatMsgWithAction(result.answer, result.action);
    } else {
      appendChatMsg('ai', result.answer);
    }
  } catch (e) {
    thinkingEl.remove();
    appendChatMsg('ai', `エラー: ${e.message}`, true);
  }

  sendBtn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

function appendChatMsg(role, text, isError = false) {
  const messages = document.getElementById('aiChatMessages');
  const msg = document.createElement('div');
  msg.className = `ai-chat-msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `ai-chat-bubble${isError ? ' error' : ''}`;
  bubble.textContent = text;
  msg.appendChild(bubble);
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function appendChatMsgWithAction(text, action) {
  const messages = document.getElementById('aiChatMessages');
  const msg = document.createElement('div');
  msg.className = 'ai-chat-msg ai';

  const bubble = document.createElement('div');
  bubble.className = 'ai-chat-bubble';
  bubble.textContent = text;
  msg.appendChild(bubble);

  const bar = document.createElement('div');
  bar.className = 'ai-chat-action-bar';

  const task = (data.tasks || []).find(t => t.id === action.taskId);
  const taskTitle = task ? task.title : action.taskId;
  const changeDesc = Object.entries(action.changes || {})
    .map(([k, v]) => {
      if (k === 'status') return `状態→${({pending:'未着手',inProgress:'進行中',done:'完了',stuck:'スタック',review:'確認待ち'})[v]||v}`;
      if (k === 'dueDate') return `期限→${v}`;
      if (k === 'assigneeId') return `担当→${(data.users||[]).find(u=>u.id===v)?.name||v}`;
      return `${k}→${v}`;
    }).join('、');

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'ai-chat-action-confirm';
  confirmBtn.textContent = `✅ 実行（${taskTitle}：${changeDesc}）`;
  confirmBtn.onclick = async () => {
    const t = (data.tasks || []).find(t => t.id === action.taskId);
    if (t) {
      Object.assign(t, action.changes);
      saveData(data);
      renderContent();
      bar.innerHTML = '<span style="font-size:11px;color:var(--success);">✅ 変更しました</span>';
    }
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'ai-chat-action-cancel';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = () => { bar.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">キャンセルしました</span>'; };

  bar.appendChild(confirmBtn);
  bar.appendChild(cancelBtn);
  msg.appendChild(bar);
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

// ─── File viewer ───────────────────────────────────────
function openFileViewer(url, name, fileType) {
  const panel = document.getElementById('fileViewerPanel');
  const body = document.getElementById('fvBody');
  document.getElementById('fvTitle').textContent = name || url;
  document.getElementById('fvDownload').href = url;
  document.getElementById('fvDownload').download = name || '';
  body.innerHTML = '';
  body.style.display = 'flex';
  body.style.alignItems = 'center';
  body.style.justifyContent = 'center';

  const ext = (name || url).split('.').pop().toLowerCase();
  const noPreviewExts = ['doc','docx','xls','xlsx','ppt','pptx','zip','rar','7z','mp4','mov','avi'];

  if (fileType && fileType.startsWith('image/')) {
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;padding:12px;';
    body.appendChild(img);
  } else if (fileType === 'application/pdf' || ext === 'pdf') {
    body.style.display = '';
    body.style.alignItems = '';
    body.style.justifyContent = '';
    body.innerHTML = `<iframe src="${escA(url)}" class="file-viewer-frame"></iframe>`;
  } else if (noPreviewExts.includes(ext)) {
    body.innerHTML = `
      <div style="text-align:center;padding:32px;color:var(--text-sub);">
        <div style="font-size:48px;margin-bottom:16px;">${icon('file',40,'#94a3b8')}</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text);">${escH(name || '')}</div>
        <div style="font-size:13px;margin-bottom:24px;">このファイル形式はブラウザで表示できません</div>
        <a href="${escA(url)}" download="${escA(name||'')}" class="btn btn-primary" style="text-decoration:none;padding:10px 24px;">⬇ ダウンロード</a>
      </div>`;
  } else {
    body.style.display = '';
    body.style.alignItems = '';
    body.style.justifyContent = '';
    body.innerHTML = `<iframe src="${escA(url)}" class="file-viewer-frame"></iframe>`;
  }
  panel.classList.add('open');
}
function closeFileViewer() {
  document.getElementById('fileViewerPanel').classList.remove('open');
}

// ─── Note panel ────────────────────────────────────────
let _notePanelTaskId = null;
let _noteAutoSaveTimers = {};
let _noteAdding = false;

function openNotePanel(taskId) {
  _notePanelTaskId = taskId;
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  document.getElementById('notePanelTitle').textContent = t.title;
  renderNotePanelBody(taskId);
  document.getElementById('notePanel').classList.add('open');
  document.getElementById('notePanelOverlay').classList.add('open');
  document.body.classList.add('no-scroll');
}

function closeNotePanel() {
  document.getElementById('notePanel').classList.remove('open');
  document.getElementById('notePanelOverlay').classList.remove('open');
  document.body.classList.remove('no-scroll');
  _notePanelTaskId = null;
}

function renderNotePanelBody(taskId, expandNoteId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.notes) t.notes = [];
  const body = document.getElementById('notePanelBody');
  body.innerHTML = '';
  const addBtn = document.createElement('button');
  addBtn.className = 'note-add-btn';
  addBtn.innerHTML = '<span style="font-size:16px;">＋</span> 新規ノートを追加';
  addBtn.onclick = () => addNote(taskId);
  body.appendChild(addBtn);
  [...t.notes].reverse().forEach(note => body.appendChild(buildNoteCard(taskId, note, note.id === expandNoteId)));
}

function buildNoteCard(taskId, note, expanded) {
  const card = document.createElement('div');
  card.className = 'note-card';
  card.id = `note-card-${note.id}`;
  const updatedAt = note.updatedAt ? new Date(note.updatedAt).toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
  card.innerHTML = `
    <div class="note-card-header" onclick="toggleNoteCard('${escA(note.id)}')">
      <span class="note-card-toggle">${expanded ? '▼' : '▶'}</span>
      <input class="note-title-input" placeholder="題名（クリックで展開）" value="${escH(note.title || '')}" onclick="event.stopPropagation()" />
      <span class="note-date" id="note-date-${note.id}">${updatedAt}</span>
      <span class="note-saved-indicator" id="note-saved-${note.id}">✓ 保存</span>
      <button class="note-delete-btn" onclick="event.stopPropagation();deleteNote('${escA(taskId)}','${escA(note.id)}')" title="削除">✕</button>
    </div>
    <div class="note-card-body${expanded ? '' : ' collapsed'}">
      <div class="note-content-input" contenteditable="true" style="min-height:200px;padding:8px 10px;outline:none;font-family:inherit;font-size:13px;line-height:1.7;word-break:break-word;" data-placeholder="内容を入力..."></div>
      <div class="note-card-resize-handle" onmousedown="startNoteResize(event, '${escA(note.id)}')" title="ドラッグで高さを調整"></div>
    </div>`;
  const titleInput = card.querySelector('.note-title-input');
  titleInput.addEventListener('input', () => scheduleNoteSave(taskId, note.id));
  const contentInput = card.querySelector('.note-content-input');
  // HTML or plain text を安全に設定
  contentInput.innerHTML = safeNoteHtml(note.content || '');
  contentInput.addEventListener('input', () => scheduleNoteSave(taskId, note.id));
  return card;
}

function toggleNoteCard(noteId) {
  const card = document.getElementById(`note-card-${noteId}`);
  if (!card) return;
  const body = card.querySelector('.note-card-body');
  const toggle = card.querySelector('.note-card-toggle');
  const isOpen = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed');
  toggle.textContent = isOpen ? '▶' : '▼';
  if (!isOpen) {
    const ta = body.querySelector('.note-content-input');
    if (ta) autoResizeNoteTextarea(ta);
  }
}

function autoResizeNoteTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(200, el.scrollHeight) + 'px';
}

function startNoteResize(e, noteId) {
  e.preventDefault();
  const card = document.getElementById(`note-card-${noteId}`);
  if (!card) return;
  const target = card.querySelector('.note-content-input');
  if (!target) return;
  const startY = e.clientY;
  const startH = target.offsetHeight;
  function onMove(ev) {
    target.style.height = Math.max(80, startH + (ev.clientY - startY)) + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function scheduleNoteSave(taskId, noteId) {
  const key = `${taskId}_${noteId}`;
  clearTimeout(_noteAutoSaveTimers[key]);
  _noteAutoSaveTimers[key] = setTimeout(() => saveNoteById(taskId, noteId), 600);
}

async function saveNoteById(taskId, noteId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t || !t.notes) return;
  const note = t.notes.find(n => n.id === noteId);
  if (!note) return;
  const card = document.getElementById(`note-card-${noteId}`);
  if (!card) return;
  note.title = card.querySelector('.note-title-input').value;
  note.content = card.querySelector('.note-content-input').innerHTML;
  note.updatedAt = new Date().toISOString();
  const dateEl = document.getElementById(`note-date-${noteId}`);
  if (dateEl) dateEl.textContent = new Date(note.updatedAt).toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
  saveData(data);
  renderSidebar();
  renderContent();
  const indicator = document.getElementById(`note-saved-${noteId}`);
  if (indicator) { indicator.classList.add('show'); setTimeout(() => indicator.classList.remove('show'), 2000); }
}

async function addNote(taskId) {
  if (_noteAdding) return;
  _noteAdding = true;
  const addBtn = document.querySelector('#notePanelBody .note-add-btn');
  if (addBtn) addBtn.disabled = true;
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) { _noteAdding = false; return; }
  if (!t.notes) t.notes = [];
  const note = { id: genId(), title: '', content: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  t.notes.push(note);
  saveData(data); // fire-and-forget
  // DOM差分更新：全再生成せず新カードだけ先頭に挿入
  const body = document.getElementById('notePanelBody');
  const newCard = buildNoteCard(taskId, note, true);
  newCard.classList.add('new-highlight');
  const firstCard = body.querySelector('.note-card');
  if (firstCard) body.insertBefore(newCard, firstCard);
  else body.appendChild(newCard);
  if (addBtn) addBtn.disabled = false;
  newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  newCard.querySelector('.note-title-input').focus();
  try { render(); } catch(e) { console.warn('render error after addNote:', e); }
  _noteAdding = false;
}

async function deleteNote(taskId, noteId) {
  if (!confirm('このノートを削除しますか？')) return;
  const card = document.getElementById(`note-card-${noteId}`);
  if (card) { card.style.transition = 'opacity 0.2s'; card.style.opacity = '0'; }
  await new Promise(r => setTimeout(r, 200));
  const t = data.tasks.find(t => t.id === taskId);
  if (!t || !t.notes) return;
  t.notes = t.notes.filter(n => n.id !== noteId);
  saveData(data);
  renderNotePanelBody(taskId);
  try { render(); } catch(e) { console.warn('render error after deleteNote:', e); }
}

function flushAllNoteSaves() {
  Object.keys(_noteAutoSaveTimers).forEach(key => {
    clearTimeout(_noteAutoSaveTimers[key]);
    delete _noteAutoSaveTimers[key];
    const sep = key.lastIndexOf('_');
    saveNoteById(key.slice(0, sep), key.slice(sep + 1));
  });
}
window.addEventListener('beforeunload', flushAllNoteSaves);
window.addEventListener('pagehide', flushAllNoteSaves);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') flushAllNoteSaves();
});
</script>
