name = "task-manager"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# ─── 本番環境 ────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "task-manager-db"
database_id = "a33ad2ee-c247-40a7-9de0-b97eac10f532"

[[r2_buckets]]
binding = "FILES"
bucket_name = "task-manager-files"

[ai]
binding = "AI"

# ─── 開発・ステージング環境 ──────────────────────────────────
# ローカル開発時は以下のコマンドで起動（本番D1には触れない）:
#   npx wrangler pages dev . --d1 DB=7dc64c76-2347-4fe8-b879-658e7d13f2f3
#
# 開発用D1: task-manager-db-dev (id: 7dc64c76-2347-4fe8-b879-658e7d13f2f3)
# ※ デプロイは必ず本番コマンドを使うこと（§9参照）
