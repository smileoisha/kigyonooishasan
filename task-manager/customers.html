<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客管理 | 企業のお医者さん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* ナビが消えないようにbodyをflexカラムにする */
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .customer-layout { flex: 1; min-height: 0; height: auto !important; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo">企業のお医者さん</span>
    <span class="header-divider"></span>
    <span class="header-title">タスク管理</span>
  </div>
  <div class="header-right">
    <div class="header-datetime" id="headerDatetime">
      <span class="header-datetime-date" id="headerDate"></span>
      <span class="header-datetime-time" id="headerTime"></span>
    </div>
    <div class="user-badge" onclick="switchUser()" title="ユーザーを切り替え">
      <div class="user-avatar" id="headerAvatar">?</div>
      <span class="user-name" id="headerName">未選択</span>
    </div>
  </div>
</header>

<!-- Nav -->
<nav class="nav-tabs">
  <a href="index.html" class="nav-tab">👤 マイタスク</a>
  <a href="project.html" class="nav-tab">📁 プロジェクト</a>
  <a href="gantt.html" class="nav-tab">📊 ガント</a>
  <span class="nav-tab active">👥 顧客</span>
</nav>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-spacer"></div>
  <button class="btn btn-outline btn-sm" onclick="openTagManagementModal()">⚙ タグ管理</button>
  <button class="btn btn-primary btn-sm" onclick="openCustomerModal()">＋ 顧客追加</button>
</div>

<!-- Customer layout -->
<div class="customer-layout">
  <!-- Left: customer list -->
  <div class="customer-list-col">
    <!-- フィルタ＋検索窓（固定） -->
    <div style="flex-shrink:0;background:var(--bg-card);border-bottom:1px solid var(--border);">
      <!-- プランフィルタ -->
      <div style="padding:8px 10px 0;">
        <select id="customerPlanFilter" class="form-select"
          style="font-size:12px;padding:5px 8px;width:100%;"
          onchange="customerPlanFilter_=this.value;renderCustomerList()">
          <option value="">プラン：すべて</option>
          <option value="顧問契約">顧問契約</option>
          <option value="サブスク">サブスク</option>
          <option value="顧問契約＋サブスク">顧問契約＋サブスク</option>
          <option value="ライトS">ライトS</option>
          <option value="ライトM">ライトM</option>
        </select>
      </div>
      <!-- 検索窓 -->
      <div style="padding:6px 10px 8px;">
        <div style="display:flex;gap:6px;align-items:center;">
          <input class="form-input" id="customerSearchInput"
            placeholder="🔍 顧客名・業態・会議記録を検索"
            oninput="customerSearchQuery=this.value;aiSearchActive=false;renderCustomerList()"
            style="font-size:12px;padding:6px 10px;flex:1;">
          <button id="aiSearchBtn" class="btn btn-outline btn-sm"
            onclick="toggleAISearch()"
            title="AI要約・AIタグで検索"
            style="white-space:nowrap;font-size:11px;padding:4px 8px;flex-shrink:0;">🤖 AI</button>
        </div>
      </div>
    </div>
    <!-- スクロール可能リスト -->
    <div id="customerListCol" style="overflow-y:auto;flex:1;min-height:0;"></div>
  </div>

  <!-- Right: customer detail -->
  <div class="customer-detail-col" id="customerDetailCol">
    <div class="empty-state">
      <div class="empty-icon">👥</div>
      <div class="empty-title">顧客を選択</div>
      <div class="empty-desc">左のリストから顧客を選んでください</div>
    </div>
  </div>
</div>

<!-- Customer Modal -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="customerModalTitle">顧客を追加</span>
      <button class="modal-close" onclick="closeModal('customerModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editCustomerId">
      <div class="form-group">
        <label class="form-label">名前 *</label>
        <input class="form-input" id="customerNameInput" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">会社名</label>
        <input class="form-input" id="customerCompanyInput" placeholder="株式会社〇〇">
      </div>

      <!-- 個人情報セクション -->
      <div style="font-size:11px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border);padding-bottom:6px;margin:8px 0 4px;">個人情報</div>
      <div class="form-group">
        <label class="form-label">本人の誕生日</label>
        <input type="date" class="form-input" id="customerBirthdayInput">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">業態</label>
          <input class="form-input" id="customerBusinessTypeInput" placeholder="例：飲食業、IT、小売">
        </div>
        <div class="form-group">
          <label class="form-label">法人種別</label>
          <select class="form-select" id="customerEntityTypeInput">
            <option value="">-</option>
            <option value="法人">法人</option>
            <option value="個人事業主">個人事業主</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">創業記念日</label>
          <input type="date" class="form-input" id="customerFoundingDateInput">
        </div>
        <div class="form-group">
          <label class="form-label">事務担当者</label>
          <input class="form-input" id="customerAdminStaffInput" placeholder="担当者名">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">家族構成</label>
        <input class="form-input" id="customerFamilyStructureInput" placeholder="例：妻・子2人">
      </div>
      <div class="form-group">
        <label class="form-label">家族の誕生日</label>
        <input class="form-input" id="customerFamilyBirthdaysInput" placeholder="例：妻 3/15、長男 8/20">
      </div>
      <div class="form-group">
        <label class="form-label">業務従事年数</label>
        <input class="form-input" id="customerYearsInBusinessInput" placeholder="例：10年">
      </div>
      <div class="form-group">
        <label class="form-label">仕事の経歴</label>
        <textarea class="form-textarea" id="customerCareerHistoryInput" placeholder="前職・経歴等" style="min-height:60px;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">取引銀行</label>
        <input class="form-input" id="customerBankInput" placeholder="例：三菱UFJ銀行">
      </div>

      <!-- 連絡先 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">メール</label>
          <input class="form-input" id="customerEmailInput" placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">電話</label>
          <input class="form-input" id="customerPhoneInput" placeholder="090-0000-0000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">メモ</label>
        <textarea class="form-textarea" id="customerMemoInput" placeholder="備考・メモ"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">プラン名</label>
          <select class="form-select" id="customerPlanInput">
            <option value="-">-</option>
            <option value="顧問契約">顧問契約</option>
            <option value="サブスク">サブスク</option>
            <option value="顧問契約＋サブスク">顧問契約＋サブスク</option>
            <option value="ライトS">ライトS</option>
            <option value="ライトM">ライトM</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">契約ステータス</label>
          <select class="form-select" id="customerContractStatusInput">
            <option value="none">未契約</option>
            <option value="active">契約中</option>
            <option value="paused">休止中</option>
            <option value="ended">終了</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">月額（円）</label>
          <input type="number" class="form-input" id="customerFeeInput" placeholder="30000">
        </div>
        <div class="form-group">
          <label class="form-label">契約開始日</label>
          <input type="date" class="form-input" id="customerContractStartInput">
        </div>
      </div>
      <!-- 決算月 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">決算月</label>
          <select class="form-select" id="customerFiscalYearEndMonthInput">
            <option value="">-</option>
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
        </div>
        <div class="form-group" id="fiscalYearEndMonthNote" style="display:flex;align-items:flex-end;">
          <div style="font-size:11px;color:var(--text-muted);">個人事業主は通常12月</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">契約書アップロード（AI自動判定）</label>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <label class="btn btn-outline btn-sm" style="cursor:pointer;margin:0;" id="contractFileLabel">
            📄 契約書を選択（PDF・画像）
            <input type="file" id="contractFileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none;" onchange="handleContractFile(this.files[0])">
          </label>
          <span id="ocrStatus" style="font-size:11px;color:var(--text-muted);"></span>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">アップロードすると契約締結日を自動取得して入力します</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('customerModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCustomer()">保存</button>
    </div>
  </div>
</div>

<!-- Tag Management Modal -->
<div class="modal-overlay" id="tagManagementModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">タグ管理</span>
      <button class="modal-close" onclick="closeModal('tagManagementModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:4px;margin-bottom:16px;">
        <button class="btn btn-sm" id="tagMgmtTabCustomer"
          onclick="tagManagementTab='customer';renderTagManagement()"
          style="">顧客タグ</button>
        <button class="btn btn-sm" id="tagMgmtTabMeeting"
          onclick="tagManagementTab='meeting';renderTagManagement()"
          style="">会議記録タグ</button>
      </div>
      <div id="tagManagementContent"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('tagManagementModal')">閉じる</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="data.js"></script>
<script src="auth.js"></script>
<script>
// ─── Header clock ────────────────────────────────────
const DOW_JA = ['日','月','火','水','木','金','土'];
function updateHeaderClock() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const dow = DOW_JA[now.getDay()];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const dateEl = document.getElementById('headerDate');
  const timeEl = document.getElementById('headerTime');
  if (dateEl) dateEl.textContent = `${y}年${m}月${d}日（${dow}）`;
  if (timeEl) timeEl.textContent = `${hh}:${mm}:${ss}`;
}
updateHeaderClock();
setInterval(updateHeaderClock, 1000);

// ─── State ────────────────────────────────────────────
let data = null;
let currentUser = null;
let selectedCustomerId = null;
let currentDetailTab = 'basic';
const openMeetings = new Set();
const openCommunications = new Set();
let meetingTypeFilter = '';
let meetingGroupFilter = '';
let editingTaxAccountant = false;
let addingExpert = false;
let editingMeetingId = null;
let customerSearchQuery = '';
let highlightMeetingId = null;
let editingCustomerTags = false;
let tagManagementTab = 'customer';
let aiSearchActive = false;
let customerPlanFilter_ = '';

// ─── Init ─────────────────────────────────────────────
loadData().then(d => {
  data = d;
  if (!data.tagMaster) {
    data.tagMaster = {
      customer: ['ツクツク','実店舗','EC','飲食','小売','サービス','製造','融資検討中','創業準備中','事業承継','確定申告対応中'],
      meeting: ['確定申告','消費税','年末調整','インボイス','資金繰り','融資','売上分析','収支改善','事業計画','価格設定','集客','人材','起業','フォローアップ','初回相談','契約関連']
    };
    saveData(data);
  }
  initAuth(data, user => {
    currentUser = user;
    updateHeaderUser();
    renderCustomerList();
  });
});

function updateHeaderUser() {
  if (!currentUser) return;
  document.getElementById('headerAvatar').textContent = currentUser.avatar;
  document.getElementById('headerName').textContent = currentUser.name;
}

function switchUser() {
  clearCurrentUser();
  showUserSelectModal(data, user => {
    currentUser = user;
    updateHeaderUser();
  });
}

// ─── Render customer list ─────────────────────────────
function renderCustomerList() {
  const col = document.getElementById('customerListCol');
  const allCustomers = data.customers || [];
  // プランフィルタ適用
  const customers = customerPlanFilter_
    ? allCustomers.filter(c => c.plan === customerPlanFilter_)
    : allCustomers;
  const q = (customerSearchQuery || '').trim().toLowerCase();

  if (!allCustomers.length) {
    col.innerHTML = `<div style="padding:24px 16px;text-align:center;">
      <div style="font-size:28px;margin-bottom:8px;">👥</div>
      <div style="font-size:12px;color:var(--text-muted);">顧客を追加してください</div>
    </div>`;
    return;
  }

  const statusLabels = { none: '未契約', active: '契約中', paused: '休止中', ended: '終了' };

  function renderCard(c) {
    const taskCount = (data.tasks || []).filter(t => t.customerId === c.id).length;
    const statusLabel = statusLabels[c.contractStatus] || c.contractStatus;
    const tagBadges = (c.tags || []).length
      ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;">${(c.tags || []).map(t => `<span class="tag-badge">${escH(t)}</span>`).join('')}</div>`
      : '';
    return `
      <div class="customer-card ${c.id === selectedCustomerId ? 'active' : ''}" onclick="selectCustomer('${escA(c.id)}')">
        <div class="customer-card-name">${escH(c.name)}</div>
        ${c.company ? `<div class="customer-card-company">${escH(c.company)}</div>` : ''}
        <div class="customer-card-meta">
          <span class="contract-badge ${escA(c.contractStatus || 'active')}">${escH(statusLabel)}</span>
          ${taskCount > 0 ? `<span style="font-size:10px;color:var(--text-muted);">📋 ${taskCount}件</span>` : ''}
        </div>
        ${tagBadges}
      </div>`;
  }

  if (!q) {
    col.innerHTML = customers.map(renderCard).join('');
    return;
  }

  // クエリあり：2段表示
  const statusLabelMap = { none: '未契約', active: '契約中', paused: '休止中', ended: '終了' };
  const customerHits = customers.filter(c => {
    const sl = statusLabelMap[c.contractStatus] || c.contractStatus || '';
    const tags = (c.tags || []).join(' ');
    return [c.name, c.company, c.businessType, sl, tags].some(v => (v||'').toLowerCase().includes(q));
  });

  const meetingHits = [];
  customers.forEach(c => {
    (c.meetings || []).forEach(m => {
      const tags = (m.tags || []).join(' ');
      const haystack = [m.conclusion, m.process, m.content, tags].join(' ').toLowerCase();
      if (haystack.includes(q)) {
        meetingHits.push({ customer: c, meeting: m });
      }
    });
  });

  // 会議記録行のレンダリングヘルパー
  function renderMeetingRow(c, m, isAI = false) {
    const excerpt = ((m.conclusion || m.content) || '').slice(0, 40);
    const aiMark = isAI ? `<span style="font-size:9px;background:var(--navy);color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px;">🤖 AI</span>` : '';
    return `<div class="meeting-search-row" onclick="selectCustomerToMeeting('${escA(c.id)}','${escA(m.id)}')">
      <div>
        <span style="font-size:11px;font-weight:700;color:var(--navy);">${escH(c.name)}</span>
        ${aiMark}
        <span style="font-size:10px;color:var(--text-muted);margin-left:6px;">${escH(m.date)}</span>
      </div>
      <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">${escH(excerpt)}${excerpt.length >= 40 ? '…' : ''}</div>
    </div>`;
  }

  let html = `<div class="search-section-header">👤 顧客ヒット（${customerHits.length}件）</div>`;
  html += customerHits.length
    ? customerHits.map(renderCard).join('')
    : `<div style="font-size:12px;color:var(--text-muted);padding:8px 12px;">該当なし</div>`;

  html += `<div class="search-section-header">📋 会議記録ヒット（${meetingHits.length}件）</div>`;
  html += meetingHits.length
    ? meetingHits.map(({ customer: c, meeting: m }) => renderMeetingRow(c, m, false)).join('')
    : `<div style="font-size:12px;color:var(--text-muted);padding:8px 12px;">該当なし</div>`;

  // AI検索：手動オンまたは通常0件のとき自動発動
  const noRegularHits = customerHits.length === 0 && meetingHits.length === 0;
  if (aiSearchActive || noRegularHits) {
    const hitMeetingIds = new Set(meetingHits.map(h => h.meeting.id));
    const aiHits = [];
    customers.forEach(c => {
      (c.meetings || []).forEach(m => {
        if (hitMeetingIds.has(m.id)) return; // 通常ヒット済みは除外
        const aiText = [(m.aiSummary || ''), ...(m.aiTags || [])].join(' ').toLowerCase();
        if (aiText && aiText.includes(q)) {
          aiHits.push({ customer: c, meeting: m });
        }
      });
    });

    const aiLabel = noRegularHits && !aiSearchActive
      ? `🤖 AI検索（自動）（${aiHits.length}件）`
      : `🤖 AI検索（${aiHits.length}件）`;
    html += `<div class="search-section-header" style="color:var(--navy);">${aiLabel}</div>`;
    html += aiHits.length
      ? aiHits.map(({ customer: c, meeting: m }) => renderMeetingRow(c, m, true)).join('')
      : `<div style="font-size:12px;color:var(--text-muted);padding:8px 12px;">該当なし（会議記録保存時にAI処理が実行されます）</div>`;
  }

  col.innerHTML = html;
  updateAISearchBtn();
}

// ─── AI Search toggle ─────────────────────────────────
function toggleAISearch() {
  aiSearchActive = !aiSearchActive;
  updateAISearchBtn();
  renderCustomerList();
}

function updateAISearchBtn() {
  const btn = document.getElementById('aiSearchBtn');
  if (!btn) return;
  btn.style.background   = aiSearchActive ? 'var(--navy)' : '';
  btn.style.color        = aiSearchActive ? '#fff' : '';
  btn.style.borderColor  = aiSearchActive ? 'var(--navy)' : '';
  btn.title = aiSearchActive ? 'AI検索: ON（クリックでOFF）' : 'AI要約・AIタグで検索';
}

// ─── Select customer to meeting ───────────────────────
function selectCustomerToMeeting(customerId, meetingId) {
  selectedCustomerId = customerId;
  highlightMeetingId = meetingId;
  currentDetailTab = 'meetings';
  openMeetings.add(meetingId);
  renderCustomerList();
  const customer = (data.customers || []).find(c => c.id === customerId);
  if (customer) renderCustomerDetail(customer);
}

// ─── Select customer ──────────────────────────────────
function selectCustomer(id) {
  selectedCustomerId = id;
  highlightMeetingId = null;
  renderCustomerList();
  const customer = (data.customers || []).find(c => c.id === id);
  if (customer) renderCustomerDetail(customer);
}

// ─── Render customer detail ───────────────────────────
function renderCustomerDetail(customer) {
  const col = document.getElementById('customerDetailCol');
  const statusLabels = { none: '未契約', active: '契約中', paused: '休止中', ended: '終了' };

  col.innerHTML = `
    <div class="customer-detail-header">
      <div>
        <div class="customer-detail-name">${escH(customer.name)}</div>
        ${customer.company ? `<div style="font-size:13px;color:var(--text-sub);margin-top:2px;">${escH(customer.company)}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" onclick="openCustomerModal('${escA(customer.id)}')">編集</button>
        <button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5;" onclick="deleteCustomer('${escA(customer.id)}')">削除</button>
      </div>
    </div>
    <div class="detail-tabs">
      <button class="detail-tab ${currentDetailTab === 'basic' ? 'active' : ''}" onclick="switchDetailTab('basic')">基本情報</button>
      <button class="detail-tab ${currentDetailTab === 'contract' ? 'active' : ''}" onclick="switchDetailTab('contract')">契約</button>
      <button class="detail-tab ${currentDetailTab === 'meetings' ? 'active' : ''}" onclick="switchDetailTab('meetings')">会議記録</button>
      <button class="detail-tab ${currentDetailTab === 'tasks' ? 'active' : ''}" onclick="switchDetailTab('tasks')">タスク</button>
      <button class="detail-tab ${currentDetailTab === 'tax' ? 'active' : ''}" onclick="switchDetailTab('tax')">納税・専門家</button>
    </div>
    <div id="detailTabContent">${renderDetailTabContent(customer, currentDetailTab)}</div>
  `;
}

function renderDetailTabContent(customer, tab) {
  if (tab === 'basic') {
    // Communications
    const comms = (customer.communications || []).slice().sort((a, b) => b.date.localeCompare(a.date));
    const commTypeBadgeStyle = type => {
      const colors = { 'メール': '#3b82f6', '電話': '#10b981', 'その他': '#6b7280' };
      return `background:${colors[type] || '#6b7280'};color:#fff;`;
    };
    const commsHtml = comms.length
      ? comms.map(comm => {
          const isOpen = openCommunications.has(comm.id);
          const preview = (comm.summary || '').split('\n')[0];
          const previewTxt = preview.length > 40 ? preview.slice(0, 40) + '…' : preview;
          return `
          <div class="meeting-row">
            <div class="meeting-header" onclick="toggleCommunication('${escA(comm.id)}')">
              <span class="meeting-date">${escH(comm.date)}</span>
              <span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;${commTypeBadgeStyle(comm.type)}">${escH(comm.type || '-')}</span>
              ${!isOpen ? `<span class="meeting-preview">${escH(previewTxt)}</span>` : '<span class="meeting-preview" style="color:var(--navy);font-weight:600;">▼ 展開中</span>'}
              <span class="meeting-chevron">${isOpen ? '▲' : '▼'}</span>

            <div class="meeting-body">

                <button class="btn btn-xs" style="background:none;border:1px solid var(--border);color:var(--danger);cursor:pointer;" onclick="deleteCommunication('${escA(customer.id)}','${escA(comm.id)}')">削除</button>

  if (tab === 'contract') {

// ─── Meeting CRUD ─────────────────────────────────────
function addMeeting(customerId) {
  const date = document.getElementById('meetingDateInput').value;
  const content = document.getElementById('meetingContentInput').value.trim();
  if (!date || !content) { alert('日付と内容を入力してください'); return; }
  const meetingType = document.getElementById('meetingTypeInput').value;
  const meetingGroup = document.getElementById('meetingGroupInput').value;
  const conclusion = document.getElementById('meetingConclusionInput').value.trim();
  const process = document.getElementById('meetingProcessInput').value.trim();
  const tags = (data.tagMaster?.meeting || []).filter(t => document.getElementById('mtag_' + t)?.checked);
  const customer = (data.customers || []).find(c => c.id === customerId);
  if (!customer) return;
  if (!customer.meetings) customer.meetings = [];
  const newId = genId();
  customer.meetings.push({ id: newId, date, content, meetingType, meetingGroup, conclusion, process, tags, aiSummary: '', aiTags: [] });
  saveData(data);
  renderCustomerDetail(customer);

  // ─── バックグラウンドAI処理（事前タグ付け型）─────────
  (async () => {
    try {
      const res = await fetch('/api/meeting-ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conclusion, process, content, tagMaster: data.tagMaster?.meeting || [] })
      });
      if (!res.ok) return;
      const aiResult = await res.json();
      if (aiResult.error) return;
      const target = (customer.meetings || []).find(m => m.id === newId);
      if (target) {
        target.aiSummary = aiResult.summary || '';
        target.aiTags = aiResult.tags || [];
        saveData(data);
        // 会議記録タブを表示中なら再レンダリング（🤖 バッジ等反映）
        if (selectedCustomerId === customerId && currentDetailTab === 'meetings') {
          renderCustomerDetail(customer);
        }
      }
    } catch (e) {
      console.warn('AI meeting processing failed:', e);
    }
  })();
}

// ─── Tax schedule ─────────────────────────────────────
function generateTaxSchedule(customer) {
  const endMonth = customer.fiscalYearEndMonth; // 1-12
  const entityType = customer.entityType || '法人';
  const today = new Date();
  const thisYear = today.getFullYear();

  function addMonths(baseMonth, add) {
    let m = baseMonth + add;
    let yOffset = 0;
    while (m > 12) { m -= 12; yOffset++; }
    return { month: m, yearOffset: yOffset };
  }

  function getDeadline(baseMonth, addMonthsCount, day) {
    const { month, yearOffset } = addMonths(baseMonth, addMonthsCount);
    const year = thisYear + yearOffset;
    return `${year}/${String(month).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
  }

  let scheduleItems = [];

  if (entityType === '法人' || entityType === '') {
    scheduleItems = [
      { label: '法人税・法人住民税・事業税（確定申告）', deadline: getDeadline(endMonth, 2, 28), note: '決算月の翌々月末' },
      { label: '法人消費税（確定申告）', deadline: getDeadline(endMonth, 2, 28), note: '決算月の翌々月末' },
      { label: '法人税（中間申告）', deadline: getDeadline(endMonth, 8, 28), note: '決算月の8ヶ月後末' },
      { label: '消費税（中間申告）', deadline: getDeadline(endMonth, 8, 28), note: '決算月の8ヶ月後末' },
      { label: '源泉所得税（納特対象の場合）① 1月〜6月分', deadline: `${thisYear}/07/10`, note: '7月10日' },
      { label: '源泉所得税（納特対象の場合）② 7月〜12月分', deadline: `${thisYear}/01/20`, note: '翌年1月20日' },
      { label: '償却資産税', deadline: `${thisYear}/01/31`, note: '毎年1月31日' },
    ];
  } else {
    // 個人事業主
    scheduleItems = [
      { label: '所得税確定申告・納付', deadline: `${thisYear}/03/15`, note: '毎年3月15日' },
      { label: '消費税確定申告・納付（課税事業者）', deadline: `${thisYear}/03/31`, note: '毎年3月31日' },
      { label: '住民税① 第1期', deadline: `${thisYear}/06/30`, note: '6月末（目安）' },
      { label: '住民税② 第2期', deadline: `${thisYear}/08/31`, note: '8月末（目安）' },
      { label: '住民税③ 第3期', deadline: `${thisYear}/10/31`, note: '10月末（目安）' },
      { label: '住民税④ 第4期', deadline: `${String(thisYear+1)}/01/31`, note: '翌年1月末（目安）' },
      { label: '源泉所得税（納特対象の場合）① 1月〜6月分', deadline: `${thisYear}/07/10`, note: '7月10日' },
      { label: '源泉所得税（納特対象の場合）② 7月〜12月分', deadline: `${thisYear}/01/20`, note: '翌年1月20日' },
      { label: '償却資産税', deadline: `${thisYear}/01/31`, note: '毎年1月31日' },
    ];
  }

  // Sort by deadline
  scheduleItems.sort((a, b) => a.deadline.localeCompare(b.deadline));

  const todayStr = today.toISOString().slice(0,10).replace(/-/g,'/');
  const nearDate = new Date(today.getTime() + 30*24*60*60*1000).toISOString().slice(0,10).replace(/-/g,'/');

  return `
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">
      ※ ${escH(entityType || '法人')}・決算月${escH(String(endMonth))}月 の目安スケジュールです。延長申請・特例等により変わる場合があります。
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr style="background:var(--border-light);">
          <th style="text-align:left;padding:6px 10px;font-weight:600;color:var(--navy);">税目</th>
          <th style="text-align:left;padding:6px 10px;font-weight:600;color:var(--navy);white-space:nowrap;">期限（目安）</th>
        </tr>
      </thead>
      <tbody>
        ${scheduleItems.map(item => {
          const isPast = item.deadline < todayStr;
          const isNear = !isPast && item.deadline <= nearDate;
          return `<tr style="border-bottom:1px solid var(--border);">
            <td style="padding:7px 10px;${isPast ? 'color:var(--text-muted);text-decoration:line-through;' : ''}">${escH(item.label)}</td>
            <td style="padding:7px 10px;white-space:nowrap;${isPast ? 'color:var(--text-muted);' : isNear ? 'color:var(--danger);font-weight:700;' : 'color:var(--navy);font-weight:600;'}">${escH(item.deadline)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// ─── OCR（契約書から締結日自動取得）─────────────────────
async function handleContractFile(file) {
  if (!file) return;
  const statusEl = document.getElementById('ocrStatus');
  statusEl.textContent = '⏳ 読み取り中...';
  statusEl.style.color = 'var(--text-muted)';

  try {
    let imageBlob;

    if (file.type === 'application/pdf') {
      // PDFを1ページ目の画像に変換
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      imageBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
    } else {
      imageBlob = file;
    }

    const formData = new FormData();
    formData.append('file', imageBlob, 'contract.jpg');

    const res = await fetch('/api/ocr', { method: 'POST', body: formData });
    const { date, error } = await res.json();

    if (error) throw new Error(error);

    if (date && date !== 'not_found' && /^\d{4}-\d{2}-\d{2}$/.test(date)) {
      document.getElementById('customerContractStartInput').value = date;
      statusEl.textContent = `✓ 契約締結日を自動取得: ${date}`;
      statusEl.style.color = 'var(--success)';
    } else {
      statusEl.textContent = '日付を自動取得できませんでした。手動で入力してください。';
      statusEl.style.color = 'var(--warning)';
    }
  } catch (e) {
    statusEl.textContent = 'エラーが発生しました: ' + e.message;
    statusEl.style.color = 'var(--danger)';
  }
}

// ─── Customer tags ────────────────────────────────────
function saveCustomerTags(customerId) {
  const customer = (data.customers || []).find(c => c.id === customerId);
  if (!customer) return;
  customer.tags = (data.tagMaster?.customer || []).filter(t => document.getElementById('ctag_' + t)?.checked);
  saveData(data);
  editingCustomerTags = false;
  switchDetailTab('basic');
}

// ─── Tag management modal ─────────────────────────────
function openTagManagementModal() {
  renderTagManagement();
  openModal('tagManagementModal');
}

function renderTagManagement() {
  const content = document.getElementById('tagManagementContent');
  if (!content) return;
  const tabCustomer = document.getElementById('tagMgmtTabCustomer');
  const tabMeeting = document.getElementById('tagMgmtTabMeeting');
  if (tabCustomer) {
    tabCustomer.className = 'btn btn-sm ' + (tagManagementTab === 'customer' ? 'btn-primary' : 'btn-outline');
  }
  if (tabMeeting) {
    tabMeeting.className = 'btn btn-sm ' + (tagManagementTab === 'meeting' ? 'btn-primary' : 'btn-outline');
  }
  const tags = (data.tagMaster || {})[tagManagementTab] || [];
  const inputId = 'tagMgmtNewInput';
  content.innerHTML = `
    <div style="margin-bottom:12px;">
      ${tags.map(t => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--border-light);">
          <span class="tag-badge ${tagManagementTab === 'meeting' ? 'tag-badge-meeting' : ''}">${escH(t)}</span>
          <button class="btn btn-xs" style="background:none;border:1px solid var(--border);color:var(--danger);"
            onclick="deleteTag('${escA(tagManagementTab)}','${escA(t)}')">削除</button>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input class="form-input" id="${inputId}" placeholder="新しいタグを入力" style="flex:1;">
      <button class="btn btn-primary btn-sm" onclick="addTag('${escA(tagManagementTab)}')">追加</button>
    </div>`;
}

function addTag(type) {
  const input = document.getElementById('tagMgmtNewInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  if (!data.tagMaster) data.tagMaster = { customer: [], meeting: [] };
  if (!data.tagMaster[type]) data.tagMaster[type] = [];
  if (data.tagMaster[type].includes(val)) { alert('同じタグが既に存在します'); return; }
  data.tagMaster[type].push(val);
  saveData(data);
  renderTagManagement();
}

function deleteTag(type, tag) {
  if (!data.tagMaster || !data.tagMaster[type]) return;
  data.tagMaster[type] = data.tagMaster[type].filter(t => t !== tag);
  saveData(data);
  renderTagManagement();
}

// ─── Utilities ────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function escH(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s || '').replace(/"/g,'&quot;'); }
</script>
