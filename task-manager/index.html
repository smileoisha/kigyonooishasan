<script>
// ─── Header clock ────────────────────────────────────
const DOW_JA = ['日','月','火','水','木','金','土'];
function updateHeaderClock() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const dow = DOW_JA[now.getDay()];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const dateEl = document.getElementById('headerDate');
  const timeEl = document.getElementById('headerTime');
  if (dateEl) dateEl.textContent = `${y}年${m}月${d}日（${dow}）`;
  if (timeEl) timeEl.textContent = `${hh}:${mm}:${ss}`;
}
updateHeaderClock();
setInterval(updateHeaderClock, 1000);

// ─── State ────────────────────────────────────────────
let data = null;
let currentUser = null;
let statusFilter = 'active';
let _dragSrcId = null;
let projectFilter = '';
let searchQuery = '';
let tagFilter = null;
const openGroups = new Set();
let _memoTarget = null;
let _statusTarget = null;
let _linkTarget = null;

// ─── Init ─────────────────────────────────────────────
loadData().then(d => {
  data = d;
  initBackupIndicator();
  autoBackupIfNeeded();
  initAuth(data, user => {
    currentUser = user;
    updateHeaderUser();
    populateFilters();
    render();
    initNotifications();
  });
});

function updateHeaderUser() {
  if (!currentUser) return;
  document.getElementById('headerAvatar').textContent = currentUser.avatar;
  document.getElementById('headerName').textContent = currentUser.name;
}

function switchUser() {
  clearCurrentUser();
  showUserSelectModal(data, user => {
    currentUser = user;
    updateHeaderUser();
    render();
  });
}

// ─── Filters ──────────────────────────────────────────
function populateFilters() {
  const sel = document.getElementById('projectFilter');
  sel.innerHTML = '<option value="">全プロジェクト</option>' +
    data.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
}

function setStatusFilter(v) {
  statusFilter = v;
  document.querySelectorAll('#statusFilter .filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.status === v));
  render();
}

function setProjectFilter(v) {
  projectFilter = v;
  render();
}

// ─── Data helpers ──────────────────────────────────────
function getMyTasks() {
  return data.tasks.filter(t => {
    if (t.parentId !== null) return false;
    if (currentUser && t.assigneeId && t.assigneeId !== currentUser.id) return false;
    if (projectFilter !== '' && t.projectId !== projectFilter) return false;
    if (!matchStatusFilter(t) && !hasDescendantMatchingStatus(t)) return false;
    if (tagFilter !== null && !(t.tags || []).includes(tagFilter)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [t.title, t.memo, ...(t.tags || [])].join(' ').toLowerCase();
      const subtaskMatch = getDescendantIds(data, t.id).some(cid => {
        const c = data.tasks.find(x => x.id === cid);
        return c && [c.title, c.memo, ...(c.tags || [])].join(' ').toLowerCase().includes(q);
      });
      if (!haystack.includes(q) && !subtaskMatch) return false;
    }
    return true;
  });
}

function matchStatusFilter(t) {
  if (statusFilter === 'all') return true;
  if (statusFilter === 'active') return t.status !== 'done';
  if (statusFilter === 'stuck') return t.status === 'stuck' || isOverdue(t);
  if (statusFilter === 'done') return t.status === 'done';
  return true;
}

function hasDescendantMatchingStatus(task) {
  return getDescendantIds(data, task.id).some(id => {
    const c = data.tasks.find(t => t.id === id);
    return c && matchStatusFilter(c);
  });
}

function getChildren(taskId) {
  return data.tasks
    .filter(t => t.parentId === taskId)
    .sort((a, b) => {
      if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      if (a.dueDate) return -1;
      if (b.dueDate) return 1;
      return 0;
    });
}

// ─── Render ────────────────────────────────────────────
function render() {
  renderAlert();
  renderStats();
  renderWorkStatus();
  renderWorklogSummary();
  renderFilterBar();
  renderMain();
  // モバイル検索オーバーレイが開いているときは結果を同期
  const overlay = document.getElementById('mobileSearchOverlay');
  if (overlay && overlay.classList.contains('open')) {
    document.getElementById('mobileSearchBody').innerHTML =
      document.getElementById('mainContent').innerHTML;
  }
}

function renderStats() {
  const myAll = data.tasks.filter(t => t.parentId === null && matchStatusFilter(t));
  const total = myAll.length;
  const done = myAll.filter(t => t.status === 'done').length;
  const stuck = myAll.filter(t => t.status === 'stuck' || isOverdue(t)).length;

  const parts = [];
  if (searchQuery) parts.push(`${icon('search',11,'currentColor')}「${escH(searchQuery)}」で検索中`);
  if (tagFilter !== null) parts.push(`${icon('tag',11,'currentColor')} ${escH(tagFilter)}`);
  if (projectFilter) {
    const p = data.projects.find(p => p.id === projectFilter);
    if (p) parts.push(`${icon('folder',11,'currentColor')} ${escH(p.name)}`);
  }
  if (statusFilter !== 'all') {
    const labels = { active: '未完了', stuck: 'スタック', done: '完了' };
    parts.push(`${icon('pin',11,'currentColor')} ${labels[statusFilter]}`);
  }
  const summary = parts.length
    ? `<span style="margin-left:auto;font-size:11px;color:var(--navy);background:var(--gold-pale);padding:2px 10px;border-radius:10px;">${parts.join(' ／ ')}</span>`
    : '';

  document.getElementById('statsBar').innerHTML =
    `<span class="stat-item"><span class="stat-count">${total}</span> 全タスク</span>` +
    `<span class="stat-item"><span class="stat-dot" style="background:var(--navy)"></span><span class="stat-count">${total - done}</span> 進行中</span>` +
    `<span class="stat-item"><span class="stat-dot" style="background:var(--success)"></span><span class="stat-count">${done}</span> 完了</span>` +
    (stuck ? `<span class="stat-item"><span class="stat-dot" style="background:var(--danger)"></span><span class="stat-count">${stuck}</span> 要対応</span>` : '') +
    summary;
}

function renderWorkStatus() {
  const panel = document.getElementById('workStatusPanel');
  const activeByUser = getActiveTasksByUser();
  const hasActive = Object.keys(activeByUser).length > 0;

  if (!hasActive) { panel.style.display = 'none'; return; }

  panel.style.display = 'flex';
  let html = `<span class="work-status-label">${icon('bar-chart',12,'currentColor')} 現在の作業状況</span>`;
  data.users.forEach(user => {
    const tasks = activeByUser[user.id] || [];
    if (!tasks.length) return;
    const taskChips = tasks.map(t => {
      const last = getLastWorkLog(t);
      const elapsed = last ? getElapsedTime(last.at) : '';
      const proj = data.projects.find(p => p.id === t.projectId);
      const dot = proj ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${proj.color};margin-right:3px;vertical-align:middle;"></span>` : '';
      return `<span class="work-status-chip">${dot}${escH(t.title)}${elapsed ? `<span class="work-status-elapsed">${elapsed}</span>` : ''}</span>`;
    }).join('');
    html += `<span class="work-status-user"><span class="work-status-avatar" style="background:var(--navy)">${user.avatar}</span><span class="work-status-name">${escH(user.name)}</span>${taskChips}</span>`;
  });

  panel.innerHTML = html;
}

// ─── Worklog Summary ───────────────────────────────────
let worklogWeekOffset = 0;
let worklogDetailOpen = false;

function getWeekRange(offset) {
  const now = new Date();
  const dow = now.getDay(); // 0=日
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23, 59, 59, 999);
  return { start: monday, end: sunday };
}

function calcWorkSessions(tasks, userId, startDate, endDate) {
  const sessions = [];
  tasks.forEach(task => {
    const log = (task.workLog || []).filter(e => !userId || e.userId === userId);
    for (let i = 0; i < log.length; i++) {
      if (log[i].action !== 'start') continue;
      const startAt = new Date(log[i].at);
      let endAt;
      const nextStop = log.slice(i + 1).find(e => e.action === 'stop');
      if (nextStop) {
        endAt = new Date(nextStop.at);
      } else if (task.status === 'inProgress') {
        endAt = new Date();
      } else {
        continue;
      }
      if (endAt < startDate || startAt > endDate) continue;
      const clippedStart = startAt < startDate ? new Date(startDate) : startAt;
      const clippedEnd   = endAt   > endDate   ? new Date(endDate)   : endAt;
      sessions.push({
        taskId: task.id, taskTitle: task.title, projectId: task.projectId,
        start: clippedStart, end: clippedEnd,
        duration: clippedEnd - clippedStart
      });
    }
  });
  return sessions.sort((a, b) => a.start - b.start);
}

function aggregateByDay(sessions) {
  const byDay = {};
  sessions.forEach(s => {
    const day = s.start.toISOString().slice(0, 10);
    if (!byDay[day]) byDay[day] = { total: 0, sessions: [] };
    byDay[day].total += s.duration;
    byDay[day].sessions.push(s);
  });
  return byDay;
}

function aggregateByTask(sessions) {
  const byTask = {};
  sessions.forEach(s => {
    if (!byTask[s.taskId]) byTask[s.taskId] = { title: s.taskTitle, projectId: s.projectId, total: 0 };
    byTask[s.taskId].total += s.duration;
  });
  return Object.values(byTask).sort((a, b) => b.total - a.total);
}

function fmtMs(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function fmtTime(dt) {
  return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

function renderWorklogSummary() {
  const panel = document.getElementById('worklogSummaryPanel');
  if (!panel) return;

  const uid = currentUser ? currentUser.id : null;
  const myTasks = uid
    ? data.tasks.filter(t => t.assigneeId === uid)
    : data.tasks;

  const { start, end } = getWeekRange(worklogWeekOffset);
  const sessions = calcWorkSessions(myTasks, uid, start, end);

  // 週内に作業がなく、かつ今週でなければ非表示にしない（ナビで見ているので表示）
  // 今週かつ作業ゼロなら非表示
  const isCurrentWeek = worklogWeekOffset === 0;
  if (isCurrentWeek && sessions.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  const totalMs  = sessions.reduce((sum, s) => sum + s.duration, 0);
  const byDay    = aggregateByDay(sessions);
  const byTask   = aggregateByTask(sessions);
  const maxDayMs = Object.values(byDay).reduce((m, d) => Math.max(m, d.total), 1);
  const maxTaskMs = byTask.length ? byTask[0].total : 1;

  const todayStr = new Date().toISOString().slice(0, 10);

  // 週ラベル
  const weekLabel = isCurrentWeek ? '今週'
    : worklogWeekOffset === -1 ? '先週'
    : `${start.getMonth()+1}/${start.getDate()} 〜 ${end.getMonth()+1}/${end.getDate()}`;

  // 日別バー（月〜日）
  const DAY_JA = ['日','月','火','水','木','金','土'];
  let daysHtml = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const key     = d.toISOString().slice(0, 10);
    const isToday = key === todayStr;
    const dayData = byDay[key];
    const ms      = dayData ? dayData.total : 0;
    const pct     = Math.round((ms / maxDayMs) * 100);
    const label   = DAY_JA[d.getDay()];
    daysHtml += `
      <div class="worklog-day-row">
        <span class="worklog-day-label${isToday ? ' today' : ''}">${label}</span>
        <div class="worklog-day-bar-wrap">
          <div class="worklog-day-bar${isToday ? ' today' : ''}" style="width:${ms ? pct : 0}%"></div>
        </div>
        <span class="worklog-day-time${isToday ? ' today' : ''}">${ms ? fmtMs(ms) : '---'}</span>
      </div>`;
  }

  // タスク別TOP5
  let tasksHtml = '';
  if (byTask.length === 0) {
    tasksHtml = '<div class="worklog-empty">この期間の作業記録はありません</div>';
  } else {
    byTask.slice(0, 5).forEach(t => {
      const proj  = (data.projects || []).find(p => p.id === t.projectId);
      const color = proj ? proj.color : 'var(--border)';
      const pct   = Math.round((t.total / maxTaskMs) * 100);
      tasksHtml += `
        <div class="worklog-task-row">
          <span class="worklog-task-dot" style="background:${color}"></span>
          <span class="worklog-task-name">${escH(t.title)}</span>
          <div class="worklog-task-bar-wrap">
            <div class="worklog-task-bar" style="width:${pct}%;background:${color};opacity:0.7;"></div>
          </div>
          <span class="worklog-task-time">${fmtMs(t.total)}</span>
        </div>`;
    });
  }

  // 詳細（日別セッション一覧）
  let detailHtml = '';
  if (worklogDetailOpen && sessions.length > 0) {
    const keys = Object.keys(byDay).sort();
    keys.forEach(key => {
      const d   = new Date(key + 'T00:00:00');
      const dow = DAY_JA[d.getDay()];
      const dd  = byDay[key];
      detailHtml += `<div class="worklog-detail-day">${key.slice(5).replace('-','/')}（${dow}）— ${fmtMs(dd.total)}</div>`;
      dd.sessions.forEach(s => {
        detailHtml += `
          <div class="worklog-detail-session">
            <span class="worklog-detail-session-title">${escH(s.taskTitle)}</span>
            <span class="worklog-detail-session-time">${fmtTime(s.start)} - ${fmtTime(s.end)} &nbsp; ${fmtMs(s.duration)}</span>
          </div>`;
      });
    });
  }

  panel.innerHTML = `
    <div class="worklog-summary-header">
      <span class="worklog-summary-title">${icon('clock',12,'currentColor')} 稼働時間</span>
      <span class="worklog-summary-total">${totalMs ? fmtMs(totalMs) : '---'}</span>
      <div class="worklog-week-nav">
        <button class="worklog-week-btn" onclick="worklogWeekOffset--;worklogDetailOpen=false;renderWorklogSummary()">◀</button>
        <span class="worklog-week-label">${weekLabel}</span>
        <button class="worklog-week-btn" onclick="worklogWeekOffset++;worklogDetailOpen=false;renderWorklogSummary()"${worklogWeekOffset >= 0 ? ' disabled style="opacity:0.4;cursor:default;"' : ''}>▶</button>
      </div>
    </div>
    <div class="worklog-days">${daysHtml}</div>
    <div class="worklog-tasks-title">── タスク別</div>
    ${tasksHtml}
    ${sessions.length > 0 ? `
    <button class="worklog-detail-toggle" onclick="worklogDetailOpen=!worklogDetailOpen;renderWorklogSummary()">
      ${worklogDetailOpen ? '▲ 詳細を閉じる' : '▼ 詳細を表示'}
    </button>
    ${worklogDetailOpen ? `<div class="worklog-detail">${detailHtml}</div>` : ''}
    ` : ''}
  `;
}

function renderFilterBar() {
  const myTasks = data.tasks.filter(t => t.parentId === null);
  const allTags = [...new Set(myTasks.flatMap(t => t.tags || []))];
  const bar = document.getElementById('filterBar');
  if (!allTags.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  const hasActive = tagFilter !== null;
  let html = '';
  if (hasActive) {
    html += `<button class="filter-chip" onclick="setTagFilter(null)" style="border-color:var(--text-muted);color:var(--text-muted);">${icon('x',10,'currentColor')} フィルタ解除</button> `;
  }
  html += icon('tag',12,'currentColor') + ' ' + allTags.map(tag => {
    const c = tagColor(tag);
    const act = tagFilter === tag;
    return `<button class="filter-chip${act ? ' active-chip' : ''}" onclick="setTagFilter('${escA(tag)}')"
      style="border-color:${c};color:${act ? '#fff' : c};${act ? `background:${c};` : ''}">${escH(tag)}</button>`;
  }).join('');
  bar.innerHTML = html;
}

function renderAlert() {
  const banner = document.getElementById('alertBanner');
  const stuckCount = data.tasks.filter(t =>
    t.parentId === null &&
    (t.status === 'stuck' || isOverdue(t))
  ).length;
  if (stuckCount > 0) {
    banner.style.display = 'flex';
    banner.className = 'alert-banner';
    banner.innerHTML = `${icon('alert-triangle',13,'currentColor')} スタック・超過中 <span class="badge">${stuckCount}件</span>`;
  } else {
    banner.style.display = 'none';
  }
}

function renderMain() {
  const main = document.getElementById('mainContent');
  const myTasks = getMyTasks();
  if (!myTasks.length) {
    main.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${icon('clipboard',32,'#94a3b8')}</div>
      <div class="empty-title">タスクがありません</div>
      <div class="empty-desc">「＋ 新規タスク」から追加しましょう</div>
    </div>`;
    return;
  }

  // プロジェクト別グループ化
  const grouped = {};
  myTasks.forEach(t => {
    if (!grouped[t.projectId]) grouped[t.projectId] = [];
    grouped[t.projectId].push(t);
  });

  let html = '';
  Object.entries(grouped).forEach(([pid, tasks]) => {
    const project = data.projects.find(p => p.id === pid);
    if (!project) return;
    const isOpen = !openGroups.has(pid) ;
    const dueMeta = project.dueDate ? `期限 ${fmtDate(project.dueDate)}` : '';
    html += `
      <div class="project-group">
        <div class="project-group-header" onclick="toggleGroup('${pid}')">
          <span class="group-chevron ${isOpen ? '' : 'collapsed'}">▼</span>
          <span class="group-dot" style="background:${project.color}"></span>
          <span class="group-label">${escH(project.name)}</span>
          <span class="group-meta">${dueMeta}</span>
          <span class="group-count">${tasks.length}</span>
        </div>
        <div class="task-list-wrap" id="group-${pid}" style="display:${isOpen ? 'flex' : 'none'};flex-direction:column;gap:3px;">
          ${tasks.map(t => renderTaskRow(t, false)).join('')}
          <div class="add-task-row" onclick="openModalForProject('${pid}')">
            <span style="font-size:15px;line-height:1;">+</span>
            <span>タスクを追加</span>
          </div>
        </div>
      </div>`;
  });

  main.innerHTML = html;

  // サブタスク展開状態復元（＋検索ヒット時は自動展開）
  openGroups.forEach(id => {
    const el = document.getElementById('sub-' + id);
    if (el) el.style.display = 'flex';
  });
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    myTasks.forEach(t => {
      const hasHit = getDescendantIds(data, t.id).some(cid => {
        const c = data.tasks.find(x => x.id === cid);
        return c && [c.title, c.memo, ...(c.tags || [])].join(' ').toLowerCase().includes(q);
      });
      if (hasHit) {
        const el = document.getElementById('sub-' + t.id);
        if (el) el.style.display = 'flex';
      }
    });
  }
}

function renderTaskRow(task, isChild) {
  const st = STATUSES[task.status] || STATUSES.pending;
  const asgn = data.users.find(u => u.id === task.assigneeId);
  const children = getChildren(task.id);
  const hasChildren = children.length > 0;
  const isExpanded = openGroups.has(task.id);
  const isDone = task.status === 'done';
  const od = isOverdue(task) && !isDone;
  const stuck = task.status === 'stuck';
  const working = isActivelyWorking(task);
  const lastLog = getLastWorkLog(task);
  const workingElapsed = (working && lastLog) ? getElapsedTime(lastLog.at) : null;

  let cls = 'task-row' + (isChild ? ' subtask' : '');
  if (isDone) cls += ' done';
  else if (od) cls += ' overdue';
  else if (stuck) cls += ' stuck';
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const hit = [task.title, task.memo, ...(task.tags || [])].join(' ').toLowerCase().includes(q);
    if (hit) cls += ' search-hit';
  }

  let dueHtml = '';
  if (task.dueDate) {
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((new Date(task.dueDate + 'T00:00:00') - today) / 86400000);
    let dcls = 'task-due-badge';
    let dt = fmtDate(task.dueDate);
    if (diff < 0 && !isDone) { dcls += ' overdue'; dt = Math.abs(diff) + '日超過'; }
    else if (diff === 0) { dcls += ' today'; dt = '今日'; }
    else if (diff === 1) dt = '明日';
    dueHtml = `<span class="${dcls}">${dt}</span>`;
  }

  // サブタスクはステータスフィルタを適用しない（親が表示されていれば子はすべて見せる）
  const visibleChildren = children;
  const childrenDone = children.filter(c => c.status === 'done').length;
  const taskLinks = task.links || [];
  const hasLink = taskLinks.length > 0;

  const attachHtml = hasLink
    ? `<div class="task-attach-chips">${taskLinks.map(lnk =>
        lnk.type === 'file'
          ? `<a href="${escA(lnk.url)}" onclick="event.preventDefault();event.stopPropagation();openFileViewer('${escA(lnk.url)}','${escA(lnk.label)}','${escA(lnk.fileType||'')}')" class="attach-chip">${linkIcon(lnk)}${escH(lnk.label)}</a>`
          : `<a href="${escA(lnk.url)}" target="_blank" class="attach-chip" onclick="event.stopPropagation()">${linkIcon(lnk)}${escH(lnk.label || lnk.url)}</a>`
      ).join('')}</div>`
    : '';

  const subHtml = (hasChildren || isExpanded)
    ? `<div class="subtask-group" id="sub-${task.id}" style="display:${isExpanded ? 'flex' : 'none'};flex-direction:column;">
        ${visibleChildren.map(c => renderTaskRow(c, true)).join('')}
        <div class="subtask-add-row">
          <input class="subtask-add-input" id="subtask-input-${task.id}" placeholder="サブタスクを追加..."
            onkeydown="if(event.key==='Enter')commitSubtask('${task.id}');else if(event.key==='Escape')toggleChildren('${task.id}')">
          <button class="btn btn-outline btn-xs" onclick="commitSubtask('${task.id}')">追加</button>
        </div>
       </div>`
    : '';

  const tagHtml = (task.tags || []).map(tag =>
    `<span class="task-tag" style="background:${tagColor(tag)}20;color:${tagColor(tag)};" onclick="event.stopPropagation();setTagFilter('${escA(tag)}')">${escH(tag)}</span>`
  ).join('');

  const noteCount = (task.notes || []).length;
  const icons = `<span class="task-icons">
    <button class="task-icon-btn ${task.memo ? 'has-memo' : 'task-icon-empty'}" onclick="event.stopPropagation();showMemoPopup(event,'${task.id}')" title="${task.memo ? 'メモあり：クリックで編集' : 'メモを追加'}">${icon('file-text',12,'currentColor')}${task.memo ? ' メモ' : ''}</button>
    <button class="task-icon-btn ${noteCount > 0 ? 'has-notes' : 'task-icon-empty'}" onclick="event.stopPropagation();openNotePanel('${task.id}')" title="${noteCount > 0 ? noteCount + '件のノート' : 'ノートを追加'}">${icon('clipboard',12,'currentColor')}${noteCount > 0 ? ' ' + noteCount + '件' : ' ノート'}</button>
    <button class="task-icon-btn ${hasLink ? 'has-link' : 'task-icon-empty'}" onclick="event.stopPropagation();showLinkPopup(event,'${task.id}')" title="${hasLink ? taskLinks.length + '件のリンク' : 'リンクを追加'}">${icon('link',12,'currentColor')}${hasLink ? ' ' + taskLinks.length + '件' : ' リンク'}</button>
    <button class="task-icon-btn ${(task.startDate||task.dueDate) ? 'has-link' : 'task-icon-empty'}" onclick="event.stopPropagation();showDatepicker(event,'${task.id}')" title="${task.startDate && task.dueDate ? '開始: ' + fmtDate(task.startDate) + ' 期限: ' + fmtDate(task.dueDate) : task.dueDate ? '期限: ' + fmtDate(task.dueDate) : task.startDate ? '開始: ' + fmtDate(task.startDate) : '日付を設定'}">${icon('calendar',12,'currentColor')}${task.startDate && task.dueDate ? ' ' + fmtDate(task.startDate) + '〜' + fmtDate(task.dueDate) : task.dueDate ? ' ' + fmtDate(task.dueDate) : task.startDate ? ' 開始' + fmtDate(task.startDate) : ' 日付'}</button>
    <button class="task-icon-btn ${hasChildren ? 'has-subtasks' : 'task-icon-empty'}" onclick="event.stopPropagation();toggleChildren('${task.id}')" title="${hasChildren ? 'サブタスクを表示' : 'サブタスクを追加'}">▶ サブタスク ${visibleChildren.length}/${children.length}</button>
  </span>`;

  return `
    <div class="${cls}" data-id="${task.id}" draggable="true"
  ondragstart="event.stopPropagation();taskDragStart(event,'${task.id}')"
  ondragover="event.stopPropagation();taskDragOver(event,'${task.id}')"
  ondragleave="event.stopPropagation();taskDragLeave(event)"
  ondrop="event.stopPropagation();taskDrop(event,'${task.id}')"
  ondragend="event.stopPropagation();taskDragEnd(event)">
      ${working ? `<span class="work-active-dot" title="作業中${workingElapsed ? '（' + workingElapsed + '経過）' : ''}"></span>` : ''}
      <span class="drag-handle" title="ドラッグで移動">⠿</span>
      <div class="task-check ${isDone ? 'checked' : ''}" onclick="toggleDone('${task.id}')">${isDone ? '✓' : ''}</div>
      <span class="task-title-area">
        <button class="task-pencil-btn" onclick="event.stopPropagation();editTaskTitle('${task.id}')" title="タスク名を変更">${icon('pencil',12,'currentColor')}</button>
        <span class="task-title-text" onclick="openEditModal('${task.id}')">${escH(task.title)}</span>
        ${tagHtml}
        ${icons}
      </span>
      <span style="flex:1;min-width:8px"></span>
      <span class="task-status-badge" style="background:${st.bg};color:${st.color};"
        onclick="event.stopPropagation();showStatusPopup(event,'${task.id}')">${st.label}</span>
      ${dueHtml}
      <div class="task-assignee ${asgn ? '' : 'task-assignee-empty'}"
        title="${asgn ? escA(asgn.name) : '担当者を設定'}"
        onclick="event.stopPropagation();showAssigneePicker(event,'${task.id}')"
        style="cursor:pointer;${asgn ? '' : 'background:var(--border);color:var(--text-muted);font-size:14px;'}"
      >${asgn ? asgn.avatar : '+'}</div>
      <div class="task-hover-actions">
        <button class="task-action-btn" onclick="event.stopPropagation();duplicateTask('${task.id}')" title="複製">${icon('clipboard',12,'currentColor')}</button>
        <button class="task-action-btn danger" onclick="event.stopPropagation();deleteTask('${task.id}')" title="削除">${icon('trash',12,'currentColor')}</button>
      </div>
      ${attachHtml}
    </div>
    ${subHtml}`;
}

// ─── 個別 CRUD API ────────────────────────────────────
async function _taskApi(method, path, body) {
  const opts = { method };
  if (body !== undefined) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `${method} ${path} failed: ${res.status}`);
  }
  return res.json();
}

function _showApiError(msg) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;bottom:60px;right:16px;z-index:9999;background:#dc2626;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.2);';
  div.textContent = '⚠ ' + msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

const apiTask = {
  post:       (task)               => _taskApi('POST',   '/api/tasks',                           task),
  patch:      (id, fields)         => _taskApi('PATCH',  `/api/tasks/${id}`,                     fields),
  delete:     (id)                 => _taskApi('DELETE', `/api/tasks/${id}`),
  postNote:   (taskId, note)       => _taskApi('POST',   `/api/tasks/${taskId}/notes`,            note),
  patchNote:  (taskId, nId, f)     => _taskApi('PATCH',  `/api/tasks/${taskId}/notes/${nId}`,    f),
  deleteNote: (taskId, nId)        => _taskApi('DELETE', `/api/tasks/${taskId}/notes/${nId}`),
  postLink:   (taskId, link)       => _taskApi('POST',   `/api/tasks/${taskId}/links`,            link),
  deleteLink: (taskId, lId)        => _taskApi('DELETE', `/api/tasks/${taskId}/links/${lId}`),
  postWorkLog:(taskId, entry)      => _taskApi('POST',   `/api/tasks/${taskId}/work-logs`,        entry),
};

// ─── Interactions ─────────────────────────────────────
function toggleGroup(pid) {
  if (openGroups.has(pid)) openGroups.delete(pid);
  else openGroups.add(pid);
  render();
}

function toggleChildren(taskId) {
  if (openGroups.has(taskId)) openGroups.delete(taskId);
  else openGroups.add(taskId);
  render();
}

async function toggleDone(taskId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  const prevStatus = t.status;
  const newStatus = t.status === 'done' ? 'pending' : 'done';
  const uid = currentUser ? currentUser.id : null;
  const logEntry = (newStatus === 'done' && prevStatus === 'inProgress')
    ? { action: 'stop', userId: uid, at: new Date().toISOString(), reason: 'done' }
    : null;

  // 楽観的更新
  t.status = newStatus;
  if (logEntry) appendWorkLog(t, logEntry.action, logEntry.userId, logEntry.reason);
  render();

  try {
    await apiTask.patch(taskId, { status: newStatus, updatedAt: new Date().toISOString() });
    if (logEntry) await apiTask.postWorkLog(taskId, logEntry);
  } catch (e) {
    t.status = prevStatus;
    if (logEntry && t.workLog?.length) t.workLog.pop();
    render();
    _showApiError('完了ステータスの変更に失敗しました');
  }
}

async function duplicateTask(taskId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;

  const newTasks = [];
  function deepCopy(srcId, newParentId) {
    const src = data.tasks.find(t => t.id === srcId);
    if (!src) return null;
    const now = new Date().toISOString();
    const newId = genId();
    const copy = {
      ...src, id: newId,
      title: srcId === taskId ? src.title + ' (コピー)' : src.title,
      parentId: newParentId, status: 'pending',
      notes: [], links: [], workLog: [],
      createdAt: now, updatedAt: now,
    };
    data.tasks.push(copy);
    newTasks.push(copy);
    data.tasks.filter(c => c.parentId === srcId).forEach(c => deepCopy(c.id, newId));
    return newId;
  }

  deepCopy(taskId, t.parentId);
  render();

  try {
    for (const nt of newTasks) await apiTask.post(nt);
  } catch (e) {
    const newIds = new Set(newTasks.map(x => x.id));
    data.tasks = data.tasks.filter(x => !newIds.has(x.id));
    render();
    _showApiError('タスクの複製に失敗しました');
  }
}

// ─── D&D ヘルパー（3階層上限チェック用）──────────────────
function _taskDepth(tasks, taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || !t.parentId) return 1;
  return 1 + _taskDepth(tasks, t.parentId);
}
function _subtreeHeight(tasks, taskId) {
  const children = tasks.filter(x => x.parentId === taskId);
  if (!children.length) return 1;
  return 1 + Math.max(...children.map(c => _subtreeHeight(tasks, c.id)));
}

// ─── Drag & Drop ───────────────────────────────────────
function taskDragStart(e, taskId) {
  _dragSrcId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
  setTimeout(() => {
    const el = document.querySelector(`.task-row[data-id="${taskId}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function taskDragOver(e, taskId) {
  if (taskId === _dragSrcId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = e.currentTarget;
  el.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into');
  const rect = el.getBoundingClientRect();
  const relY = e.clientY - rect.top;
  // ゾーンを上40%・下40%・中央20%に拡張（挿入判定を広く取る）
  if (relY < rect.height * 0.4) {
    el.classList.add('drag-over-top');
  } else if (relY > rect.height * 0.6) {
    el.classList.add('drag-over-bottom');
  } else {
    el.classList.add('drag-over-into');
  }
}

function taskDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into');
}

// ドロップ先がなく中断した場合も透明化をリセット
function taskDragEnd(e) {
  document.querySelectorAll('.task-row').forEach(r =>
    r.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into', 'dragging'));
  _dragSrcId = null;
}

async function taskDrop(e, targetId) {
  e.preventDefault();
  const el = e.currentTarget;
  const dropClass = el.classList.contains('drag-over-top') ? 'top'
    : el.classList.contains('drag-over-bottom') ? 'bottom' : 'into';
  document.querySelectorAll('.task-row').forEach(r =>
    r.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-into', 'dragging'));

  if (!_dragSrcId || _dragSrcId === targetId) { _dragSrcId = null; return; }

  const srcTask = data.tasks.find(t => t.id === _dragSrcId);
  const targetTask = data.tasks.find(t => t.id === targetId);
  if (!srcTask || !targetTask) { _dragSrcId = null; return; }

  const srcId = _dragSrcId;
  const prevParentId = srcTask.parentId;

  if (dropClass === 'into') {
    // Guard 1: 循環参照チェック
    if (getDescendantIds(data, srcId).includes(targetId)) {
      _dragSrcId = null; return;
    }
    // Guard 2: 3階層上限チェック
    const targetDepth = _taskDepth(data.tasks, targetId);
    const srcHeight   = _subtreeHeight(data.tasks, srcId);
    if (targetDepth + srcHeight > 3) {
      _dragSrcId = null; return;
    }
    srcTask.parentId = targetId;
  } else {
    // Reorder: data.tasks 配列内で隣接位置に移動（深さ問わず統一）
    srcTask.parentId = targetTask.parentId;
    const srcIdx = data.tasks.findIndex(t => t.id === srcId);
    data.tasks.splice(srcIdx, 1);
    const tIdx = data.tasks.findIndex(t => t.id === targetId);
    if (dropClass === 'top') {
      data.tasks.splice(tIdx, 0, srcTask);
    } else {
      data.tasks.splice(tIdx + 1, 0, srcTask);
    }
  }

  _dragSrcId = null;
  render();

  try {
    await apiTask.patch(srcId, { parentId: srcTask.parentId, updatedAt: new Date().toISOString() });
  } catch (e) {
    srcTask.parentId = prevParentId;
    render();
    _showApiError('タスクの移動に失敗しました');
  }
}

async function deleteTask(taskId) {
  if (!confirm('このタスクを削除しますか？')) return;
  const allIds = [taskId, ...getDescendantIds(data, taskId)];
  const snapshot = allIds.map(id => data.tasks.find(t => t.id === id)).filter(Boolean);

  // 楽観的更新
  allIds.forEach(id => openGroups.delete(id));
  deleteTaskDeep(data, taskId);
  render();

  try {
    await apiTask.delete(taskId);
  } catch (e) {
    snapshot.forEach(t => data.tasks.push(t));
    render();
    _showApiError('タスクの削除に失敗しました');
  }
}

async function setTaskStatus(status) {
  const t = data.tasks.find(t => t.id === _statusTarget);
  if (!t) return;
  const prevStatus = t.status;
  const uid = currentUser ? currentUser.id : null;

  let logEntry = null;
  if (status === 'inProgress' && prevStatus !== 'inProgress') {
    logEntry = { action: 'start', userId: uid, at: new Date().toISOString() };
  } else if (prevStatus === 'inProgress' && status !== 'inProgress') {
    const reason = status === 'done' ? 'done' : status === 'stuck' ? 'stuck' : 'manual';
    logEntry = { action: 'stop', userId: uid, at: new Date().toISOString(), reason };
  }

  // 楽観的更新
  t.status = status;
  if (logEntry) appendWorkLog(t, logEntry.action, logEntry.userId, logEntry.reason);
  render();

  try {
    await apiTask.patch(_statusTarget, { status, updatedAt: new Date().toISOString() });
    if (logEntry) await apiTask.postWorkLog(_statusTarget, logEntry);
  } catch (e) {
    t.status = prevStatus;
    if (logEntry && t.workLog?.length) t.workLog.pop();
    render();
    _showApiError('ステータスの変更に失敗しました');
  }
}

      t.title = val;
      render();

        await apiTask.patch(taskId, { title: val, updatedAt: new Date().toISOString() });

// ─── Date picker ───────────────────────────────────────
let _dpTarget = null;
let _dpDate = null;
let _dpYear = null;
let _dpMonth = null;
let _dpPhase = 'start'; // 'start' | 'due'

// フェーズメッセージ＋消去ボタン表示を更新
function dpUpdateMsg() {
  const t = _dpTarget ? data.tasks.find(x => x.id === _dpTarget) : null;

  document.getElementById('dpClearStartBtn').style.display = t?.startDate ? '' : 'none';
  document.getElementById('dpClearDueBtn').style.display = t?.dueDate ? '' : 'none';

function showDatepicker(e, taskId) {
  e.stopPropagation();
  _dpTarget = taskId;
  const t = data.tasks.find(t => t.id === taskId);
  const today = new Date();
  // フェーズ初期化：startDate未設定なら①、startDateのみ設定済なら②
  _dpPhase = (t?.startDate && !t?.dueDate) ? 'due' : 'start';
  const base = t?.startDate ? new Date(t.startDate + 'T00:00:00') : t?.dueDate ? new Date(t.dueDate + 'T00:00:00') : today;
  _dpYear = base.getFullYear();
  _dpMonth = base.getMonth();
  _dpDate = null;
  document.getElementById('dpDateInput').value = '';
  dpUpdateMsg();
  dpRenderCalendar();
  const popup = document.getElementById('datepickerPopup');
  // まず open して実際のサイズを取得してから位置調整
  popup.classList.add('open');
  const popupH = popup.offsetHeight || 340;
  const popupW = popup.offsetWidth  || 260;
  const x = Math.min(e.clientX, window.innerWidth - popupW - 8);
  let y = e.clientY + 10;
  if (y + popupH > window.innerHeight - 8) y = e.clientY - popupH - 4; // 下はみ出す→上に反転
  if (y < 4) y = 4;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  const close = ev => {
    if (!popup.contains(ev.target)) { closeDatepicker(); document.removeEventListener('mousedown', close); }
  };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}

function closeDatepicker() {
  document.getElementById('datepickerPopup').classList.remove('open');
}

function dpRenderCalendar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const t = _dpTarget ? data.tasks.find(x => x.id === _dpTarget) : null;
  const rs = t?.startDate || null;
  const re = t?.dueDate   || null;
  document.getElementById('dpMonthLabel').textContent = `${_dpYear}年${_dpMonth + 1}月`;
  const firstDow = new Date(_dpYear, _dpMonth, 1).getDay();
  const daysInMonth = new Date(_dpYear, _dpMonth + 1, 0).getDate();
  let html = '';
  for (let i = 0; i < firstDow; i++) html += '<span class="dp-day dp-empty"></span>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${_dpYear}-${String(_dpMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(_dpYear, _dpMonth, d).getDay();
    let cls = 'dp-day';
    if (ds === todayStr) cls += ' dp-today';
    if (rs && re && ds === rs && ds === re) cls += ' dp-range-single';
    else if (rs && ds === rs) cls += ' dp-range-start';
    else if (re && ds === re) cls += ' dp-range-end';
    else if (rs && re && ds > rs && ds < re) cls += ' dp-in-range';
    else if (ds === _dpDate) cls += ' dp-selected';
    if (dow === 0 || dow === 6) cls += ' dp-weekend';
    html += `<span class="${cls}" onclick="dpSelectDate('${ds}')">${d}</span>`;
  }
  document.getElementById('dpDays').innerHTML = html;
}

function dpPrevMonth() {
  _dpMonth--;
  if (_dpMonth < 0) { _dpMonth = 11; _dpYear--; }
  dpRenderCalendar();
}
function dpNextMonth() {
  _dpMonth++;
  if (_dpMonth > 11) { _dpMonth = 0; _dpYear++; }
  dpRenderCalendar();
}

async function dpSelectDate(dateStr) {
  _dpDate = dateStr;
  document.getElementById('dpDateInput').value = dateStr;
  const t = _dpTarget ? data.tasks.find(x => x.id === _dpTarget) : null;
  if (!t) { dpRenderCalendar(); return; }

  if (_dpPhase === 'start') {
    const prev = { startDate: t.startDate, dueDate: t.dueDate };
    t.startDate = dateStr;
    if (t.dueDate && t.dueDate < dateStr) t.dueDate = null;
    _dpPhase = 'due';
    render(); dpUpdateMsg(); dpRenderCalendar();
    try {
      await apiTask.patch(_dpTarget, { startDate: t.startDate, dueDate: t.dueDate, updatedAt: new Date().toISOString() });
    } catch (e) {
      Object.assign(t, prev); render();
      _showApiError('開始日の設定に失敗しました');
    }
  } else {
    if (!t.startDate || dateStr >= t.startDate) {
      const prevDue = t.dueDate;
      t.dueDate = dateStr;
      _dpPhase = 'start';
      render(); dpUpdateMsg(); dpRenderCalendar();
      try {
        await apiTask.patch(_dpTarget, { dueDate: dateStr, updatedAt: new Date().toISOString() });
      } catch (e) {
        t.dueDate = prevDue; render();
        _showApiError('期限の設定に失敗しました');
      }
    } else {
      const prev = { startDate: t.startDate, dueDate: t.dueDate };
      t.startDate = dateStr;
      t.dueDate = null;
      render(); dpUpdateMsg(); dpRenderCalendar();
      try {
        await apiTask.patch(_dpTarget, { startDate: dateStr, dueDate: null, updatedAt: new Date().toISOString() });
      } catch (e) {
        Object.assign(t, prev); render();
        _showApiError('日付の設定に失敗しました');
      }
    }
  }
}

}
function closeLinkPopup() { document.getElementById('linkPopup').classList.remove('open'); }
function renderLinkChipList() {
  const t = data.tasks.find(t => t.id === _linkTarget);
  const links = t?.links || [];

  if (!links.length) { list.innerHTML = '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">リンクはありません</div>'; return; }

    return `<div class="link-chip-row">${chip}<button class="link-chip-del" onclick="removeLinkFromTask('${escA(lnk.id)}')" title="削除">✕</button></div>`;
  }).join('');
}
async function addLinkToTask() {
  const url = document.getElementById('linkUrlInput').value.trim();
  if (!url) { document.getElementById('linkUrlInput').focus(); return; }
  try {
    const parsed = new URL(url);
    if (!['http:', 'https:'].includes(parsed.protocol)) {
      alert('http:// または https:// で始まるURLを入力してください');
      return;
    }
  } catch {
    alert('有効なURLを入力してください');
    return;
  }
  const newLink = { id: genId(), label: autoLabelFromUrl(url), url };
  const t = data.tasks.find(t => t.id === _linkTarget);
  if (!t) return;
  if (!t.links) t.links = [];
  t.links.push(newLink);
  renderLinkChipList();
  document.getElementById('linkUrlInput').value = '';
  document.getElementById('linkUrlInput').focus();
  render();
  try {
    await apiTask.postLink(_linkTarget, newLink);
  } catch (e) {
    t.links = t.links.filter(l => l.id !== newLink.id);
    renderLinkChipList(); render();
    _showApiError('リンクの追加に失敗しました');
  }
}
function autoLabelFromUrl(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url.length > 30 ? url.slice(0,30)+'…' : url; }
}
function switchLinkTab(tab) {
  const isUrl = tab === 'url';
  document.getElementById('linkPanelUrl').style.display = isUrl ? 'block' : 'none';
  document.getElementById('linkPanelFile').style.display = isUrl ? 'none' : 'block';
  document.getElementById('linkTabUrl').classList.toggle('active', isUrl);
  document.getElementById('linkTabFile').classList.toggle('active', !isUrl);

function handleFileDrop(e) {

}
function handleFileSelect(e) {
  Array.from(e.target.files).forEach(f => addFileToTask(f));
  e.target.value = '';
}
async function addFileToTask(file) {
  if (file.size > 10 * 1024 * 1024) { alert('10MB以内のファイルを選択してください: ' + file.name); return; }
  const t = data.tasks.find(t => t.id === _linkTarget);
  if (!t) return;

  // アップロード中の表示
  const dropZone = document.getElementById('fileDropZone');
  if (dropZone) { dropZone.innerHTML = '<div style="padding:8px;font-size:12px;color:var(--text-muted);">⏳ アップロード中...</div>'; }

  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'アップロード失敗');
    }
    const result = await res.json();

    if (!t.links) t.links = [];
    const newLink = {
      id: genId(),
      label: file.name,
      url: '/api/file/' + result.key,
      type: 'file',
      fileType: file.type,
      r2Key: result.key,
    };
    t.links.push(newLink);
    renderLinkChipList();
    render();
    try {
      await apiTask.postLink(_linkTarget, newLink);
    } catch (e) {
      t.links = t.links.filter(l => l.id !== newLink.id);
      renderLinkChipList(); render();
      _showApiError('ファイルの保存に失敗しました');
    }
  } catch (e) {
    alert('ファイルのアップロードに失敗しました: ' + e.message);
  }

  // ドロップゾーンを復元
  if (dropZone) {
    dropZone.innerHTML = '<div style="font-size:20px;margin-bottom:4px;">📎</div><div>ここにドロップ</div><div style="font-size:11px;color:var(--text-muted);margin:4px 0;">または</div><label class="btn btn-outline btn-xs" style="cursor:pointer;display:inline-flex;">ファイルを選択<input type="file" id="fileInput" style="display:none;" multiple onchange="handleFileSelect(event)"></label>';
  }
}
async function removeLinkFromTask(linkId) {
  const t = data.tasks.find(t => t.id === _linkTarget);
  if (!t || !t.links) return;
  const idx = t.links.findIndex(l => l.id === linkId);
  if (idx === -1) return;
  const removed = t.links[idx];
  t.links.splice(idx, 1);
  renderLinkChipList();
  render();
  try {
    await apiTask.deleteLink(_linkTarget, linkId);
  } catch (e) {
    t.links.splice(idx, 0, removed);
    renderLinkChipList(); render();
    _showApiError('リンクの削除に失敗しました');
  }
}
function linkIcon(lnk) {
  if (typeof lnk === 'string') lnk = { url: lnk };
  if (lnk.type === 'file') {
    const ft = lnk.fileType || '';
    if (ft.startsWith('image/')) return icon('image',12,'currentColor') + ' ';
    if (ft.includes('pdf')) return icon('file-text',12,'currentColor') + ' ';
    if (ft.includes('word') || ft.includes('document')) return icon('file-text',12,'currentColor') + ' ';
    if (ft.includes('spreadsheet') || ft.includes('excel')) return icon('bar-chart',12,'currentColor') + ' ';
    return icon('paperclip',12,'currentColor') + ' ';
  }
  const url = lnk.url || '';
  if (url.includes('notion.so')) return icon('file-text',12,'currentColor') + ' ';
  if (url.includes('drive.google.com') || url.includes('docs.google.com')) return icon('file',12,'currentColor') + ' ';
  if (url.includes('dropbox.com')) return icon('folder',12,'currentColor') + ' ';
  if (url.match(/\.(pdf)$/i)) return icon('file-text',12,'currentColor') + ' ';
  return icon('link',12,'currentColor') + ' ';
}

function buildGcalUrl(task) {
  const title = encodeURIComponent(task.title);
  const startD = task.startDate || task.dueDate;
  const endD   = task.dueDate   || task.startDate;
  if (!startD) return '';
  const ds = startD.replace(/-/g, '');
  const ed = new Date(endD + 'T00:00:00');
  ed.setDate(ed.getDate() + 1); // Googleカレンダーは終了日が排他
  const es = ed.getFullYear() + String(ed.getMonth()+1).padStart(2,'0') + String(ed.getDate()).padStart(2,'0');
  let det = task.memo || '';
  (task.links || []).forEach(lnk => { det += (det ? '\n' : '') + (lnk.label || 'Link') + ': ' + lnk.url; });
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${ds}/${es}&details=${encodeURIComponent(det)}`;
}

function tagColor(tag) {
  const palette = ['#4f46e5','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777','#0369a1'];
  let h = 0;
  for (const c of tag) h = (h * 31 + c.charCodeAt(0)) % palette.length;
  return palette[h];
}

function escH(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function stripHtml(s) {
  if (!s) return '';
  if (!/<[a-z]/i.test(s)) return s;
  return s.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n').replace(/<\/div>/gi, '\n')
    .replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')

}

let _fvUrl = null, _fvName = null, _fvType = null;
let _fvZoom = 1, _fvFitWidth = null;
const FV_ZOOM_STEP = 0.25, FV_ZOOM_MIN = 0.5, FV_ZOOM_MAX = 4;

function openFileViewer(url, name, fileType) {
  _fvUrl = url; _fvName = name; _fvType = fileType;
  document.getElementById('fileViewerTitle').textContent = name;
  document.getElementById('fileViewerIcon').innerHTML = fvIcon(fileType);
  const isImage = (fileType || '').startsWith('image/');
  const frame = document.getElementById('fileViewerFrame');
  const imgWrap = document.getElementById('fileViewerImgWrap');
  const img = document.getElementById('fileViewerImg');
  if (isImage) {
    frame.style.display = 'none'; frame.src = 'about:blank';
    _fvZoom = 1; _fvFitWidth = null;
    img.style.width = ''; img.style.maxWidth = ''; img.style.maxHeight = '';
    imgWrap.style.alignItems = 'center';
    img.src = url; img.alt = name;
    img.onload = () => { _fvFitWidth = null; applyFvZoom(); };
    imgWrap.style.display = 'flex';
  } else {
    imgWrap.style.display = 'none'; img.src = '';
    frame.style.display = ''; frame.src = url;
  }
  document.getElementById('fileViewerPanel').classList.add('open');
  document.getElementById('fileViewerTab').classList.remove('show');
}

function fvZoomIn()  { applyFvZoom(_fvZoom + FV_ZOOM_STEP); }
function fvZoomOut() { applyFvZoom(_fvZoom - FV_ZOOM_STEP); }
function fvZoomReset() { _fvFitWidth = null; applyFvZoom(1); }

function applyFvZoom(z) {
  if (z !== undefined) _fvZoom = Math.min(FV_ZOOM_MAX, Math.max(FV_ZOOM_MIN, Math.round(z * 4) / 4));
  const img = document.getElementById('fileViewerImg');
  const wrap = document.getElementById('fileViewerImgWrap');
  if (_fvZoom === 1) {
    img.style.width = ''; img.style.maxWidth = '100%'; img.style.maxHeight = '100%';
    wrap.style.alignItems = 'center';
    img.style.cursor = 'zoom-in';
  } else {
    if (!_fvFitWidth) _fvFitWidth = img.offsetWidth || 400;
    img.style.maxWidth = 'none'; img.style.maxHeight = 'none';
    img.style.width = Math.round(_fvFitWidth * _fvZoom) + 'px';
    wrap.style.alignItems = 'flex-start';
    img.style.cursor = _fvZoom >= FV_ZOOM_MAX ? 'default' : 'zoom-in';
  }
  document.getElementById('fvZoomLabel').textContent = Math.round(_fvZoom * 100) + '%';
}

// マウスホイールでズーム（画像表示中のみ）
document.addEventListener('wheel', e => {
  const wrap = document.getElementById('fileViewerImgWrap');
  if (wrap && wrap.style.display !== 'none' && wrap.contains(e.target)) {
    e.preventDefault();
    applyFvZoom(_fvZoom + (e.deltaY < 0 ? FV_ZOOM_STEP : -FV_ZOOM_STEP));
  }
}, { passive: false });

function closeFileViewer() {
  document.getElementById('fileViewerPanel').classList.remove('open');
  document.getElementById('fileViewerTab').classList.remove('show');
  setTimeout(() => {
    if (!document.getElementById('fileViewerPanel').classList.contains('open')) {
      document.getElementById('fileViewerFrame').src = 'about:blank';
      document.getElementById('fileViewerImg').src = '';
    }
  }, 300);
  _fvUrl = _fvName = _fvType = null;
}

function toggleFileViewerWidth() {

function minimizeFileViewer() {
  document.getElementById('fileViewerPanel').classList.remove('open');

  document.getElementById('fileViewerTabName').textContent = _fvName;

}

function restoreFileViewer() {
  document.getElementById('fileViewerPanel').classList.add('open');

function fvIcon(fileType) {
  if (!fileType) return icon('paperclip',14,'currentColor');
  if (fileType.startsWith('image/')) return icon('image',14,'currentColor');
  if (fileType.includes('pdf')) return icon('file-text',14,'currentColor');
  if (fileType.includes('word') || fileType.includes('document')) return icon('file-text',14,'currentColor');
  if (fileType.includes('spreadsheet') || fileType.includes('excel')) return icon('bar-chart',14,'currentColor');
  return icon('paperclip',14,'currentColor');
}

<script>
// 通知チェック（マイタスク用：自分のタスクのみ）
function checkAnniversary(customer, dateStr, label, list) {
  if (!dateStr) return;
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const thisYear = today.getFullYear();
  const mmdd = dateStr.slice(5); // "MM-DD"
  let targetStr = `${thisYear}-${mmdd}`;
  if (targetStr < todayStr) targetStr = `${thisYear + 1}-${mmdd}`;
  const diffDays = Math.floor(
    (new Date(targetStr + 'T00:00:00') - new Date(todayStr + 'T00:00:00')) / 86400000
  );
  if (diffDays <= 7) {
    const when = diffDays === 0 ? '🎉 本日' : diffDays === 1 ? '明日' : `${diffDays}日後`;
    list.push({ name: customer.name, label, when, daysLeft: diffDays });
  }
}

function checkNotifications() {
  if (!data || !currentUser) return;
  const today = new Date().toISOString().slice(0, 10);

  const myTasks = (data.tasks || []).filter(t =>
    t.parentId === null &&
    (!t.assigneeId || t.assigneeId === currentUser.id) &&
    t.status !== 'done'
  );

  const overdue  = myTasks.filter(t => t.dueDate && t.dueDate < today);
  const dueToday = myTasks.filter(t => t.dueDate === today);
  const stuck    = myTasks.filter(t => t.status === 'stuck');

  // 記念日チェック（誕生日・創業記念日）
  const celebrations = [];
  (data.customers || []).forEach(c => {
    checkAnniversary(c, c.birthday,      '誕生日',    celebrations);
    checkAnniversary(c, c.foundingDate,  '創業記念日', celebrations);
  });

  renderNotifBanners({ overdue, dueToday, stuck, celebrations });
  fireOsNotification({ overdue, dueToday, stuck, celebrations });
}

function renderNotifBanners({ overdue, dueToday, stuck, celebrations = [] }) {
  const area = document.getElementById('notifBannerArea');
  if (!area) return;
  area.innerHTML = '';

  if (overdue.length > 0) {
    area.appendChild(makeBanner('overdue',
      `${icon('alert-triangle',13,'currentColor')} 期限超過 ${overdue.length}件`,
      overdue.map(t => t.title)
    ));
  }
  if (dueToday.length > 0) {
    area.appendChild(makeBanner('warning',
      `${icon('pin',13,'currentColor')} 今日期限 ${dueToday.length}件`,
      dueToday.map(t => t.title)
    ));
  }
  if (stuck.length > 0) {
    area.appendChild(makeBanner('info',
      `🛑 スタック ${stuck.length}件`,
      stuck.map(t => t.title)
    ));
  }
  if (celebrations.length > 0) {
    const hasToday = celebrations.some(c => c.daysLeft === 0);
    area.appendChild(makeBanner(
      hasToday ? 'warning' : 'info',
      `🎂 記念日 ${celebrations.length}件`,
      celebrations.map(c => `${c.name}の${c.label}（${c.when}）`)
    ));
  }
}

function makeBanner(type, label, titles) {
  const div = document.createElement('div');
  div.className = `notif-banner ${type}`;

  const labelSpan = document.createElement('span');
  labelSpan.style.fontWeight = '700';
  labelSpan.innerHTML = label + '：';
  div.appendChild(labelSpan);

  const items = document.createElement('span');
  items.className = 'notif-banner-items';
  titles.forEach(title => {
    const span = document.createElement('span');
    span.className = 'notif-banner-item';
    span.textContent = title;
    items.appendChild(span);
  });
  div.appendChild(items);

  const close = document.createElement('button');
  close.className = 'notif-banner-close';
  close.textContent = '✕';
  close.onclick = () => div.remove();
  div.appendChild(close);

  return div;
}

// OS通知（30分ごと・同じ内容は重複しない）
let _lastNotifKey = '';
function fireOsNotification({ overdue, dueToday, stuck, celebrations = [] }) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') {
    Notification.requestPermission();
    return;
  }

  const total = overdue.length + dueToday.length + stuck.length + celebrations.length;
  if (total === 0) return;

  const key = `${overdue.map(t=>t.id).join(',')}|${dueToday.map(t=>t.id).join(',')}|${stuck.map(t=>t.id).join(',')}|${celebrations.map(c=>c.name+c.label).join(',')}`;
  if (key === _lastNotifKey) return;
  _lastNotifKey = key;

  const lines = [];
  if (overdue.length)       lines.push(`⚠️ 期限超過 ${overdue.length}件`);
  if (dueToday.length)      lines.push(`📌 今日期限 ${dueToday.length}件`);
  if (stuck.length)         lines.push(`🛑 スタック ${stuck.length}件`);
  if (celebrations.length)  lines.push(`🎂 記念日 ${celebrations.length}件`);

  const n = new Notification('タスク管理 - 要確認', {
    body: lines.join('\n'),
    icon: '/logo.png',
    tag: 'task-notif'
  });
  n.onclick = () => { window.focus(); n.close(); };
}

// データロード後に1回 + 30分ごとに繰り返し
function initNotifications() {
  checkNotifications();
  setInterval(checkNotifications, 30 * 60 * 1000);
}
</script>

<!-- ─── AI Chat ─────────────────────────────────────── -->
<button class="ai-chat-fab" onclick="toggleAiChat()" title="AIアシスタント"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"><g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594zM20 2v4m2-2h-4"/><circle cx="4" cy="20" r="2"/></g></svg></button>

<div class="ai-chat-panel hidden" id="aiChatPanel">
  <div class="ai-chat-header">
    <span>🤖 AIアシスタント</span>
    <button class="ai-chat-header-close" onclick="toggleAiChat()">✕</button>
  </div>
  <div class="ai-chat-messages" id="aiChatMessages">
    <div class="ai-chat-msg ai">
      <div class="ai-chat-bubble">タスクについて何でも聞いてください。例：「今週期限のタスクは？」「進行中のタスクを教えて」「〇〇の期限を来週にして」</div>
    </div>
  </div>
  <div class="ai-chat-footer">
    <textarea class="ai-chat-input" id="aiChatInput" placeholder="質問を入力..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiChat();}
                 this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';"></textarea>
    <button class="ai-chat-send" id="aiChatSend" onclick="sendAiChat()" title="送信">↑</button>
  </div>
</div>

<script>
// ─── AI Chat ──────────────────────────────────────────
function toggleAiChat() {
  document.getElementById('aiChatPanel').classList.toggle('hidden');
}

// Phase 2: JS前処理（ステータス・日付・キーワードでタスクを絞り込む）
function preFilterTasksForAI(question, tasks) {
  let filtered = [...tasks];
  const today = new Date().toISOString().slice(0, 10);

  // ステータスフィルタ
  if (/進行中|作業中/.test(question))  filtered = filtered.filter(t => t.status === 'inProgress');
  else if (/完了/.test(question))      filtered = filtered.filter(t => t.status === 'done');
  else if (/未着手/.test(question))    filtered = filtered.filter(t => t.status === 'pending');
  else if (/スタック/.test(question))  filtered = filtered.filter(t => t.status === 'stuck');
  else if (/確認待ち/.test(question))  filtered = filtered.filter(t => t.status === 'review');

  // 日付フィルタ
  if (/今日/.test(question)) {
    filtered = filtered.filter(t => t.dueDate === today);
  } else if (/今週/.test(question)) {
    const d = new Date();
    const end = new Date(d);
    end.setDate(d.getDate() + (7 - d.getDay() || 7));
    const endStr = end.toISOString().slice(0, 10);
    filtered = filtered.filter(t => t.dueDate && t.dueDate >= today && t.dueDate <= endStr);
  } else if (/期限切れ|遅延|遅れ|overdue/.test(question)) {
    filtered = filtered.filter(t => t.dueDate && t.dueDate < today && t.status !== 'done');
  }

  // 「」内キーワードマッチ
  const kws = [...question.matchAll(/[「『]([^」』]+)[」』]/g)].map(m => m[1]);
  if (kws.length > 0) {
    const kwFiltered = filtered.filter(t => kws.some(k => t.title.includes(k)));
    if (kwFiltered.length > 0) filtered = kwFiltered;
  }

  // 何もマッチしなければ全タスク
  if (filtered.length === 0) filtered = tasks;
  return filtered.slice(0, 50);
}

// サブタスクを含めたフラットなタスクリストを構築
function buildTasksForAI() {
  const myTasks = getMyTasks();
  return myTasks.map(t => ({
    ...t,
    children: (data.tasks || []).filter(s => s.parentId === t.id)
  }));
}

async function sendAiChat() {
  const input = document.getElementById('aiChatInput');
  const question = input.value.trim();
  if (!question) return;

  const sendBtn = document.getElementById('aiChatSend');
  const messages = document.getElementById('aiChatMessages');

  // ユーザーメッセージを表示
  appendChatMsg('user', question);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  // thinking表示
  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'ai-chat-thinking';
  thinkingEl.textContent = '⏳ 考えています…';
  messages.appendChild(thinkingEl);
  messages.scrollTop = messages.scrollHeight;

  try {
    const allTasks = buildTasksForAI();
    const filtered = preFilterTasksForAI(question, allTasks);

    const res = await fetch('/api/task-ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        tasks: filtered,
        projects: data.projects || [],
        users: data.users || [],
        currentUser,
        today: new Date().toISOString().slice(0, 10)
      })
    });

    thinkingEl.remove();

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const result = await res.json();
    if (result.error) throw new Error(result.error);

    // Phase 3: アクションがある場合は確認UIを表示
    if (result.action) {
      appendChatMsgWithAction(result.answer, result.action);
    } else {
      appendChatMsg('ai', result.answer);
    }
  } catch (e) {
    thinkingEl.remove();
    appendChatMsg('ai', `エラー: ${e.message}`, true);
  }

  sendBtn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

function appendChatMsg(role, text, isError = false) {
  const messages = document.getElementById('aiChatMessages');
  const msg = document.createElement('div');
  msg.className = `ai-chat-msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `ai-chat-bubble${isError ? ' error' : ''}`;
  bubble.textContent = text;
  msg.appendChild(bubble);
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function appendChatMsgWithAction(text, action) {
  const messages = document.getElementById('aiChatMessages');
  const msg = document.createElement('div');
  msg.className = 'ai-chat-msg ai';

  const bubble = document.createElement('div');
  bubble.className = 'ai-chat-bubble';
  bubble.textContent = text;
  msg.appendChild(bubble);

  // アクション確認バー
  const bar = document.createElement('div');
  bar.className = 'ai-chat-action-bar';

  const task = (data.tasks || []).find(t => t.id === action.taskId);
  const taskTitle = task ? task.title : action.taskId;
  const changeDesc = Object.entries(action.changes || {})
    .map(([k, v]) => {
      if (k === 'status') return `状態→${({pending:'未着手',inProgress:'進行中',done:'完了',stuck:'スタック',review:'確認待ち'})[v]||v}`;
      if (k === 'dueDate') return `期限→${v}`;
      if (k === 'assigneeId') return `担当→${(data.users||[]).find(u=>u.id===v)?.name||v}`;
      return `${k}→${v}`;
    }).join('、');

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'ai-chat-action-confirm';
  confirmBtn.textContent = `✅ 実行（${taskTitle}：${changeDesc}）`;
  confirmBtn.onclick = async () => {
    const t = (data.tasks || []).find(t => t.id === action.taskId);
    if (t) {
      const prev = { ...t };
      Object.assign(t, action.changes);
      render();
      try {
        await apiTask.patch(action.taskId, { ...action.changes, updatedAt: new Date().toISOString() });
        bar.innerHTML = '<span style="font-size:11px;color:var(--success);">✅ 変更しました</span>';
      } catch (e) {
        Object.assign(t, prev);
        render();
        bar.innerHTML = '<span style="font-size:11px;color:var(--danger);">⚠ 変更に失敗しました</span>';
      }
    }
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'ai-chat-action-cancel';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = () => { bar.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">キャンセルしました</span>'; };

  bar.appendChild(confirmBtn);
  bar.appendChild(cancelBtn);
  msg.appendChild(bar);
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

// ─── Note panel ────────────────────────────────────────
let _notePanelTaskId = null;
let _noteAutoSaveTimers = {};
let _noteAdding = false;

function openNotePanel(taskId) {
  _notePanelTaskId = taskId;
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  document.getElementById('notePanelTitle').textContent = t.title;
  renderNotePanelBody(taskId);
  document.getElementById('notePanel').classList.add('open');
  document.getElementById('notePanelOverlay').classList.add('open');
  document.body.classList.add('no-scroll');
}

function closeNotePanel() {
  document.getElementById('notePanel').classList.remove('open');
  document.getElementById('notePanelOverlay').classList.remove('open');
  document.body.classList.remove('no-scroll');
  _notePanelTaskId = null;
}

function renderNotePanelBody(taskId, expandNoteId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.notes) t.notes = [];
  const body = document.getElementById('notePanelBody');
  body.innerHTML = '';

  // 追加ボタン
  const addBtn = document.createElement('button');
  addBtn.className = 'note-add-btn';
  addBtn.innerHTML = '<span style="font-size:16px;">＋</span> 新規ノートを追加';
  addBtn.onclick = () => addNote(taskId);
  body.appendChild(addBtn);

  // ノートカード一覧（新しい順）。expandNoteIdのカードは展開状態で描画
  [...t.notes].reverse().forEach(note => {
    body.appendChild(buildNoteCard(taskId, note, note.id === expandNoteId));
  });
}

function buildNoteCard(taskId, note, expanded) {
  const card = document.createElement('div');
  card.className = 'note-card';
  card.id = `note-card-${note.id}`;

  const updatedAt = note.updatedAt ? new Date(note.updatedAt).toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';

  card.innerHTML = `
    <div class="note-card-header" onclick="toggleNoteCard('${escA(note.id)}')">
      <span class="note-card-toggle">${expanded ? '▼' : '▶'}</span>
      <input class="note-title-input" placeholder="題名（クリックで展開）" value="${escH(note.title || '')}" data-note-id="${escA(note.id)}" data-task-id="${escA(taskId)}" onclick="event.stopPropagation()" />
      <span class="note-date" id="note-date-${note.id}">${updatedAt}</span>
      <span class="note-saved-indicator" id="note-saved-${note.id}">✓ 保存</span>
      <button class="note-delete-btn" onclick="event.stopPropagation();deleteNote('${escA(taskId)}','${escA(note.id)}')" title="削除">✕</button>
    </div>
    <div class="note-card-body${expanded ? '' : ' collapsed'}">
      <textarea class="note-content-input" rows="8" style="height:200px" placeholder="内容を入力..." data-note-id="${escA(note.id)}" data-task-id="${escA(taskId)}">${escH(stripHtml(note.content || ''))}</textarea>
      <div class="note-card-resize-handle" onmousedown="startNoteResize(event, '${escA(note.id)}')" title="ドラッグで高さを調整"></div>
    </div>
  `;

  // タイトル自動保存
  const titleInput = card.querySelector('.note-title-input');
  titleInput.addEventListener('input', () => scheduleNoteSave(taskId, note.id));

  // 内容自動保存
  const contentInput = card.querySelector('.note-content-input');
  contentInput.addEventListener('input', () => {
    autoResizeNoteTextarea(contentInput);
    scheduleNoteSave(taskId, note.id);
  });

  // テキストエリアの高さを初期化（展開時のみ・既存content時は実サイズへ）
  if (expanded && note.content) { requestAnimationFrame(() => autoResizeNoteTextarea(contentInput)); }

  return card;
}

function toggleNoteCard(noteId) {
  const card = document.getElementById(`note-card-${noteId}`);
  if (!card) return;
  const body = card.querySelector('.note-card-body');
  const toggle = card.querySelector('.note-card-toggle');
  const isOpen = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed');
  toggle.textContent = isOpen ? '▶' : '▼';
  if (!isOpen) {
    const ta = body.querySelector('.note-content-input');
    if (ta) autoResizeNoteTextarea(ta);
  }
}

function autoResizeNoteTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(200, el.scrollHeight) + 'px';
}

function startNoteResize(e, noteId) {
  e.preventDefault();
  const card = document.getElementById(`note-card-${noteId}`);
  if (!card) return;
  const target = card.querySelector('.note-content-input');
  if (!target) return;
  const startY = e.clientY;
  const startH = target.offsetHeight;
  function onMove(ev) {
    target.style.height = Math.max(80, startH + (ev.clientY - startY)) + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function scheduleNoteSave(taskId, noteId) {
  const key = `${taskId}_${noteId}`;
  clearTimeout(_noteAutoSaveTimers[key]);
  _noteAutoSaveTimers[key] = setTimeout(() => saveNoteById(taskId, noteId), 600);
}

async function saveNoteById(taskId, noteId) {
  const t = data.tasks.find(t => t.id === taskId);
  if (!t || !t.notes) return;
  const note = t.notes.find(n => n.id === noteId);
  if (!note) return;

  const card = document.getElementById(`note-card-${noteId}`);
  if (!card) return;
  note.title = card.querySelector('.note-title-input').value;
  note.content = card.querySelector('.note-content-input').value;
  note.updatedAt = new Date().toISOString();

  const dateEl = document.getElementById(`note-date-${noteId}`);
  if (dateEl) dateEl.textContent = new Date(note.updatedAt).toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

  try {
    await apiTask.patchNote(taskId, noteId, {
      content: note.content,
      updatedAt: note.updatedAt,
      createdAt: note.at,
    });
    render();
    const indicator = document.getElementById(`note-saved-${noteId}`);
    if (indicator) {
      indicator.classList.add('show');
      setTimeout(() => indicator.classList.remove('show'), 2000);
    }
  } catch (e) {
    _showApiError('ノートの保存に失敗しました');
  }
}

async function addNote(taskId) {
  if (_noteAdding) return;
  _noteAdding = true;
  const addBtn = document.querySelector('#notePanelBody .note-add-btn');
  if (addBtn) addBtn.disabled = true;
  const t = data.tasks.find(t => t.id === taskId);
  if (!t) { _noteAdding = false; return; }
  if (!t.notes) t.notes = [];
  const now = new Date().toISOString();
  const note = { id: genId(), title: '', content: '', at: now, updatedAt: now };
  t.notes.push(note);
  // DOM差分更新：全再生成せず新カードだけ先頭に挿入
  const body = document.getElementById('notePanelBody');
  const newCard = buildNoteCard(taskId, note, true);
  newCard.classList.add('new-highlight');
  const firstCard = body.querySelector('.note-card');
  if (firstCard) body.insertBefore(newCard, firstCard);
  else body.appendChild(newCard);
  if (addBtn) addBtn.disabled = false;
  newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  newCard.querySelector('.note-title-input').focus();
  try { render(); } catch(e) { console.warn('render error after addNote:', e); }
  _noteAdding = false;
  try {
    await apiTask.postNote(taskId, note);
  } catch (e) {
    t.notes = t.notes.filter(n => n.id !== note.id);
    _showApiError('ノートの追加に失敗しました');
  }
}

async function deleteNote(taskId, noteId) {
  if (!confirm('このノートを削除しますか？')) return;
  const card = document.getElementById(`note-card-${noteId}`);
  if (card) { card.style.transition = 'opacity 0.2s'; card.style.opacity = '0'; }
  await new Promise(r => setTimeout(r, 200));
  const t = data.tasks.find(t => t.id === taskId);
  if (!t || !t.notes) return;
  const deletedNote = t.notes.find(n => n.id === noteId);
  t.notes = t.notes.filter(n => n.id !== noteId);
  renderNotePanelBody(taskId);
  try { render(); } catch(e) { console.warn('render error after deleteNote:', e); }
  try {
    await apiTask.deleteNote(taskId, noteId);
  } catch (e) {
    if (deletedNote) t.notes.push(deletedNote);
    renderNotePanelBody(taskId);
    try { render(); } catch(e2) {}
    _showApiError('ノートの削除に失敗しました');
  }
}

function flushAllNoteSaves() {
  Object.keys(_noteAutoSaveTimers).forEach(key => {
    clearTimeout(_noteAutoSaveTimers[key]);
    delete _noteAutoSaveTimers[key];
    const sep = key.lastIndexOf('_');
    saveNoteById(key.slice(0, sep), key.slice(sep + 1));
  });
}
window.addEventListener('beforeunload', flushAllNoteSaves);
window.addEventListener('pagehide', flushAllNoteSaves);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') flushAllNoteSaves();
});
</script>
